<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Ar RaiyanMart</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* লগইন সেকশন */
        #loginSection { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 90%; max-width: 380px; text-align: center; }
        h2 { color: #f85606; margin-bottom: 20px; }
        input[type="password"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; box-sizing: border-box; font-size: 16px; }
        .login-btn { width: 100%; padding: 12px; background: #f85606; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        
        /* ড্যাশবোর্ড (শুরুতে লুকানো) */
        #adminDashboard { display: none; width: 100%; max-width: 600px; padding: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; }
        
        .p-info { display: flex; gap: 15px; align-items: center; }
        .p-info img { width: 80px; height: 80px; object-fit: contain; border-radius: 8px; background: #f9f9f9; border: 1px solid #eee; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        .btn-group button { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 13px; }
        
        .approve { background: #25D366; }
        .reject { background: #ff9800; }
        .delete { background: #ff4444; }
        
        .shop-name { font-size: 11px; background: #fff0e9; color: #f85606; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginSection">
        <h2>অ্যাডমিন লগইন</h2>
        <input type="password" id="passInput" placeholder="গোপন পাসওয়ার্ড লিখুন">
        <button class="login-btn" onclick="checkLogin()">লগইন করুন</button>
        <p id="errorMsg" style="color: red; display: none; font-size: 13px; margin-top: 10px;">ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।</p>
    </div>

    <div id="adminDashboard">
        <h2 style="text-align: center;">নতুন পণ্য রিভিউ</h2>
        <div id="pendingList"></div>
        <button onclick="location.reload()" style="background: #333; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; margin-top: 20px; cursor: pointer;">লগ আউট</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            projectId: "ar-raiyanmart",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b82c96a26f38601e4"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // লগইন চেক
        function checkLogin() {
            const pass = document.getElementById('passInput').value;
            if (pass === "admin123") {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                document.body.style.alignItems = 'flex-start';
                loadPending();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        // পেন্ডিং পণ্য লোড
        function loadPending() {
            const listDiv = document.getElementById('pendingList');
            database.ref('pending_products').on('value', (snapshot) => {
                listDiv.innerHTML = "";
                const data = snapshot.val();
                if (!data) {
                    listDiv.innerHTML = "<p style='text-align:center; color:#999;'>কোনো পেন্ডিং পণ্য নেই।</p>";
                    return;
                }

                Object.keys(data).forEach(id => {
                    const p = data[id];
                    listDiv.innerHTML += `
                        <div class="product-card">
                            <div class="p-info">
                                <img src="${p.img}">
                                <div style="flex:1;">
                                    <span class="shop-name">🏪 ${p.shopName}</span>
                                    <div style="font-weight:bold; margin-top:5px; font-size:16px;">${p.name}</div>
                                    <div style="color: #f85606; font-weight:bold;">৳${p.price}</div>
                                </div>
                            </div>
                            <div style="margin-top:10px; font-size:13px; color:#555;"><b>বিবরণ:</b> ${p.desc || 'নেই'}</div>
                            <div class="btn-group">
                                <button class="approve" onclick="manage('${id}', 'approve')">Approve</button>
                                <button class="reject" onclick="manage('${id}', 'reject')">Reject</button>
                                <button class="delete" onclick="manage('${id}', 'delete')">Delete</button>
                            </div>
                        </div>`;
                });
            });
        }

        // বাটন একশন
        function manage(id, type) {
            if (type === 'approve') {
                database.ref('pending_products/' + id).once('value').then(s => {
                    database.ref('live_products').push(s.val()).then(() => {
                        database.ref('pending_products/' + id).remove();
                    });
                });
            } else if (type === 'reject') {
                database.ref('pending_products/' + id).once('value').then(s => {
                    database.ref('rejected_products').push(s.val()).then(() => {
                        database.ref('pending_products/' + id).remove();
                    });
                });
            } else if (type === 'delete') {
                if(confirm("আপনি কি নিশ্চিত?")) database.ref('pending_products/' + id).remove();
            }
        }
    </script>
</body>
</html>
