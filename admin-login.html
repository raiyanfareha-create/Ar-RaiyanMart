<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল | Ar RaiyanMart</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h2 { text-align: center; color: #333; border-bottom: 2px solid #f85606; padding-bottom: 10px; }
        .section-title { background: #f85606; color: white; padding: 10px; border-radius: 5px; margin-top: 30px; }
        .product-card { background: white; padding: 15px; margin: 10px 0; border-radius: 10px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-card img { width: 70px; height: 70px; border-radius: 5px; object-fit: cover; }
        .info { flex-grow: 1; }
        .btns button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .btn-approve { background: #28a745; color: white; }
        .btn-delete { background: #dc3545; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ar RaiyanMart অ্যাডমিন কন্ট্রোল</h2>

    <h3 class="section-title">পেন্ডিং পণ্য (অনুমোদনের অপেক্ষায়)</h3>
    <div id="pendingList">লোড হচ্ছে...</div>

    <h3 class="section-title">লাইভ পণ্য (ওয়েবসাইটে যা দেখা যাচ্ছে)</h3>
    <div id="liveList">লোড হচ্ছে...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU",
        authDomain: "ar-raiyanmart.firebaseapp.com",
        projectId: "ar-raiyanmart",
        databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "ar-raiyanmart.firebasestorage.app",
        messagingSenderId: "336578883565",
        appId: "1:336578883565:web:54d73b82c96a26f38601e4"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ১. পেন্ডিং পণ্য লোড করা
    database.ref('pending_products').on('value', (snapshot) => {
        const list = document.getElementById('pendingList');
        list.innerHTML = "";
        const data = snapshot.val();
        if (!data) { list.innerHTML = "<p>কোনো পেন্ডিং পণ্য নেই।</p>"; return; }

        Object.keys(data).forEach(id => {
            const p = data[id];
            list.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}">
                    <div class="info"><b>${p.name}</b><br>৳${p.price} - ${p.shopName}</div>
                    <div class="btns">
                        <button class="btn-approve" onclick="approveProduct('${id}')">Approve</button>
                        <button class="btn-delete" onclick="deleteFromDB('pending_products', '${id}')">Delete</button>
                    </div>
                </div>`;
        });
    });

    // ২. লাইভ পণ্য লোড করা
    database.ref('live_products').on('value', (snapshot) => {
        const list = document.getElementById('liveList');
        list.innerHTML = "";
        const data = snapshot.val();
        if (!data) { list.innerHTML = "<p>কোনো লাইভ পণ্য নেই।</p>"; return; }

        Object.keys(data).forEach(id => {
            const p = data[id];
            list.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}">
                    <div class="info"><b>${p.name}</b><br>৳${p.price}</div>
                    <div class="btns">
                        <button class="btn-delete" onclick="deleteFromDB('live_products', '${id}')">Delete from Website</button>
                    </div>
                </div>`;
        });
    });

    // অ্যাপ্রুভ ফাংশন
    function approveProduct(id) {
        database.ref('pending_products/' + id).once('value').then(snap => {
            database.ref('live_products').push(snap.val()).then(() => {
                database.ref('pending_products/' + id).remove();
            });
        });
    }

    // ডিলিট ফাংশন (উভয় জায়গার জন্য)
    function deleteFromDB(path, id) {
        if(confirm("আপনি কি নিশ্চিতভাবে এটি মুছে ফেলতে চান?")) {
            database.ref(path + '/' + id).remove().then(() => alert("মুছে ফেলা হয়েছে!"));
        }
    }
</script>
</body>
</html>
