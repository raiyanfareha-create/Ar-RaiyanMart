<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Ar RaiyanMart</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .admin-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #f85606; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { width: 100%; padding: 12px; background: #f85606; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* ড্যাশবোর্ড শুরুতে লুকানো থাকবে */
        #adminDashboard { display: none; width: 100%; max-width: 600px; margin-top: 20px; }
        .product-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-group button { flex: 1; font-size: 12px; padding: 8px; }
    </style>
</head>
<body>

    <div id="loginSection" class="admin-box">
        <h2>অ্যাডমিন লগইন</h2>
        <input type="password" id="passInput" placeholder="পাসওয়ার্ড দিন (admin123)">
        <button onclick="checkLogin()">লগইন করুন</button>
        <p id="errorMsg" style="color: red; display: none; font-size: 13px; margin-top: 10px;">ভুল পাসওয়ার্ড!</p>
    </div>

    <div id="adminDashboard">
        <h2 style="text-align: center;">পেন্ডিং প্রোডাক্ট লিস্ট</h2>
        <div id="pendingList"></div>
        <button onclick="location.reload()" style="background: #333; margin-top: 20px;">লগ আউট</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // আপনার ফায়ারবেস কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            projectId: "ar-raiyanmart",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b82c96a26f38601e4"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // লগইন চেক ফাংশন
        function checkLogin() {
            const pass = document.getElementById('passInput').value;
            if (pass === "admin123") { // পাসওয়ার্ড 'admin123'
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                document.body.style.alignItems = 'flex-start'; // লেআউট ঠিক করার জন্য
                loadPendingItems();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function loadPendingItems() {
            const list = document.getElementById('pendingList');
            database.ref('pending_products').on('value', (s) => {
                list.innerHTML = "";
                const data = s.val();
                if (!data) { list.innerHTML = "<p style='text-align:center;'>কোনো পণ্য নেই।</p>"; return; }

                Object.keys(data).forEach(id => {
                    const p = data[id];
                    list.innerHTML += `
                        <div class="product-card">
                            <img src="${p.img}" style="width:60px; height:60px; object-fit:contain; border-radius:5px; float:left; margin-right:10px;">
                            <b>${p.name}</b> <br>
                            <small>শপ: ${p.shopName}</small> <br>
                            <span style="color: #f85606; font-weight:bold;">৳${p.price}</span>
                            <div style="clear:both;"></div>
                            <div class="btn-group">
                                <button style="background:#25D366;" onclick="handleAction('${id}', 'approve')">Approve</button>
                                <button style="background:#ff9800;" onclick="handleAction('${id}', 'reject')">Reject</button>
                                <button style="background:#ff4444;" onclick="handleAction('${id}', 'delete')">Delete</button>
                            </div>
                        </div>`;
                });
            });
        }

        function handleAction(id, type) {
            if (type === 'approve') {
                database.ref('pending_products/' + id).once('value').then(s => {
                    database.ref('live_products').push(s.val()).then(() => {
                        database.ref('pending_products/' + id).remove();
                    });
                });
            } else if (type === 'reject') {
                database.ref('pending_products/' + id).once('value').then(s => {
                    database.ref('rejected_products').push(s.val()).then(() => {
                        database.ref('pending_products/' + id).remove();
                    });
                });
            } else if (type === 'delete') {
                if(confirm("চিরতরে ডিলিট?")) database.ref('pending_products/' + id).remove();
            }
        }
    </script>
</body>
</html>
