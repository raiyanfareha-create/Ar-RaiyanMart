<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Admin Approval | Ar RaiyanMart</title>
    <style>
        body { font-family: sans-serif; background: #eee; padding: 20px; }
        .product-card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; display: flex; align-items: center; gap: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
        .btn-approve { background: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; margin-left: 10px; }
    </style>
</head>
<body>

<h2>পেন্ডিং প্রোডাক্ট লিস্ট (Approval System)</h2>
<div id="pending-list">লোডিং হচ্ছে...</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU",
        authDomain: "ar-raiyanmart.firebaseapp.com",
        projectId: "ar-raiyanmart",
        databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "ar-raiyanmart.firebasestorage.app",
        messagingSenderId: "336578883565",
        appId: "1:336578883565:web:54d73b82c96a26f38601e4"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const pendingRef = database.ref('pending_products');
    const liveRef = database.ref('live_products');

    // ডাটা পড়া
    pendingRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const listDiv = document.getElementById('pending-list');
        listDiv.innerHTML = "";

        if(!data) { listDiv.innerHTML = "কোনো পেন্ডিং প্রোডাক্ট নেই।"; return; }

        Object.keys(data).forEach(key => {
            const p = data[key];
            listDiv.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}">
                    <div style="flex:1;">
                        <h3>${p.name}</h3>
                        <p>দাম: ৳ ${p.price}</p>
                    </div>
                    <button class="btn-approve" onclick="approve('${key}')">Approve</button>
                    <button class="btn-delete" onclick="remove('${key}')">Reject</button>
                </div>
            `;
        });
    });

    function approve(key) {
        pendingRef.child(key).once('value', (snap) => {
            liveRef.push(snap.val(), () => {
                pendingRef.child(key).remove();
                alert("প্রোডাক্টটি এখন লাইভ!");
            });
        });
    }

    function remove(key) {
        if(confirm("এটি ডিলিট করতে চান?")) {
            pendingRef.child(key).remove();
        }
    }
</script>
</body>
</html>
