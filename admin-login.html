<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f0f4f8; }
        .tab-active { border-bottom: 3px solid #e63946; color: #e63946; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="bg-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-slate-800 italic">RaiyanMart <span class="text-orange-600">Admin</span></h1>
        <button onclick="logout()" class="text-red-500 bg-red-50 px-4 py-2 rounded-xl text-xs font-bold italic">Logout</button>
    </div>

    <div class="p-4 grid grid-cols-2 gap-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-500 text-center">
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">পেন্ডিং পণ্য</p>
            <h2 id="pendingCount" class="text-2xl font-bold text-blue-600 italic">0</h2>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-green-500 text-center">
            <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">লাইভ পণ্য</p>
            <h2 id="liveCount" class="text-2xl font-bold text-green-600 italic">0</h2>
        </div>
    </div>

    <div class="flex bg-white shadow-sm sticky top-[72px] z-40">
        <button onclick="showTab('pending')" id="tab-pending" class="flex-1 py-4 text-[10px] font-bold uppercase tab-active">পেন্ডিং পণ্য</button>
        <button onclick="showTab('orders')" id="tab-orders" class="flex-1 py-4 text-[10px] font-bold uppercase text-gray-400">অর্ডার হিস্ট্রি</button>
        <button onclick="showTab('live')" id="tab-live" class="flex-1 py-4 text-[10px] font-bold uppercase text-gray-400">লাইভ পণ্য</button>
    </div>

    <div class="p-4">
        <div id="pendingSection" class="space-y-4">
            <div id="pendingList" class="grid gap-4"></div>
        </div>

        <div id="ordersSection" class="hidden space-y-4">
            <div id="orderList" class="grid gap-4"></div>
        </div>

        <div id="liveSection" class="hidden space-y-4">
            <div id="liveList" class="grid gap-4"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDuoF0108YerBICZzydjjZzDawtG-BQLW8U",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ট্যাব সুইচিং ফাংশন
        function showTab(tab) {
            ['pendingSection', 'ordersSection', 'liveSection'].forEach(s => document.getElementById(s).classList.add('hidden'));
            ['tab-pending', 'tab-orders', 'tab-live'].forEach(t => document.getElementById(t).classList.remove('tab-active', 'text-gray-400'));
            document.getElementById(tab + 'Section').classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('tab-active');
        }

        // পেন্ডিং প্রোডাক্ট লোড ও অ্যাপ্রুভ ফাংশন
        db.ref('pending_products').on('value', snap => {
            const list = document.getElementById('pendingList');
            const count = document.getElementById('pendingCount');
            list.innerHTML = "";
            let i = 0;
            snap.forEach(child => {
                const p = child.val(); i++;
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border mb-3">
                        <div class="flex gap-4">
                            <img src="${p.imageUrl}" class="w-16 h-16 rounded-xl object-cover border">
                            <div class="flex-1">
                                <h3 class="font-bold text-xs text-slate-800">${p.name}</h3>
                                <p class="text-orange-600 font-bold text-xs">৳ ${p.price}</p>
                                <p class="text-[9px] text-gray-400 italic">Seller: ${p.seller || 'N/A'}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 mt-4">
                            <button onclick="approveProduct('${child.key}')" class="flex-1 bg-green-500 text-white py-2 rounded-lg text-[10px] font-bold uppercase shadow-sm">Approve</button>
                            <button onclick="deleteData('pending_products/${child.key}')" class="bg-red-50 text-red-500 px-4 py-2 rounded-lg text-[10px] font-bold uppercase">Reject</button>
                        </div>
                    </div>`;
            });
            count.innerText = i;
        });

        // অর্ডার হিস্ট্রি ও ডেলিভারি স্ট্যাটাস
        db.ref('orders').on('value', snap => {
            const list = document.getElementById('orderList');
            list.innerHTML = "";
            snap.forEach(child => {
                const o = child.val();
                const isDelivered = o.status === 'Delivered';
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border mb-3">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-bold text-xs">${o.customerName}</h3>
                            <span class="text-[9px] font-bold ${isDelivered ? 'text-green-600' : 'text-blue-600'} uppercase italic">${o.status || 'Pending'}</span>
                        </div>
                        <p class="text-[10px] text-gray-500">পণ্য: ${o.productName}</p>
                        <p class="text-[10px] text-gray-400 italic">সেলার: ${o.sellerName || 'undefined'}</p>
                        <div class="mt-3">
                            ${!isDelivered ? `<button onclick="markAsDelivered('${child.key}')" class="w-full bg-slate-800 text-white py-3 rounded-xl text-[10px] font-bold uppercase">Mark as Delivered</button>` : `<div class="bg-green-50 text-green-600 py-2 rounded-xl text-[10px] font-bold text-center italic"><i class="fa-solid fa-check"></i> Delivered</div>`}
                        </div>
                    </div>`;
            });
        });

        // লাইভ প্রোডাক্ট লিস্ট
        db.ref('live_products').on('value', snap => {
            const list = document.getElementById('liveList');
            const count = document.getElementById('liveCount');
            list.innerHTML = "";
            let i = 0;
            snap.forEach(child => {
                const p = child.val(); i++;
                list.innerHTML += `<div class="bg-white p-3 rounded-xl flex items-center justify-between shadow-sm border mb-2"><div class="flex items-center gap-3"><img src="${p.imageUrl}" class="w-10 h-10 rounded-lg object-cover border"><div class="text-[10px] font-bold">${p.name}</div></div><button onclick="deleteData('live_products/${child.key}')" class="text-red-400 p-2"><i class="fa-solid fa-trash-can"></i></button></div>`;
            });
            count.innerText = i;
        });

        function approveProduct(key) {
            db.ref('pending_products/' + key).once('value', snap => {
                const data = snap.val();
                db.ref('live_products').push(data).then(() => db.ref('pending_products/' + key).remove());
            });
        }

        function markAsDelivered(key) {
            if(confirm("অর্ডারটি কি ডেলিভারি হয়েছে?")) {
                db.ref('orders/' + key).update({ status: 'Delivered' });
            }
        }

        function deleteData(path) { if(confirm("মুছে ফেলতে চান?")) db.ref(path).remove(); }
        function logout() { location.reload(); }
    </script>
</body>
</html>
