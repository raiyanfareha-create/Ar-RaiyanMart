<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        
        /* লগইন সেকশন */
        #loginBox { background: white; padding: 40px 30px; text-align: center; border-radius: 24px; max-width: 380px; margin: 80px auto; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-top: 8px solid #f85606; }
        
        /* মেইন কন্টেইনার */
        .admin-container { display: none; max-width: 950px; margin: 0 auto; }
        .section-card { background: white; padding: 25px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        
        h2 { color: #1e293b; font-weight: 700; margin-bottom: 20px; font-size: 18px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; }
        h2 i { color: #f85606; }
        
        .item-card { background: #ffffff; border: 1px solid #f1f5f9; padding: 16px; border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .item-card:hover { border-color: #f85606; box-shadow: 0 8px 20px rgba(248, 86, 6, 0.05); }
        .item-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; background: #f8fafc; }
        
        .btn { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 13px; transition: 0.3s; }
        .btn-green { background: #10b981; color: white; }
        .btn-blue { background: #3b82f6; color: white; }
        .btn-red { background: #ef4444; color: white; }
        
        input { width: 100%; padding: 15px; margin: 12px 0; border: 2px solid #f1f5f9; border-radius: 12px; outline: none; transition: 0.3s; font-size: 15px; background: #f8fafc; }
        input:focus { border-color: #f85606; background: #fff; }
    </style>
</head>
<body>

    <div id="loginBox">
        <div class="mb-6"><i class="fa-solid fa-shield-halved text-5xl text-orange-600"></i></div>
        <h2 style="border: none; justify-content: center; margin-bottom: 4px; font-size: 22px;">Admin Login</h2>
        <p class="text-gray-400 text-sm mb-8">সুরক্ষিত ড্যাশবোর্ডে লগইন করুন</p>
        
        <input type="password" id="adminPass" placeholder="পাসওয়ার্ড লিখুন">
        <button class="btn btn-green w-full py-4 mt-4 text-sm uppercase tracking-wider" onclick="login()">লগইন করুন</button>
    </div>

    <div class="admin-container" id="adminDash">
        
        <div class="flex justify-between items-center mb-10 bg-white p-6 rounded-2xl shadow-sm border-r-4 border-orange-500">
            <div>
                <h1 class="text-2xl font-black text-slate-800">Ar RaiyanMart</h1>
                <p class="text-[10px] font-bold text-orange-500 uppercase tracking-[3px]">Official Administration</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-100 hover:bg-red-50 text-red-500 px-6 py-2.5 rounded-xl text-xs font-bold transition flex items-center gap-2">
                <i class="fa-solid fa-power-off"></i> Logout
            </button>
        </div>

        <div class="section-card">
            <h2><i class="fa-solid fa-spinner fa-spin-slow"></i> নতুন পেন্ডিং পণ্য</h2>
            <div id="pendingList" class="space-y-4">লোড হচ্ছে...</div>
        </div>

        <div class="section-card">
            <h2><i class="fa-solid fa-check-double"></i> লাইভ পণ্যসমূহ (ম্যানেজ)</h2>
            <div id="manageLiveList" class="grid grid-cols-1 md:grid-cols-2 gap-4">লোড হচ্ছে...</div>
        </div>

        <div class="section-card">
            <h2><i class="fa-solid fa-truck-ramp-box"></i> অর্ডার ও ডেলিভারি ট্র্যাকিং</h2>
            <div id="allOrders" class="space-y-4">লোড হচ্ছে...</div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IG8NerMCC6zyxUJzZOautG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // লগইন ফাংশন
        function login() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "admin123") { 
                document.getElementById('loginBox').style.display = "none";
                document.getElementById('adminDash').style.display = "block";
                loadPendingProducts();
                loadAllOrders();
                loadLiveProductsManage();
            } else {
                alert("ভুল পাসওয়ার্ড! সঠিক পাসওয়ার্ড দিয়ে আবার চেষ্টা করুন।");
            }
        }

        // পেন্ডিং প্রোডাক্ট লোড
        function loadPendingProducts() {
            database.ref('pending_products').on('value', (s) => {
                const div = document.getElementById('pendingList');
                div.innerHTML = "";
                const data = s.val();
                if(!data) { div.innerHTML = "<p class='text-gray-400 italic text-sm text-center py-4'>কোনো পেন্ডিং পণ্য নেই।</p>"; return; }

                Object.keys(data).forEach(id => {
                    const p = data[id];
                    div.innerHTML += `
                        <div class="item-card">
                            <img src="${p.imageUrl || p.img}">
                            <div style="flex:1;">
                                <h4 class="font-bold text-sm text-slate-800">${p.name}</h4>
                                <p class="text-orange-600 font-bold text-xs">৳ ${p.price}</p>
                                <span class="text-[9px] font-black text-slate-400 uppercase">Shop: ${p.seller || p.shopName}</span>
                            </div>
                            <div class="flex gap-2">
                                <button class="btn btn-green text-[10px]" onclick="approveProduct('${id}')">Approve</button>
                                <button class="btn btn-red text-[10px]" onclick="rejectProduct('${id}')"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>`;
                });
            });
        }

        function approveProduct(id) {
            database.ref('pending_products/' + id).once('value').then(s => {
                database.ref('live_products').push(s.val()).then(() => {
                    database.ref('pending_products/' + id).remove();
                    alert("পণ্যটি লাইভ করা হয়েছে!");
                });
            });
        }

        function rejectProduct(id) {
            if(confirm("পেনডিং পণ্যটি ডিলিট করবেন?")) database.ref('pending_products/' + id).remove();
        }

        // লাইভ প্রোডাক্ট ম্যানেজ (ভুলবশত লাইভ হলে ডিলিট করার জন্য)
        function loadLiveProductsManage() {
            database.ref('live_products').on('value', (s) => {
                const div = document.getElementById('manageLiveList');
                div.innerHTML = "";
                const data = s.val();
                if(!data) { div.innerHTML = "<p class='col-span-full text-center text-gray-400 py-4'>কোনো লাইভ পণ্য নেই।</p>"; return; }

                Object.keys(data).forEach(id => {
                    const p = data[id];
                    div.innerHTML += `
                        <div class="item-card border-slate-100">
                            <img src="${p.imageUrl || p.img}">
                            <div style="flex:1;">
                                <h4 class="font-bold text-[11px] truncate" style="max-width: 100px;">${p.name}</h4>
                                <p class="text-blue-500 font-bold text-[10px]">৳ ${p.price}</p>
                            </div>
                            <button class="text-red-300 hover:text-red-600 p-2 transition" onclick="deleteLiveProduct('${id}')">
                                <i class="fa-solid fa-circle-xmark"></i>
                            </button>
                        </div>`;
                });
            });
        }

        function deleteLiveProduct(id) {
            if(confirm("আপনি কি নিশ্চিত যে পণ্যটি লাইভ থেকে সরিয়ে ফেলবেন?")) database.ref('live_products/' + id).remove();
        }

        // অর্ডার লিস্ট
        function loadAllOrders() {
            database.ref('orders').on('value', s => {
                const div = document.getElementById('allOrders');
                div.innerHTML = "";
                const data = s.val();
                if(!data) { div.innerHTML = "<p class='text-center py-4 text-gray-400 italic text-sm'>কোনো অর্ডার পাওয়া যায়নি।</p>"; return; }

                Object.keys(data).reverse().forEach(id => {
                    const o = data[id];
                    const isDelivered = o.status === 'Delivered ✅';
                    div.innerHTML += `
                        <div class="item-card border-l-4 ${isDelivered ? 'border-emerald-500' : 'border-orange-500'}">
                            <div style="flex:1;">
                                <div class="flex justify-between items-center mb-2">
                                    <b class="text-xs text-slate-800">${o.productName}</b>
                                    <span class="text-[9px] bg-slate-100 px-2 py-0.5 rounded-full font-bold">${o.shopName}</span>
                                </div>
                                <div class="text-[10px] text-slate-500 space-y-0.5">
                                    <p><i class="fa-solid fa-circle-user mr-1 text-orange-400"></i> ${o.customerName} (${o.customerPhone})</p>
                                    <p><i class="fa-solid fa-location-arrow mr-1 text-orange-400"></i> ${o.address}</p>
                                </div>
                                <div class="mt-3 flex justify-between items-center border-t pt-2">
                                    <span class="text-[9px] font-black ${isDelivered ? 'text-emerald-600' : 'text-orange-600'} uppercase">
                                        Status: ${o.status || 'Pending'}
                                    </span>
                                    ${!isDelivered ? `<button class="btn btn-blue py-1 px-3 text-[10px]" onclick="markDelivered('${id}')">Deliver Now</button>` : ''}
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        function markDelivered(id) {
            database.ref('orders/' + id).update({ status: 'Delivered ✅' }).then(() => alert("অর্ডার ডেলিভারড করা হয়েছে!"));
        }
    </script>
</body>
</html>
