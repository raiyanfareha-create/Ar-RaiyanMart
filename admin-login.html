<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background: #f1f5f9; }
        .admin-card { background: #ffffff; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .admin-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="p-4">

    <div id="loginBox" class="max-w-sm mx-auto bg-white p-10 rounded-3xl shadow-2xl mt-20 text-center border-t-8 border-orange-600">
        <div class="w-20 h-20 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl">
            <i class="fa-solid fa-user-shield"></i>
        </div>
        <h2 class="text-2xl font-black mb-2 text-slate-800 italic">ADMIN LOGIN</h2>
        <p class="text-gray-400 text-xs mb-6 uppercase tracking-widest">Ar RaiyanMart Control</p>
        
        <input type="password" id="adminPass" placeholder="পাসওয়ার্ড লিখুন" class="w-full border-2 border-gray-100 p-3 rounded-xl mb-4 outline-none focus:border-orange-500 transition-all text-center font-bold">
        <button onclick="login()" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-orange-700 transition">প্রবেশ করুন</button>
    </div>

    <div id="adminDash" class="hidden max-w-4xl mx-auto mt-4">
        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 flex justify-between items-center border-l-8 border-orange-600">
            <div>
                <h1 class="text-2xl font-black text-slate-800 italic">RaiyanMart <span class="text-orange-600">Admin</span></h1>
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-tighter">Product Management System</p>
            </div>
            <button onclick="location.reload()" class="bg-red-50 text-red-500 px-5 py-2 rounded-xl font-bold text-sm hover:bg-red-500 hover:text-white transition">
                <i class="fa-solid fa-power-off mr-1"></i> Logout
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-4 rounded-2xl shadow-sm text-center border-b-4 border-blue-500">
                <p class="text-gray-400 text-[10px] uppercase font-bold">পেন্ডিং পণ্য</p>
                <div id="pendingCount" class="text-2xl font-black text-blue-600">০</div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm text-center border-b-4 border-green-500">
                <p class="text-gray-400 text-[10px] uppercase font-bold">লাইভ পণ্য</p>
                <div id="liveCount" class="text-2xl font-black text-green-600">০</div>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="font-bold text-slate-700 flex items-center gap-2 text-sm uppercase tracking-wider">
                <i class="fa-solid fa-clock text-orange-500"></i> নতুন পণ্যের অনুরোধ (Pending)
            </h2>
            <div id="pendingList" class="space-y-4">
                <p class="text-center text-gray-400 py-10 italic">লোড হচ্ছে...</p>
            </div>
        </div>
    </div>

    <script>
        // আপনার সঠিক Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDuoF0108YerBICZzydjjZzDawtG-BQLW8U",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.appspot.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // লগইন ফাংশন
        function login() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "admin123") { // আপনি চাইলে পাসওয়ার্ড পরিবর্তন করতে পারেন
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('adminDash').classList.remove('hidden');
                initAdmin();
            } else {
                alert("ভুল পাসওয়ার্ড!");
            }
        }

        function initAdmin() {
            loadPending();
            updateStats();
        }

        // পেন্ডিং প্রোডাক্ট লোড
        function loadPending() {
            db.ref('pending_products').on('value', snapshot => {
                const listDiv = document.getElementById('pendingList');
                listDiv.innerHTML = "";
                
                if(!snapshot.exists()) {
                    listDiv.innerHTML = '<div class="text-center bg-white p-10 rounded-2xl text-gray-400 italic">কোনো পেন্ডিং পণ্য নেই</div>';
                    return;
                }

                snapshot.forEach(child => {
                    const p = child.val();
                    const id = child.key;
                    
                    listDiv.innerHTML += `
                        <div class="admin-card p-5 flex flex-col gap-4">
                            <div class="flex gap-4">
                                <img src="${p.imageUrl}" class="w-24 h-24 rounded-2xl object-cover border shadow-sm">
                                <div class="flex-1">
                                    <div class="flex justify-between items-start">
                                        <h4 class="font-bold text-slate-800 text-lg leading-tight">${p.name}</h4>
                                        <span class="bg-orange-100 text-orange-600 text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-tighter">New</span>
                                    </div>
                                    <p class="text-orange-600 font-black text-xl mt-1">৳ ${p.price}</p>
                                    <div class="mt-2 space-y-1">
                                        <p class="text-xs text-gray-500 font-bold italic"><i class="fa-solid fa-store mr-1"></i> শপ: ${p.seller}</p>
                                        <p class="text-xs text-blue-600 font-bold"><i class="fa-solid fa-palette mr-1"></i> কালার: ${p.colors || 'নেই'}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="bg-gray-50 p-3 rounded-xl text-xs text-gray-600">
                                <b class="block mb-1 uppercase text-[9px] text-gray-400 tracking-widest">পণ্য বিবরণ:</b>
                                ${p.description || 'বিবরণ দেওয়া হয়নি'}
                            </div>

                            <div class="flex gap-3 mt-2">
                                <button onclick="approveProduct('${id}')" class="flex-1 bg-green-500 text-white py-3 rounded-xl font-bold shadow-md hover:bg-green-600 transition">
                                    APPROVE
                                </button>
                                <button onclick="rejectProduct('${id}')" class="w-1/4 bg-red-50 text-red-500 py-3 rounded-xl font-bold hover:bg-red-500 hover:text-white transition">
                                    REJECT
                                </button>
                            </div>
                        </div>`;
                });
            });
        }

        // পণ্য এপ্রুভ করা
        function approveProduct(id) {
            db.ref('pending_products/' + id).once('value', snapshot => {
                const data = snapshot.val();
                // লাইভ প্রোডাক্ট লিস্টে পাঠানো
                db.ref('live_products').push(data).then(() => {
                    // পেন্ডিং থেকে রিমুভ করা
                    db.ref('pending_products/' + id).remove();
                    alert("পণ্যটি সফলভাবে লাইভ করা হয়েছে!");
                });
            });
        }

        // পণ্য রিজেক্ট করা
        function rejectProduct(id) {
            if(confirm("আপনি কি নিশ্চিত যে পণ্যটি বাতিল করতে চান?")) {
                db.ref('pending_products/' + id).remove();
            }
        }

        // স্ট্যাটাস আপডেট
        function updateStats() {
            db.ref('pending_products').on('value', s => {
                document.getElementById('pendingCount').innerText = s.numChildren() || 0;
            });
            db.ref('live_products').on('value', s => {
                document.getElementById('liveCount').innerText = s.numChildren() || 0;
            });
        }
    </script>
</body>
</html>
