<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f4f7f6; }
        .orange-btn { background-color: #ff5722; color: white; transition: 0.3s; }
        .orange-btn:hover { background-color: #e64a19; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-orange-500">
            <h2 class="text-orange-600 font-bold mb-4">Shop Profile</h2>
            <input type="text" id="shopName" placeholder="Pure Mart" class="w-full border p-2 rounded mb-3 outline-none focus:ring-1 focus:ring-orange-400">
            <button onclick="saveProfile()" class="w-full bg-zinc-800 text-white py-2 rounded font-bold text-sm">প্রোফাইল সেভ করুন</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-orange-500">
            <h2 class="text-orange-600 font-bold mb-4">নতুন পণ্য যোগ করুন</h2>
            <div class="space-y-3">
                <input type="text" id="pName" placeholder="পণ্যের নাম" class="w-full border p-2 rounded outline-none focus:ring-1 focus:ring-orange-400">
                <input type="number" id="pPrice" placeholder="দাম (৳)" class="w-full border p-2 rounded outline-none focus:ring-1 focus:ring-orange-400">
                <input type="text" id="pColor" placeholder="কালারগুলো লিখুন (যেমন: Red, Blue, Black)" class="w-full border p-2 rounded outline-none focus:ring-1 focus:ring-orange-400">
                <textarea id="pDesc" placeholder="পণ্যের বিবরণ" class="w-full border p-2 rounded h-24 outline-none focus:ring-1 focus:ring-orange-400"></textarea>
                
                <p class="text-[12px] font-bold text-gray-600">পণ্যের ছবি সিলেক্ট করুন:</p>
                <input type="file" id="pImage" class="w-full border p-2 rounded text-sm file:mr-4 file:py-1 file:px-4 file:rounded-full file:border-0 file:text-sm file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100">
                
                <button onclick="submitProduct()" id="uploadBtn" class="w-full orange-btn py-3 rounded-xl font-bold mt-4 shadow-md uppercase tracking-wider">রিভিউয়ের জন্য পাঠান</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-orange-500">
            <h2 class="text-orange-600 font-bold mb-4">কাস্টমারদের প্রশ্নসমূহ</h2>
            <div id="queries" class="text-gray-400 italic text-center py-4">লোড হচ্ছে...</div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-orange-500">
            <h2 class="text-orange-600 font-bold mb-4">আপনার শপের অর্ডারসমূহ</h2>
            <div id="orders" class="text-gray-400 italic text-center py-4">লোড হচ্ছে...</div>
        </div>

    </div>

    <script>
        // Firebase Configuration (স্ক্রিনশট অনুযায়ী)
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IG8NerMCC6zyxUJzZOautG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // ১. প্রোফাইল সেভ ফাংশন
        function saveProfile() {
            const name = document.getElementById('shopName').value;
            if(!name) return alert("দোকানের নাম লিখুন!");
            localStorage.setItem('raiyan_shop_name', name);
            alert("প্রোফাইল সেভ হয়েছে!");
        }

        // ২. পণ্য আপলোড ফাংশন
        async function submitProduct() {
            const file = document.getElementById('pImage').files[0];
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const color = document.getElementById('pColor').value;
            const desc = document.getElementById('pDesc').value;
            const shop = localStorage.getItem('raiyan_shop_name') || "Unknown Shop";
            const btn = document.getElementById('uploadBtn');

            if(!file || !name || !price) return alert("নাম, দাম এবং ছবি দেওয়া বাধ্যতামূলক!");

            btn.innerText = "আপলোড হচ্ছে...";
            btn.disabled = true;

            try {
                // স্টোরেজে ছবি আপলোড
                const ref = storage.ref('products/' + Date.now() + "_" + file.name);
                await ref.put(file);
                const url = await ref.getDownloadURL();

                // ডাটাবেসে সেভ (ছবি অনুযায়ী pending_products এ যাবে)
                await db.ref('pending_products').push({
                    name, price: parseInt(price), color, desc, 
                    imageUrl: url, seller: shop, status: "pending"
                });

                alert("সফলভাবে রিভিউতে পাঠানো হয়েছে!");
                location.reload();
            } catch(e) {
                alert("ভুল হয়েছে: " + e.message);
                btn.innerText = "আবার চেষ্টা করুন";
                btn.disabled = false;
            }
        }

        // ৩. অর্ডার এবং প্রশ্ন লোড করা
        db.ref('orders').on('value', snap => {
            const div = document.getElementById('orders');
            div.innerHTML = snap.exists() ? "অর্ডার পাওয়া গেছে" : "কোনো অর্ডার নেই";
        });
        
        db.ref('comments').on('value', snap => {
            const div = document.getElementById('queries');
            div.innerHTML = snap.exists() ? "নতুন প্রশ্ন আছে" : "কোনো প্রশ্ন নেই";
        });

    </script>
</body>
</html>
