<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard | Ar RaiyanMart</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #f85606; color: white; width: 100%; }
        .order-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .status { font-weight: bold; color: #f85606; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Shop Profile</h3>
        <input type="text" id="myShopName" placeholder="আপনার শপের নাম">
        <button class="btn btn-primary" onclick="saveShop()">প্রোফাইল সেভ করুন</button>
    </div>

    <div class="card">
        <h3>নতুন পণ্য যোগ করুন</h3>
        <input type="text" id="pName" placeholder="পণ্যের নাম">
        <input type="number" id="pPrice" placeholder="দাম">
        <input type="text" id="pImg" placeholder="ছবির লিংক">
        <button class="btn btn-primary" onclick="upload()">অ্যাডমিনকে পাঠান</button>
    </div>

    <div class="card">
        <h3>আপনার শপের অর্ডারসমূহ</h3>
        <div id="orderList">লোডিং...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU", authDomain: "ar-raiyanmart.firebaseapp.com", projectId: "ar-raiyanmart", databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app", storageBucket: "ar-raiyanmart.firebasestorage.app", messagingSenderId: "336578883565", appId: "1:336578883565:web:54d73b82c96a26f38601e4" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function saveShop() { localStorage.setItem('myShop', document.getElementById('myShopName').value); alert("সেভ হয়েছে!"); location.reload(); }
        window.onload = () => { 
            const saved = localStorage.getItem('myShop');
            if(saved) { document.getElementById('myShopName').value = saved; loadOrders(saved); }
        };

        function upload() {
            const shop = localStorage.getItem('myShop');
            if(!shop) return alert("শপের নাম আগে সেভ করুন");
            database.ref('pending_products').push({ name: document.getElementById('pName').value, price: document.getElementById('pPrice').value, img: document.getElementById('pImg').value, shopName: shop });
            alert("অ্যাডমিন রিভিউর জন্য পাঠানো হয়েছে");
        }

        function loadOrders(shop) {
            database.ref('orders').on('value', s => {
                const list = document.getElementById('orderList'); list.innerHTML = "";
                const data = s.val();
                if(!data) return list.innerHTML = "কোনো অর্ডার নেই";
                Object.keys(data).forEach(id => {
                    if(data[id].shopName === shop) {
                        list.innerHTML += `<div class="order-item"><b>${data[id].productName}</b> - ${data[id].customerName}<br>স্ট্যাটাস: <span class="status">${data[id].status}</span><br><button onclick="confirm('${id}')">Confirm</button></div>`;
                    }
                });
            });
        }
        function confirm(id) { database.ref('orders/'+id).update({status: "Confirmed"}); }
    </script>
</body>
</html>
