<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
        .orange-btn { background-color: #ff5722; color: white; transition: 0.3s; }
        .orange-btn:hover { background-color: #e64a19; }
    </style>
</head>
<body class="p-4">

    <div id="authSection" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-2xl mt-10 border-t-4 border-orange-500">
        <h2 id="authTitle" class="text-xl font-bold text-center mb-6 text-gray-800 uppercase tracking-widest">Seller Login</h2>
        
        <div class="space-y-4">
            <input type="text" id="logShopName" placeholder="শপের নাম" class="w-full border p-3 rounded-lg outline-none">
            <input type="password" id="logPass" placeholder="পাসওয়ার্ড দিন" class="w-full border p-3 rounded-lg outline-none">
            
            <button onclick="handleAuth()" id="authBtn" class="w-full bg-orange-600 text-white py-3 rounded-lg font-bold">লগইন করুন</button>
            
            <p class="text-center text-xs text-gray-500 mt-4">
                <span id="toggleText">একাউন্ট নেই?</span> 
                <button type="button" onclick="toggleAuth()" id="toggleBtn" class="text-orange-600 font-bold underline">নতুন একাউন্ট খুলুন</button>
            </p>
        </div>
    </div>

    <div id="dashboard" class="max-w-2xl mx-auto space-y-6 hidden mt-4">
        <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center border-l-4 border-orange-500">
            <div>
                <p class="text-[10px] text-gray-400 uppercase font-bold">Welcome,</p>
                <h2 id="displayShop" class="text-lg font-bold text-orange-600">Shop Name</h2>
            </div>
            <button onclick="logout()" class="text-red-500 text-[10px] font-bold border border-red-200 px-3 py-1 rounded-lg">Logout</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-orange-500">
            <h2 class="text-orange-600 font-bold mb-5 text-sm uppercase">নতুন পণ্য যোগ করুন</h2>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="পণ্যের নাম" class="w-full border p-2.5 rounded-lg text-sm">
                <input type="number" id="pPrice" placeholder="দাম" class="w-full border p-2.5 rounded-lg text-sm">
                <textarea id="pDesc" placeholder="বিবরণ..." class="w-full border p-2.5 rounded-lg h-20 text-sm"></textarea>
                <input type="file" id="pImage" multiple accept="image/*" class="text-xs">
                <button onclick="submitProduct()" id="uploadBtn" class="w-full orange-btn py-3 rounded-xl font-bold text-sm">পণ্য আপলোড করুন</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IG8NerMCC6zyxUJzZOautG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let isLoginMode = true;

        // এই ফাংশনটি এখন ১০০% কাজ করবে
        function toggleAuth() {
            isLoginMode = !isLoginMode;
            
            const title = document.getElementById('authTitle');
            const btn = document.getElementById('authBtn');
            const toggleT = document.getElementById('toggleText');
            const toggleB = document.getElementById('toggleBtn');

            if (!isLoginMode) {
                title.innerText = "Seller Registration";
                btn.innerText = "একাউন্ট তৈরি করুন";
                toggleT.innerText = "আগে থেকেই একাউন্ট আছে?";
                toggleB.innerText = "লগইন করুন";
            } else {
                title.innerText = "Seller Login";
                btn.innerText = "লগইন করুন";
                toggleT.innerText = "একাউন্ট নেই?";
                toggleB.innerText = "নতুন একাউন্ট খুলুন";
            }
        }

        async function handleAuth() {
            const name = document.getElementById('logShopName').value.trim();
            const pass = document.getElementById('logPass').value.trim();

            if(!name || !pass) return alert("নাম এবং পাসওয়ার্ড দিন!");

            if(isLoginMode) {
                db.ref('sellers/' + name).once('value', snap => {
                    const userData = snap.val();
                    if(snap.exists() && userData.password === pass) {
                        sessionStorage.setItem('seller_session', name);
                        showDashboard(name);
                    } else {
                        alert("ভুল নাম বা পাসওয়ার্ড!");
                    }
                });
            } else {
                // নতুন একাউন্ট তৈরি
                const sellerRef = db.ref('sellers/' + name);
                const snap = await sellerRef.once('value');
                if(snap.exists()) return alert("এই নামে একাউন্ট আছে!");

                await sellerRef.set({ password: pass, createdAt: Date.now() });
                alert("✅ একাউন্ট তৈরি হয়েছে! এখন লগইন করুন।");
                toggleAuth();
            }
        }

        function showDashboard(shopName) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('displayShop').innerText = shopName;
        }

        function logout() {
            sessionStorage.clear();
            location.reload();
        }

        async function submitProduct() {
            const shop = sessionStorage.getItem('seller_session');
            const fileInput = document.getElementById('pImage');
            const files = fileInput.files;
            const name = document.getElementById('pName').value.trim();
            const price = document.getElementById('pPrice').value.trim();
            const desc = document.getElementById('pDesc').value.trim();

            if(files.length === 0 || !name || !price) return alert("সব তথ্য দিন!");
            document.getElementById('uploadBtn').innerText = "আপলোড হচ্ছে...";

            try {
                const ref = storage.ref('products/' + Date.now() + "_" + files[0].name);
                const uploadTask = await ref.put(files[0]);
                const imageUrl = await uploadTask.ref.getDownloadURL();

                await db.ref('pending_products').push({
                    name, price: parseInt(price), description: desc,
                    imageUrl, seller: shop, status: "pending", timestamp: Date.now()
                });

                alert("🚀 পণ্যটি পেন্ডিংয়ে পাঠানো হয়েছে!");
                location.reload();
            } catch (e) {
                alert("ভুল: " + e.message);
                document.getElementById('uploadBtn').innerText = "পণ্য আপলোড করুন";
            }
        }

        window.onload = () => {
            const session = sessionStorage.getItem('seller_session');
            if(session) showDashboard(session);
        };
    </script>
</body>
</html>
