<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Portal - Ar RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-xl mx-auto space-y-6">
        <div id="authArea" class="bg-white p-8 rounded-3xl shadow-2xl border-t-8 border-slate-800 mt-10">
            <h2 class="text-xl font-bold text-slate-800 mb-6 text-center italic">Seller <span class="text-orange-600">Login</span></h2>
            <div class="space-y-4">
                <input type="text" id="authShopName" placeholder="আপনার শপের নাম লিখুন" class="w-full border-2 border-gray-100 p-4 rounded-2xl outline-none focus:border-orange-500">
                <button onclick="handleLogin()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-black transition">ড্যাশবোর্ডে ঢুকুন</button>
            </div>
        </div>

        <div id="dashboardArea" class="hidden space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center border-l-8 border-orange-600">
                <div>
                    <p class="text-[10px] text-gray-400 uppercase font-bold italic">Seller Dashboard</p>
                    <h2 id="displayShopName" class="text-lg font-bold text-slate-800 italic">...</h2>
                </div>
                <button onclick="handleLogout()" class="text-red-500 font-bold text-xs border border-red-50 px-5 py-2 rounded-xl">Logout</button>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-xl">
                <h2 class="text-orange-600 font-bold mb-5 flex items-center gap-2 text-sm uppercase italic">
                    <i class="fa-solid fa-circle-plus"></i> নতুন পণ্য যোগ করুন
                </h2>
                <div class="space-y-4">
                    <input type="text" id="pName" placeholder="পণ্যের নাম লিখুন" class="w-full border border-gray-100 p-3 rounded-xl outline-none focus:border-orange-500 text-sm">
                    <input type="number" id="pPrice" placeholder="মূল্য (৳)" class="w-full border border-gray-100 p-3 rounded-xl outline-none focus:border-orange-500 text-sm">
                    <input type="text" id="pColors" placeholder="কালার (উদা: লাল, নীল)" class="w-full border border-gray-100 p-3 rounded-xl outline-none focus:border-orange-500 text-sm">
                    <textarea id="pDesc" placeholder="পণ্যের বিস্তারিত বিবরণ..." class="w-full border border-gray-100 p-3 rounded-xl h-24 outline-none focus:border-orange-500 text-sm"></textarea>
                    
                    <div class="p-4 rounded-xl border-2 border-dashed border-gray-100 text-center bg-gray-50">
                        <input type="file" id="pImage" accept="image/*" class="text-xs w-full cursor-pointer">
                    </div>

                    <button onclick="submitProduct()" id="uploadBtn" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">পণ্য আপলোড করুন</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-md border-t-4 border-blue-600">
                <h2 class="text-blue-600 font-bold mb-4 flex items-center gap-2 uppercase text-[10px] italic">আপনার বর্তমান পণ্যসমূহ</h2>
                <div id="liveProductList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        // আপনার ফায়ারবেস কনফিগ
        const firebaseConfig = {
            apiKey: "AIzaSyDuoF0108YerBICZzydjjZzDawtG-BQLW8U",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ImgBB API Key
        const IMGBB_API_KEY = "9445100650946777093282f1f0a28f24"; 

        // ১. লগইন/লগআউট সিস্টেম
        function handleLogin() {
            const name = document.getElementById('authShopName').value.trim();
            if(name) {
                localStorage.setItem('active_seller', name);
                location.reload();
            } else { alert("দয়া করে শপের নাম লিখুন!"); }
        }

        function handleLogout() {
            localStorage.removeItem('active_seller');
            location.reload();
        }

        const currentSeller = localStorage.getItem('active_seller');
        if(currentSeller) {
            document.getElementById('authArea').classList.add('hidden');
            document.getElementById('dashboardArea').classList.remove('hidden');
            document.getElementById('displayShopName').innerText = currentSeller;
            loadMyProducts(currentSeller);
        }

        // ২. ImgBB-এর মাধ্যমে ছবি আপলোড
        async function submitProduct() {
            const fileInput = document.getElementById('pImage');
            const name = document.getElementById('pName').value.trim();
            const price = document.getElementById('pPrice').value.trim();
            const btn = document.getElementById('uploadBtn');

            if(fileInput.files.length === 0 || !name || !price) return alert("সব তথ্য পূরণ করুন!");
            btn.innerText = "আপলোড হচ্ছে..."; btn.disabled = true;

            try {
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);

                // ImgBB আপলোড
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                
                if(data.success) {
                    // ফায়ারবেসে ডাটা সেভ
                    await db.ref('pending_products').push({
                        name: name,
                        price: parseInt(price),
                        colors: document.getElementById('pColors').value,
                        description: document.getElementById('pDesc').value,
                        imageUrl: data.data.url,
                        seller: currentSeller,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });
                    alert("সফলভাবে আপলোড হয়েছে!");
                    location.reload();
                } else { throw new Error("Upload failed"); }

            } catch(e) { 
                alert("ভুল: " + e.message); 
                btn.disabled = false; btn.innerText = "পণ্য আপলোড করুন"; 
            }
        }

        function loadMyProducts(seller) {
            db.ref('live_products').on('value', snap => {
                const list = document.getElementById('liveProductList');
                list.innerHTML = "";
                snap.forEach(child => {
                    const p = child.val();
                    if(p.seller === seller) {
                        list.innerHTML += `
                            <div class="p-3 border rounded-xl flex items-center bg-white mb-2 shadow-sm">
                                <img src="${p.imageUrl}" class="w-10 h-10 rounded-lg object-cover mr-3 border">
                                <div class="flex-1 font-bold text-[11px]">${p.name}</div>
                            </div>`;
                    }
                });
            });
        }
    </script>
</body>
</html>
