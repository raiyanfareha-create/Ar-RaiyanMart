<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Center | Ar RaiyanMart</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .form-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #f85606; text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #f85606; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
        label { font-size: 14px; font-weight: bold; color: #555; display: block; margin-top: 10px; }
        #status { text-align: center; color: blue; font-weight: bold; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>সেলার প্যানেল</h2>
    <input type="text" id="shopName" placeholder="দোকানের নাম">
    <input type="text" id="pName" placeholder="পণ্যের নাম">
    <input type="number" id="pPrice" placeholder="দাম (৳)">
    
    <label>পণ্যের ছবি সিলেক্ট করুন:</label>
    <input type="file" id="pImage" accept="image/*">
    
    <textarea id="pDesc" rows="3" placeholder="পণ্যের বিবরণ"></textarea>
    
    <button id="submitBtn" onclick="handleUploadAndSend()">রিভিউয়ের জন্য পাঠান</button>
    <div id="status"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    // আপনার ফায়ারবেজ কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU",
        authDomain: "ar-raiyanmart.firebaseapp.com",
        projectId: "ar-raiyanmart",
        databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "ar-raiyanmart.firebasestorage.app",
        messagingSenderId: "336578883565",
        appId: "1:336578883565:web:54d73b82c96a26f38601e4"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    async function handleUploadAndSend() {
        const sName = document.getElementById('shopName').value;
        const pName = document.getElementById('pName').value;
        const pPrice = document.getElementById('pPrice').value;
        const fileInput = document.getElementById('pImage');
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('submitBtn');

        if (!sName || !pName || !pPrice || !fileInput.files[0]) {
            alert("দয়া করে সব তথ্য এবং ছবি দিন!");
            return;
        }

        btn.disabled = true;
        statusDiv.innerText = "ছবি আপলোড হচ্ছে... দয়া করে অপেক্ষা করুন।";

        // আপনার ImgBB API Key
        const apiKey = 'c01e05cfc3241e9f57336dc80cc38d0f';
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        try {
            // ১. ImgBB-তে ছবি আপলোড করা
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                const imageUrl = result.data.url;
                statusDiv.innerText = "ডাটাবেজে সেভ হচ্ছে...";

                // ২. ফায়ারবেজ ডাটাবেজে তথ্য পাঠানো
                await database.ref('pending_products').push({
                    shopName: sName,
                    name: pName,
                    price: pPrice,
                    img: imageUrl,
                    desc: document.getElementById('pDesc').value,
                    status: "pending",
                    time: Date.now()
                });

                statusDiv.style.color = "green";
                statusDiv.innerText = "সফলভাবে পাঠানো হয়েছে!";
                
                // ফর্ম ক্লিয়ার করা
                document.getElementById('pName').value = "";
                document.getElementById('pPrice').value = "";
                document.getElementById('pImage').value = "";
                document.getElementById('pDesc').value = "";
            }
        } catch (error) {
            statusDiv.style.color = "red";
            statusDiv.innerText = "ব্যর্থ হয়েছে! আবার চেষ্টা করুন।";
            console.error(error);
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
