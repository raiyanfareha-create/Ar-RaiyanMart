<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Ar RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
        .orange-btn { background-color: #ff5722; color: white; transition: 0.3s; }
        .orange-btn:hover { background-color: #e64a19; }
    </style>
</head>
<body class="p-4">

    <div id="authSection" class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-2xl mt-10 border-t-4 border-orange-500">
        <h2 id="authTitle" class="text-xl font-bold text-center mb-6 text-gray-800 uppercase tracking-widest">Seller Login</h2>
        
        <div class="space-y-4">
            <input type="text" id="logShopName" placeholder="শপের নাম (যেমন: Pure Mart)" class="w-full border p-3 rounded-lg outline-none">
            <input type="password" id="logPass" placeholder="পাসওয়ার্ড দিন" class="w-full border p-3 rounded-lg outline-none">
            
            <button onclick="handleAuth()" id="authBtn" class="w-full bg-orange-600 text-white py-3 rounded-lg font-bold">লগইন করুন</button>
            
            <p class="text-center text-xs text-gray-500 mt-4">
                <span id="toggleText">একাউন্ট নেই?</span> 
                <button onclick="toggleAuth()" id="toggleBtn" class="text-orange-600 font-bold underline">নতুন একাউন্ট খুলুন</button>
            </p>
        </div>
    </div>

    <div id="dashboard" class="max-w-2xl mx-auto space-y-6 hidden mt-4">
        <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center border-l-4 border-orange-500">
            <div>
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-tighter">Welcome back,</p>
                <h2 id="displayShop" class="text-lg font-bold text-gray-800 tracking-tight text-orange-600">Shop Name</h2>
            </div>
            <button onclick="logout()" class="text-red-500 text-[10px] font-bold border border-red-200 px-3 py-1 rounded-lg">Logout</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-orange-500">
            <h2 class="text-orange-600 font-bold mb-5 text-sm uppercase flex items-center gap-2">
                <i class="fa-solid fa-plus-circle"></i> নতুন পণ্য যোগ করুন
            </h2>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="পণ্যের নাম" class="w-full border p-2.5 rounded-lg text-sm outline-none">
                <input type="number" id="pPrice" placeholder="দাম (৳)" class="w-full border p-2.5 rounded-lg text-sm outline-none">
                <textarea id="pDesc" placeholder="পণ্যের বিবরণ..." class="w-full border p-2.5 rounded-lg h-24 text-sm outline-none"></textarea>
                
                <div class="bg-orange-50 p-3 rounded-lg border border-orange-100">
                    <p class="text-[11px] text-orange-700 mb-2">পণ্যের ছবি সিলেক্ট করুন (একাধিক):</p>
                    <input type="file" id="pImage" multiple accept="image/*" class="w-full text-[10px] file:mr-3 file:py-1 file:px-2 file:rounded file:border-0 file:bg-orange-600 file:text-white">
                </div>
                
                <button onclick="submitProduct()" id="uploadBtn" class="w-full orange-btn py-3.5 rounded-xl font-bold uppercase tracking-wider shadow-lg text-sm">পণ্য আপলোড করুন</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500">
            <h2 class="text-blue-600 font-bold mb-4 text-sm uppercase flex items-center gap-2">
                <i class="fa-solid fa-boxes-stacked"></i> আপনার লাইভ পণ্যসমূহ
            </h2>
            <div id="liveProductList" class="space-y-3">
                <p class="text-center text-gray-400 text-[11px] italic py-3">লোড হচ্ছে...</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-xl shadow text-center border-b-2 border-orange-400">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">নতুন অর্ডার</p>
                <div id="orders" class="text-xs font-semibold text-gray-600 italic tracking-tighter">অর্ডার নেই...</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow text-center border-b-2 border-blue-400">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">নতুন মেসেজ</p>
                <div id="queries" class="text-xs font-semibold text-gray-600 italic tracking-tighter">মেসেজ নেই...</div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IG8NerMCC6zyxUJzZOautG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let isLoginMode = true;

        // এই ফাংশনটি এখন ঠিকমতো কাজ করবে
        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "Seller Login" : "Seller Registration";
            document.getElementById('authBtn').innerText = isLoginMode ? "লগইন করুন" : "একাউন্ট তৈরি করুন";
            document.getElementById('toggleText').innerText = isLoginMode ? "একাউন্ট নেই?" : "আগে থেকেই একাউন্ট আছে?";
            document.getElementById('toggleBtn').innerText = isLoginMode ? "নতুন একাউন্ট খুলুন" : "লগইন করুন";
        }

        async function handleAuth() {
            const name = document.getElementById('logShopName').value.trim();
            const pass = document.getElementById('logPass').value.trim();

            if(!name || !pass) return alert("দয়া করে শপের নাম এবং পাসওয়ার্ড দিন!");

            const sellerRef = db.ref('sellers/' + name);

            if(isLoginMode) {
                // লগইন লজিক
                sellerRef.once('value', snap => {
                    const userData = snap.val();
                    if(snap.exists() && userData.password === pass) {
                        sessionStorage.setItem('seller_session', name);
                        showDashboard(name);
                    } else {
                        alert("ভুল শপ নেম বা পাসওয়ার্ড!");
                    }
                });
            } else {
                // রেজিস্ট্রেশন লজিক
                const snap = await sellerRef.once('value');
                if(snap.exists()) return alert("এই নামে আগে থেকেই একাউন্ট আছে!");

                await sellerRef.set({
                    password: pass,
                    createdAt: Date.now()
                });
                alert("✅ অভিনন্দন! একাউন্ট তৈরি হয়েছে। এখন লগইন করুন।");
                toggleAuth();
            }
        }

        function showDashboard(shopName) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('displayShop').innerText = shopName;
            loadMyProducts(shopName);
        }

        function logout() {
            sessionStorage.clear();
            location.reload();
        }

        async function submitProduct() {
            const shop = sessionStorage.getItem('seller_session');
            const fileInput = document.getElementById('pImage');
            const files = fileInput.files;
            const name = document.getElementById('pName').value.trim();
            const price = document.getElementById('pPrice').value.trim();
            const desc = document.getElementById('pDesc').value.trim();
            const btn = document.getElementById('uploadBtn');

            if(files.length === 0 || !name || !price) return alert("সব তথ্য পূরণ করুন!");
            btn.innerText = "আপলোড হচ্ছে..."; btn.disabled = true;

            try {
                let imageUrls = [];
                for (let i = 0; i < files.length; i++) {
                    const ref = storage.ref('products/' + Date.now() + "_" + files[i].name);
                    const uploadTask = await ref.put(files[i]);
                    imageUrls.push(await uploadTask.ref.getDownloadURL());
                }

                await db.ref('pending_products').push({
                    name, price: parseInt(price), description: desc,
                    imageUrl: imageUrls[0], allImages: imageUrls,
                    seller: shop, status: "pending", timestamp: Date.now()
                });

                alert("🚀 পণ্যটি পেন্ডিংয়ে পাঠানো হয়েছে!");
                location.reload();
            } catch (e) {
                alert("Error: " + e.message);
                btn.disabled = false;
            }
        }

        function loadMyProducts(shop) {
            const listDiv = document.getElementById('liveProductList');
            db.ref('live_products').on('value', snap => {
                listDiv.innerHTML = "";
                let count = 0;
                snap.forEach(child => {
                    const p = child.val();
                    if(p.seller === shop) {
                        count++;
                        listDiv.innerHTML += `
                            <div class="flex items-center gap-4 p-3 border rounded-xl bg-white shadow-sm transition">
                                <img src="${p.imageUrl}" class="w-12 h-12 rounded-lg object-cover">
                                <div class="flex-1">
                                    <h4 class="font-bold text-xs text-gray-800">${p.name}</h4>
                                    <p class="text-orange-600 font-bold text-[10px]">৳ ${p.price}</p>
                                </div>
                            </div>`;
                    }
                });
                if(count === 0) listDiv.innerHTML = "<p class='text-center text-gray-400 text-[10px] italic py-3'>কোনো পণ্য লাইভ নেই...</p>";
            });
        }

        window.onload = () => {
            const session = sessionStorage.getItem('seller_session');
            if(session) showDashboard(session);
        };
    </script>
</body>
</html>
