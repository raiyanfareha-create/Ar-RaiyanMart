<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f4f7f6; }
        .orange-btn { background-color: #ff5722; color: white; transition: 0.3s; }
        .orange-btn:hover { background-color: #e64a19; }
        .orange-btn:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto space-y-6">
        
        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-orange-500">
            <h2 class="text-orange-600 font-bold mb-4 uppercase text-sm tracking-wide">Shop Profile</h2>
            <input type="text" id="shopName" placeholder="আপনার শপের নাম লিখুন (যেমন: Pure Mart)" class="w-full border p-2 rounded mb-3 outline-none focus:ring-1 focus:ring-orange-400">
            <button onclick="saveProfile()" class="w-full bg-zinc-800 text-white py-2 rounded font-bold text-sm hover:bg-black transition">প্রোফাইল সেভ করুন</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-orange-500">
            <h2 class="text-orange-600 font-bold mb-6">নতুন পণ্য যোগ করুন</h2>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="পণ্যের নাম" class="w-full border p-2.5 rounded outline-none focus:ring-1 focus:ring-orange-400">
                
                <input type="number" id="pPrice" placeholder="দাম (৳)" class="w-full border p-2.5 rounded outline-none focus:ring-1 focus:ring-orange-400">
                
                <input type="text" id="pColor" placeholder="কালারগুলো লিখুন (যেমন: Red, Blue, Black)" class="w-full border p-2.5 rounded outline-none focus:ring-1 focus:ring-orange-400">
                
                <textarea id="pDesc" placeholder="পণ্যের বিবরণ লিখুন..." class="w-full border p-2.5 rounded h-28 outline-none focus:ring-1 focus:ring-orange-400"></textarea>
                
                <div class="bg-orange-50 p-3 rounded-lg border border-orange-100">
                    <p class="text-[12px] font-bold text-orange-700 mb-2">পণ্যের ছবি সিলেক্ট করুন (একাধিক সম্ভব):</p>
                    <input type="file" id="pImage" multiple accept="image/*" class="w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:bg-orange-600 file:text-white hover:file:bg-orange-700 cursor-pointer">
                </div>
                
                <button onclick="submitProduct()" id="uploadBtn" class="w-full orange-btn py-4 rounded-xl font-bold mt-4 shadow-lg uppercase tracking-wider text-sm">রিভিউয়ের জন্য পাঠান</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-orange-500">
            <h2 class="text-orange-600 font-bold mb-4">কাস্টমারদের প্রশ্নসমূহ</h2>
            <div id="queries" class="text-gray-400 italic text-center py-4 text-sm font-semibold">লোড হচ্ছে...</div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-orange-500">
            <h2 class="text-orange-600 font-bold mb-4">আপনার শপের অর্ডারসমূহ</h2>
            <div id="orders" class="text-gray-400 italic text-center py-4 text-sm font-semibold">লোড হচ্ছে...</div>
        </div>

    </div>

    <script>
        // আপনার অরিজিনাল Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IG8NerMCC6zyxUJzZOautG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // ১. শপের নাম সেভ করা (LocalStorage এ রাখা হচ্ছে যাতে বারবার লিখতে না হয়)
        function saveProfile() {
            const name = document.getElementById('shopName').value;
            if(!name) return alert("দয়া করে দোকানের নাম লিখুন!");
            localStorage.setItem('raiyan_shop_name', name);
            alert("✅ প্রোফাইল সফলভাবে সেভ হয়েছে!");
        }

        // ২. একাধিক ছবিসহ পণ্য আপলোড ফাংশন
        async function submitProduct() {
            const fileInput = document.getElementById('pImage');
            const files = fileInput.files;
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const color = document.getElementById('pColor').value;
            const desc = document.getElementById('pDesc').value;
            const shop = localStorage.getItem('raiyan_shop_name') || "RaiyanMart Seller";
            const btn = document.getElementById('uploadBtn');

            if(files.length === 0 || !name || !price) {
                return alert("দয়া করে নাম, দাম এবং অন্তত একটি ছবি সিলেক্ট করুন!");
            }

            btn.innerText = "ছবিগুলো আপলোড হচ্ছে... (" + files.length + ")";
            btn.disabled = true;

            try {
                let imageUrls = [];

                // লুপ চালিয়ে প্রতিটি ছবি আপলোড করা
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const storagePath = 'products/' + Date.now() + "_" + file.name;
                    const ref = storage.ref(storagePath);
                    
                    const uploadTask = await ref.put(file);
                    const downloadURL = await uploadTask.ref.getDownloadURL();
                    imageUrls.push(downloadURL);
                }

                // ডাটাবেসে তথ্য সেভ (pending_products ফোল্ডারে যাবে রিভিউ এর জন্য)
                await db.ref('pending_products').push({
                    name: name,
                    price: parseInt(price),
                    color: color,
                    description: desc,
                    imageUrl: imageUrls[0], // প্রথম ছবিটিকে থাম্বনেইল হিসেবে রাখা হলো
                    allImages: imageUrls,    // সব ছবির লিস্ট
                    seller: shop,
                    status: "pending",
                    timestamp: Date.now()
                });

                alert("🎉 অভিনন্দন! পণ্যটি রিভিউয়ের জন্য পাঠানো হয়েছে।");
                location.reload();

            } catch(error) {
                console.error(error);
                alert("দুঃখিত, কোনো সমস্যা হয়েছে: " + error.message);
                btn.innerText = "আবার চেষ্টা করুন";
                btn.disabled = false;
            }
        }

        // ৩. রিয়েলটাইম ডাটা আপডেট (লোড হওয়া টেক্সট পরিবর্তন)
        db.ref('orders').limitToLast(1).on('value', snap => {
            document.getElementById('orders').innerText = snap.exists() ? "অর্ডার লিস্ট চেক করুন" : "বর্তমানে কোনো অর্ডার নেই";
        });
        
        db.ref('comments').limitToLast(1).on('value', snap => {
            document.getElementById('queries').innerText = snap.exists() ? "নতুন কাস্টমার মেসেজ আছে" : "কোনো প্রশ্ন নেই";
        });

        // পেজ লোড হলে আগের সেভ করা নাম দেখানো
        window.onload = () => {
            const savedName = localStorage.getItem('raiyan_shop_name');
            if(savedName) document.getElementById('shopName').value = savedName;
        };

    </script>
</body>
</html>
