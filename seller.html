<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Panel - Ar RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .upload-card { border: 2px dashed #e2e8f0; transition: 0.3s; }
        .upload-card:hover { border-color: #ea580c; background: #fff7ed; }
    </style>
</head>
<body class="p-4">

    <div id="dashboard" class="max-w-xl mx-auto space-y-6">
        <div class="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center border-l-8 border-orange-600">
            <div>
                <p class="text-[10px] text-gray-400 uppercase font-bold">WELCOME,</p>
                <h2 id="displayShop" class="text-lg font-bold text-slate-800">Fariha</h2>
            </div>
            <button onclick="location.reload()" class="text-red-500 font-bold text-xs border border-red-100 px-4 py-2 rounded-xl hover:bg-red-50 transition">Logout</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg">
            <h2 class="text-orange-600 font-bold mb-5 flex items-center gap-2">
                <i class="fa-solid fa-circle-plus"></i> নতুন পণ্য যোগ করুন
            </h2>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="পণ্যের নাম (যেমন: Sharara dress)" class="w-full border p-3 rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                <input type="number" id="pPrice" placeholder="মূল্য (৳)" class="w-full border p-3 rounded-xl outline-none">
                <input type="text" id="pColors" placeholder="কালার (যেমন: Black, Purple, Merun)" class="w-full border p-3 rounded-xl outline-none">
                <textarea id="pDesc" placeholder="পণ্যের বিস্তারিত বিবরণ..." class="w-full border p-3 rounded-xl h-24 outline-none"></textarea>
                
                <div class="upload-card p-4 rounded-xl text-center">
                    <p class="text-xs text-gray-500 mb-2 font-bold">ছবি সিলেক্ট করুন (একাধিক সম্ভব):</p>
                    <input type="file" id="pImage" multiple accept="image/*" class="text-xs cursor-pointer">
                </div>

                <button onclick="submitProduct()" id="uploadBtn" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-orange-200 shadow-lg hover:bg-orange-700 transition">
                    পণ্য আপলোড করুন
                </button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg border-t-4 border-blue-600">
            <h2 class="text-blue-600 font-bold mb-4 flex items-center gap-2 uppercase text-xs">
                <i class="fa-solid fa-boxes-stacked"></i> আপনার পণ্যসমূহ
            </h2>
            <div id="liveProductList" class="space-y-3">
                <p class="text-center text-gray-400 text-xs italic py-4">লোড হচ্ছে...</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDuoF0108YerBICZzydjjZzDawtG-BQLW8U",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // ১. পণ্য আপলোড করার ফাংশন (Image Fix)
        async function submitProduct() {
            const shop = "Fariha"; // আপনার শপের নাম
            const files = document.getElementById('pImage').files;
            const name = document.getElementById('pName').value.trim();
            const price = document.getElementById('pPrice').value.trim();
            const colors = document.getElementById('pColors').value.trim();
            const desc = document.getElementById('pDesc').value.trim();
            const btn = document.getElementById('uploadBtn');

            if(files.length === 0 || !name || !price) return alert("দয়া করে নাম, দাম এবং অন্তত একটি ছবি দিন!");
            
            btn.innerText = "আপলোড হচ্ছে..."; 
            btn.disabled = true;

            try {
                let imageUrls = [];
                for(let i=0; i<files.length; i++) {
                    const ref = storage.ref('products/' + Date.now() + "_" + i + ".jpg");
                    const task = await ref.put(files[i]);
                    const url = await task.ref.getDownloadURL();
                    imageUrls.push(url);
                }

                // ডাটাবেজে সঠিক প্রপার্টি 'imageUrl' নামে ডাটা পাঠানো হচ্ছে
                await db.ref('pending_products').push({
                    name: name,
                    price: parseInt(price),
                    colors: colors,
                    description: desc,
                    imageUrl: imageUrls[0], // মেইন ছবি
                    allImages: imageUrls,   // বাকি সব ছবি
                    seller: shop,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                alert("সাফল্যের সাথে অ্যাডমিন প্যানেলে পাঠানো হয়েছে!");
                location.reload();
            } catch(e) { 
                alert("ত্রুটি: " + e.message); 
                btn.disabled = false; 
                btn.innerText = "পণ্য আপলোড করুন";
            }
        }

        // ২. পণ্য লোড করার সময় ডেলিভারি স্ট্যাটাস দেখানো
        function loadMyProducts() {
            const shop = "Fariha"; 
            db.ref('live_products').on('value', snap => {
                const list = document.getElementById('liveProductList');
                list.innerHTML = "";
                if (!snap.exists()) {
                    list.innerHTML = "<p class='text-center text-gray-400 text-[10px] py-4'>কোনো লাইভ পণ্য নেই।</p>";
                    return;
                }

                snap.forEach(child => {
                    const p = child.val();
                    if(p.seller === shop) {
                        // অর্ডার স্ট্যাটাস চেক
                        db.ref('orders').orderByChild('productName').equalTo(p.name).once('value', orderSnap => {
                            let badge = "";
                            orderSnap.forEach(oChild => {
                                if(oChild.val().status === 'Delivered ✅') {
                                    badge = '<span class="ml-2 bg-green-100 text-green-600 text-[8px] px-2 py-0.5 rounded-full font-bold">DELIVERED</span>';
                                }
                            });

                            list.innerHTML += `
                                <div class="p-3 border rounded-xl flex items-center bg-white shadow-sm mb-2">
                                    <img src="${p.imageUrl}" class="w-12 h-12 rounded-lg object-cover mr-3 border" onerror="this.src='https://via.placeholder.com/50'">
                                    <div class="flex-1">
                                        <h4 class="font-bold text-xs flex items-center">${p.name} ${badge}</h4>
                                        <p class="text-orange-600 font-bold text-[10px]">৳ ${p.price}</p>
                                    </div>
                                    <button onclick="deleteProduct('${child.key}')" class="text-red-400 p-2 hover:text-red-600">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </div>`;
                        });
                    }
                });
            });
        }

        function deleteProduct(id) {
            if(confirm("আপনি কি নিশ্চিত এই পণ্যটি ডিলিট করবেন?")) {
                db.ref('live_products/' + id).remove();
            }
        }

        window.onload = loadMyProducts;
    </script>
</body>
</html>
