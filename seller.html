<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Center | Ar RaiyanMart</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .form-card, .qa-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; margin-bottom: 20px; }
        h2, h3 { color: #f85606; text-align: center; margin-top: 0; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #f85606; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 5px; }
        button:disabled { background: #ccc; }
        label { font-size: 14px; font-weight: bold; color: #555; display: block; margin-top: 10px; }
        #status { text-align: center; color: blue; font-weight: bold; margin-top: 10px; font-size: 14px; }
        
        /* প্রশ্ন সেকশন স্টাইল */
        .q-box { background: #fff8f5; border: 1px solid #ffd8c4; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .q-text { font-size: 14px; color: #333; margin-bottom: 8px; }
        .q-item-name { font-size: 12px; color: #f85606; font-weight: bold; }
        .reply-input { font-size: 13px; padding: 8px; }
        .reply-btn { background: #25D366; padding: 8px; font-size: 13px; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>পণ্য আপলোড করুন</h2>
    <input type="text" id="shopName" placeholder="আপনার দোকানের নাম (সঠিকভাবে লিখুন)">
    <input type="text" id="pName" placeholder="পণ্যের নাম">
    <input type="number" id="pPrice" placeholder="দাম (৳)">
    
    <label>পণ্যের ছবি সিলেক্ট করুন:</label>
    <input type="file" id="pImage" accept="image/*">
    
    <textarea id="pDesc" rows="3" placeholder="পণ্যের বিবরণ"></textarea>
    
    <button id="submitBtn" onclick="handleUploadAndSend()">রিভিউয়ের জন্য পাঠান</button>
    <div id="status"></div>
</div>

<div class="qa-card">
    <h3>কাস্টমারদের প্রশ্ন</h3>
    <p style="font-size: 12px; text-align: center; color: #666;">আপনার দোকানের নাম লিখে 'চেক করুন' বাটনে চাপ দিন</p>
    <button onclick="loadSellerQuestions()" style="background: #333; margin-bottom: 15px;">প্রশ্নগুলো দেখুন</button>
    <div id="questionList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU",
        authDomain: "ar-raiyanmart.firebaseapp.com",
        projectId: "ar-raiyanmart",
        databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "ar-raiyanmart.firebasestorage.app",
        messagingSenderId: "336578883565",
        appId: "1:336578883565:web:54d73b82c96a26f38601e4"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- আপলোড ফাংশন ---
    async function handleUploadAndSend() {
        const sName = document.getElementById('shopName').value;
        const pName = document.getElementById('pName').value;
        const pPrice = document.getElementById('pPrice').value;
        const pDescription = document.getElementById('pDesc').value;
        const fileInput = document.getElementById('pImage');
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('submitBtn');

        if (!sName || !pName || !pPrice || !fileInput.files[0]) {
            alert("সব তথ্য দিন!"); return;
        }

        btn.disabled = true;
        statusDiv.innerText = "ছবি আপলোড হচ্ছে...";

        const apiKey = 'c01e05cfc3241e9f57336dc80cc38d0f';
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                await database.ref('pending_products').push({
                    shopName: sName,
                    name: pName,
                    price: pPrice,
                    img: result.data.url,
                    desc: pDescription,
                    status: "pending",
                    time: Date.now()
                });
                statusDiv.style.color = "green";
                statusDiv.innerText = "সফলভাবে রিভিউতে পাঠানো হয়েছে!";
            }
        } catch (error) {
            statusDiv.innerText = "ব্যর্থ হয়েছে!";
        } finally {
            btn.disabled = false;
        }
    }

    // --- প্রশ্ন লোড করার ফাংশন ---
    function loadSellerQuestions() {
        const sName = document.getElementById('shopName').value;
        if (!sName) { alert("আগে আপনার দোকানের নাম লিখুন!"); return; }

        const qList = document.getElementById('questionList');
        qList.innerHTML = "খোঁজা হচ্ছে...";

        database.ref('live_products').on('value', (snapshot) => {
            qList.innerHTML = "";
            const products = snapshot.val();
            if (!products) return;

            let foundAny = false;
            Object.keys(products).forEach(pid => {
                const p = products[pid];
                // সেলারের নাম চেক করা হচ্ছে
                if (p.shopName === sName && p.comments) {
                    foundAny = true;
                    Object.keys(p.comments).forEach(cid => {
                        const c = p.comments[cid];
                        qList.innerHTML += `
                            <div class="q-box">
                                <div class="q-item-name">পণ্য: ${p.name}</div>
                                <div class="q-text"><b>${c.user}:</b> ${c.text}</div>
                                <input type="text" id="rep-${cid}" class="reply-input" placeholder="উত্তরের জায়গায় লিখুন..." value="${c.reply || ''}">
                                <button class="reply-btn" onclick="sendReply('${pid}', '${cid}')">উত্তর সেভ করুন</button>
                            </div>`;
                    });
                }
            });
            if (!foundAny) qList.innerHTML = "<p style='font-size:13px; color:red;'>কোনো প্রশ্ন পাওয়া যায়নি।</p>";
        });
    }

    // --- উত্তর পাঠানোর ফাংশন ---
    function sendReply(pid, cid) {
        const replyText = document.getElementById(`rep-${cid}`).value;
        if (!replyText) { alert("উত্তর লিখুন!"); return; }

        database.ref(`live_products/${pid}/comments/${cid}/reply`).set(replyText)
        .then(() => alert("উত্তর সফলভাবে সেভ হয়েছে! কাস্টমার এখন এটি দেখতে পাবে।"));
    }
</script>

</body>
</html>
