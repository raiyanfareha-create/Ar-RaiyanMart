<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Portal - Ar RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
        input, textarea { border: 1px solid #f1f5f9 !important; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-xl mx-auto space-y-6">
        <div id="authArea" class="bg-white p-8 rounded-3xl shadow-2xl border-t-8 border-slate-800 mt-10">
            <div class="text-center mb-6">
                <h2 id="authTitle" class="text-xl font-bold text-slate-800 italic">Seller <span class="text-orange-600">Login</span></h2>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Ar RaiyanMart</p>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="authShopName" placeholder="আপনার শপের নাম" class="w-full p-4 rounded-2xl outline-none focus:border-orange-500 bg-gray-50">
                <input type="password" id="authPassword" placeholder="পাসওয়ার্ড" class="w-full p-4 rounded-2xl outline-none focus:border-orange-500 bg-gray-50">
                
                <div id="loginBtns">
                    <button onclick="handleLogin()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold shadow-lg">লগইন করুন</button>
                    <p class="text-center text-[11px] text-gray-400 font-bold mt-4">নতুন সেলার? <button onclick="toggleAuth(true)" class="text-orange-600 underline">রেজিস্ট্রেশন করুন</button></p>
                </div>
                
                <div id="signupBtns" class="hidden">
                    <button onclick="handleSignup()" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg">অ্যাকাউন্ট খুলুন</button>
                    <p class="text-center text-[11px] text-gray-400 font-bold mt-4">অ্যাকাউন্ট আছে? <button onclick="toggleAuth(false)" class="text-slate-800 underline">লগইন করুন</button></p>
                </div>
            </div>
        </div>

        <div id="dashboardArea" class="hidden space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center border-l-8 border-orange-600">
                <div>
                    <p class="text-[9px] text-gray-400 uppercase font-bold italic">Active Seller</p>
                    <h2 id="displayShopName" class="text-lg font-bold text-slate-800 italic">...</h2>
                </div>
                <button onclick="handleLogout()" class="text-red-500 font-bold text-[10px] border border-red-50 px-4 py-2 rounded-xl uppercase italic">Logout</button>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-xl">
                <h2 class="text-orange-600 font-bold mb-5 flex items-center gap-2 text-sm uppercase italic">
                    <i class="fa-solid fa-plus-circle"></i> নতুন পণ্য আপলোড
                </h2>
                <div class="space-y-4">
                    <input type="text" id="pName" placeholder="পণ্যের নাম" class="w-full p-3 rounded-xl outline-none text-sm bg-gray-50">
                    <input type="number" id="pPrice" placeholder="মূল্য (৳)" class="w-full p-3 rounded-xl outline-none text-sm bg-gray-50">
                    
                    <input type="text" id="pColors" placeholder="কালার (যেমন: লাল, নীল, কালো)" class="w-full p-3 rounded-xl outline-none text-sm bg-gray-50">
                    
                    <textarea id="pDesc" placeholder="বিস্তারিত বিবরণ..." class="w-full p-3 rounded-xl h-24 outline-none text-sm bg-gray-50"></textarea>
                    
                    <div class="p-4 rounded-xl border-2 border-dashed border-gray-200 text-center bg-gray-50">
                        <input type="file" id="pImage" accept="image/*" class="text-[10px] w-full">
                        <p class="text-[9px] text-gray-400 mt-2 italic">পণ্যের ছবি সিলেক্ট করুন</p>
                    </div>

                    <button onclick="submitProduct()" id="uploadBtn" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg uppercase italic tracking-wider">অ্যাডমিনকে পাঠান</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-md border-t-4 border-green-500">
                <h2 class="text-green-600 font-bold mb-4 flex items-center gap-2 uppercase text-[10px] italic">
                    <i class="fa-solid fa-truck-fast"></i> ডেলিভারি রিপোর্ট
                </h2>
                <div id="deliveryHistory" class="space-y-3">
                    <p class="text-center text-gray-400 text-[10px] italic">কোনো ডেলিভারি সম্পন্ন হয়নি</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDuoF0108YerBICZzydjjZzDawtG-BQLW8U",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ImgBB API Key
        const IMGBB_API_KEY = "c01e05cfc3241e9f57336dc80cc38d0f"; 

        // লগইন ও রেজিস্ট্রেশন পেজ সুইচ
        function toggleAuth(isSignup) {
            document.getElementById('authTitle').innerHTML = isSignup ? 'Seller <span class="text-orange-600">Sign Up</span>' : 'Seller <span class="text-orange-600">Login</span>';
            document.getElementById('loginBtns').classList.toggle('hidden', isSignup);
            document.getElementById('signupBtns').classList.toggle('hidden', !isSignup);
        }

        // নতুন সেলার রেজিস্ট্রেশন
        function handleSignup() {
            const name = document.getElementById('authShopName').value.trim();
            const pass = document.getElementById('authPassword').value.trim();
            if(!name || !pass) return alert("দয়া করে সব তথ্য দিন!");
            
            db.ref('sellers/' + name).set({ password: pass }).then(() => {
                alert("রেজিস্ট্রেশন সফল! এখন লগইন করুন।");
                toggleAuth(false);
            });
        }

        // সেলার লগইন
        function handleLogin() {
            const name = document.getElementById('authShopName').value.trim();
            const pass = document.getElementById('authPassword').value.trim();
            
            db.ref('sellers/' + name).once('value', snap => {
                if(snap.exists() && snap.val().password === pass) {
                    localStorage.setItem('active_seller', name);
                    showDashboard(name);
                } else {
                    alert("ভুল শপের নাম বা পাসওয়ার্ড!");
                }
            });
        }

        // ড্যাশবোর্ড প্রদর্শন
        function showDashboard(name) {
            document.getElementById('authArea').classList.add('hidden');
            document.getElementById('dashboardArea').classList.remove('hidden');
            document.getElementById('displayShopName').innerText = name;
            loadDeliveryHistory(name);
        }

        // পেজ লোড হলে চেক করা
        const checkUser = localStorage.getItem('active_seller');
        if(checkUser) showDashboard(checkUser);

        // লগআউট
        function handleLogout() {
            localStorage.removeItem('active_seller');
            location.reload();
        }

        // পণ্য আপলোড ও অ্যাডমিন প্যানেলে পাঠানো
        async function submitProduct() {
            const fileInput = document.getElementById('pImage');
            const name = document.getElementById('pName').value.trim();
            const price = document.getElementById('pPrice').value.trim();
            const colors = document.getElementById('pColors').value.trim();
            const desc = document.getElementById('pDesc').value.trim();
            const btn = document.getElementById('uploadBtn');

            if(!fileInput.files[0] || !name || !price) return alert("ছবি, নাম এবং মূল্য অবশ্যই দিতে হবে!");
            
            btn.innerText = "প্রসেসিং হচ্ছে..."; 
            btn.disabled = true;

            try {
                // ছবি আপলোড
                let formData = new FormData();
                formData.append("image", fileInput.files[0]);
                
                let res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                let data = await res.json();

                if(data.success) {
                    // ডাটাবেজে সেভ
                    await db.ref('pending_products').push({
                        name: name,
                        price: parseInt(price),
                        colors: colors,
                        description: desc,
                        imageUrl: data.data.url, 
                        sellerName: localStorage.getItem('active_seller'),
                        timestamp: Date.now()
                    });
                    alert("পণ্যটি অনুমোদনের জন্য অ্যাডমিনের কাছে পাঠানো হয়েছে!");
                    location.reload();
                } else {
                    alert("ছবি আপলোড হতে পারেনি!");
                    btn.disabled = false;
                    btn.innerText = "অ্যাডমিনকে পাঠান";
                }
            } catch(e) { 
                alert("এরর: " + e.message); 
                btn.disabled = false;
                btn.innerText = "অ্যাডমিনকে পাঠান";
            }
        }

        // ডেলিভারি হিস্ট্রি চেক করা
        function loadDeliveryHistory(seller) {
            db.ref('orders').on('value', snap => {
                const list = document.getElementById('deliveryHistory');
                list.innerHTML = "";
                let hasData = false;
                
                snap.forEach(child => {
                    const o = child.val();
                    // অ্যাডমিন প্যানেলে যখন 'Mark as Delivered' করা হবে
                    if(o.sellerName === seller && o.status === 'Delivered') {
                        hasData = true;
                        list.innerHTML += `
                            <div class="p-3 bg-green-50 border border-green-100 rounded-xl flex justify-between items-center shadow-sm">
                                <div class="text-[10px] font-bold text-slate-700">${o.productName}</div>
                                <span class="text-[8px] bg-green-600 text-white px-2 py-1 rounded font-bold uppercase tracking-tighter">Delivered</span>
                            </div>`;
                    }
                });
                
                if(!hasData) {
                    list.innerHTML = '<p class="text-center text-gray-300 text-[10px] italic">কোনো ডেলিভারি তথ্য পাওয়া যায়নি</p>';
                }
            });
        }
    </script>
</body>
</html>
