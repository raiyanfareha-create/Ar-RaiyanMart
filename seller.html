<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Portal - Ar RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-xl mx-auto space-y-6">
        <div id="authArea" class="bg-white p-8 rounded-3xl shadow-2xl border-t-8 border-slate-800 mt-10">
            <h2 class="text-xl font-bold text-slate-800 mb-6 text-center italic uppercase tracking-wider">Seller <span class="text-orange-600">Login</span></h2>
            <div class="space-y-4">
                <input type="text" id="authShopName" placeholder="শপের সঠিক নাম দিন" class="w-full border-2 p-4 rounded-2xl outline-none focus:border-orange-500">
                <input type="password" id="authPassword" placeholder="পাসওয়ার্ড" class="w-full border-2 p-4 rounded-2xl outline-none focus:border-orange-500">
                <button onclick="handleLogin()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-bold shadow-lg uppercase">Login</button>
            </div>
        </div>

        <div id="dashboardArea" class="hidden space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center border-l-8 border-orange-600">
                <h2 id="displayShopName" class="text-lg font-bold text-slate-800 italic uppercase">...</h2>
                <button onclick="handleLogout()" class="text-red-500 font-bold text-xs border px-4 py-2 rounded-xl italic">Logout</button>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-xl border-t-4 border-blue-500">
                <h2 class="text-blue-600 font-bold mb-4 text-sm uppercase italic"><i class="fa-solid fa-cart-shopping"></i> নতুন অর্ডারসমূহ</h2>
                <div id="newOrdersList" class="space-y-4 text-[10px] text-gray-400 text-center font-bold italic">অর্ডার লোড হচ্ছে...</div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-xl">
                <h2 class="text-orange-600 font-bold mb-5 text-sm uppercase italic"><i class="fa-solid fa-plus-circle"></i> পণ্য আপলোড</h2>
                <div class="space-y-4">
                    <input type="text" id="pName" placeholder="পণ্যের নাম" class="w-full border p-3 rounded-xl outline-none text-sm bg-gray-50">
                    <input type="number" id="pPrice" placeholder="মূল্য (৳)" class="w-full border p-3 rounded-xl outline-none text-sm bg-gray-50">
                    <input type="text" id="pColors" placeholder="কালার (লাল, নীল...)" class="w-full border p-3 rounded-xl outline-none text-sm bg-gray-50">
                    <textarea id="pDesc" placeholder="বিস্তারিত বিবরণ..." class="w-full border p-3 rounded-xl h-24 outline-none text-sm bg-gray-50"></textarea>
                    
                    <div class="p-4 rounded-xl border-2 border-dashed border-gray-200 text-center bg-gray-50">
                        <input type="file" id="pImages" multiple accept="image/*" class="text-[10px] w-full">
                        <p class="text-[9px] text-gray-400 mt-2 font-bold italic">একাধিক ছবি সিলেক্ট করা যাবে</p>
                    </div>

                    <button onclick="submitProduct()" id="uploadBtn" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold uppercase shadow-lg italic">অ্যাডমিনকে পাঠান</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-md border-t-4 border-green-500">
                <h2 class="text-green-600 font-bold mb-4 uppercase text-[10px] italic"><i class="fa-solid fa-truck-fast"></i> ডেলিভারি হিস্ট্রি</h2>
                <div id="deliveryHistory" class="space-y-3 text-[10px] text-gray-400 text-center font-bold italic">কোনো ডেলিভারি তথ্য নেই</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDuoF0108YerBICZzydjjZzDawtG-BQLW8U",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const IMGBB_API_KEY = "c01e05cfc3241e9f57336dc80cc38d0f";

        function handleLogin() {
            const name = document.getElementById('authShopName').value.trim();
            const pass = document.getElementById('authPassword').value.trim();
            db.ref('sellers/' + name).once('value', snap => {
                if(snap.exists() && snap.val().password === pass) {
                    localStorage.setItem('active_seller', name);
                    location.reload();
                } else alert("ভুল তথ্য দিয়েছেন!");
            });
        }

        const activeSeller = localStorage.getItem('active_seller');
        if(activeSeller) {
            document.getElementById('authArea').classList.add('hidden');
            document.getElementById('dashboardArea').classList.remove('hidden');
            document.getElementById('displayShopName').innerText = activeSeller;
            loadData(activeSeller);
        }

        function loadData(seller) {
            db.ref('orders').on('value', snap => {
                const newList = document.getElementById('newOrdersList');
                const historyList = document.getElementById('deliveryHistory');
                newList.innerHTML = ""; historyList.innerHTML = "";
                let hasNew = false, hasHistory = false;

                snap.forEach(child => {
                    const o = child.val();
                    // সেলার নেম ম্যাচিং ফিক্স (Trim ব্যবহার করে)
                    if(o.sellerName && o.sellerName.trim() === seller.trim()) {
                        if(o.status === 'Delivered') {
                            hasHistory = true;
                            historyList.innerHTML += `<div class="p-3 bg-green-50 border rounded-xl flex justify-between items-center text-[10px] font-bold shadow-sm mb-2 text-slate-700"><span>${o.productName}</span><span class="text-green-600 uppercase italic">Success</span></div>`;
                        } else {
                            hasNew = true;
                            newList.innerHTML += `<div class="p-4 border rounded-2xl bg-blue-50 mb-2 shadow-sm flex justify-between items-center">
                                <div><p class="font-bold text-xs text-slate-800">${o.productName}</p><p class="text-[9px] text-blue-600">৳${o.price || o.totalPrice}</p></div>
                                <button onclick="updateStatus('${child.key}')" class="bg-blue-600 text-white text-[9px] px-4 py-2 rounded-lg font-bold uppercase shadow-sm">Confirm</button>
                            </div>`;
                        }
                    }
                });
                if(!hasNew) newList.innerHTML = "নতুন কোনো অর্ডার নেই";
                if(!hasHistory) historyList.innerHTML = "হিস্ট্রি খালি";
            });
        }

        function updateStatus(key) {
            db.ref('orders/' + key).update({ status: 'Confirmed' }).then(() => alert("অর্ডারটি কনফার্ম করা হয়েছে!"));
        }

        async function submitProduct() {
            const files = document.getElementById('pImages').files;
            const btn = document.getElementById('uploadBtn');
            if(files.length === 0) return alert("ছবি সিলেক্ট করুন!");
            btn.innerText = "আপলোড হচ্ছে..."; btn.disabled = true;

            try {
                let urls = [];
                for (let file of files) {
                    let fd = new FormData(); fd.append("image", file);
                    let res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                    let d = await res.json();
                    if(d.success) urls.push(d.data.url);
                }

                // ছবির সমস্যা সমাধানে 'image' এবং 'imageUrl' দুটোই ডেটাবেজে পাঠানো হচ্ছে
                await db.ref('pending_products').push({
                    name: document.getElementById('pName').value.trim(),
                    price: parseInt(document.getElementById('pPrice').value),
                    colors: document.getElementById('pColors').value.trim(),
                    description: document.getElementById('pDesc').value.trim(),
                    image: urls[0],        // ইনডেক্স ফাইলের জন্য (যেমন MacBook এ কাজ করছে)
                    imageUrl: urls[0],     // অ্যাডমিন প্যানেলের জন্য
                    allImages: urls,
                    sellerName: activeSeller,
                    timestamp: Date.now()
                });
                alert("সাফল্যের সাথে আপলোড হয়েছে!"); location.reload();
            } catch(e) { alert("Error!"); btn.disabled = false; btn.innerText = "অ্যাডমিনকে পাঠান"; }
        }

        function handleLogout() { localStorage.removeItem('active_seller'); location.reload(); }
    </script>
</body>
</html>
