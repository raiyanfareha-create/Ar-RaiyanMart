<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - Ar RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-xl mx-auto space-y-6">
        <div class="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center border-l-8 border-orange-600">
            <div>
                <p class="text-[10px] text-gray-400 uppercase font-bold">SELLER DASHBOARD</p>
                <h2 id="displayShopName" class="text-lg font-bold text-slate-800 italic italic">লোড হচ্ছে...</h2>
            </div>
            <button onclick="handleLogout()" class="text-red-500 font-bold text-xs border border-red-100 px-5 py-2 rounded-xl hover:bg-red-50 transition">Logout</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xl">
            <h2 class="text-orange-600 font-bold mb-5 flex items-center gap-2 text-sm uppercase">
                <i class="fa-solid fa-circle-plus"></i> নতুন পণ্য যোগ করুন
            </h2>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="পণ্যের নাম লিখুন" class="w-full border-2 border-gray-50 p-3 rounded-xl outline-none focus:border-orange-500 text-sm">
                <input type="number" id="pPrice" placeholder="মূল্য (৳)" class="w-full border-2 border-gray-50 p-3 rounded-xl outline-none focus:border-orange-500 text-sm">
                <input type="text" id="pColors" placeholder="কালার (যেমন: লাল, নীল)" class="w-full border-2 border-gray-50 p-3 rounded-xl outline-none focus:border-orange-500 text-sm">
                <textarea id="pDesc" placeholder="পণ্যের বিস্তারিত বিবরণ..." class="w-full border-2 border-gray-50 p-3 rounded-xl h-24 outline-none focus:border-orange-500 text-sm"></textarea>
                
                <div class="p-4 rounded-xl border-2 border-dashed border-gray-200 text-center bg-gray-50">
                    <p class="text-[10px] text-gray-400 mb-2 font-bold uppercase">ছবি সিলেক্ট করুন (একাধিক সম্ভব):</p>
                    <input type="file" id="pImage" multiple accept="image/*" class="text-xs w-full cursor-pointer">
                </div>

                <button onclick="submitProduct()" id="uploadBtn" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-orange-700 transition active:scale-95">
                    পণ্য আপলোড করুন
                </button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-blue-600">
            <h2 class="text-blue-600 font-bold mb-4 flex items-center gap-2 uppercase text-[10px] tracking-widest">
                <i class="fa-solid fa-boxes-stacked"></i> আপনার বর্তমান পণ্যসমূহ
            </h2>
            <div id="liveProductList" class="space-y-3">
                <p class="text-center text-gray-400 text-[10px] py-4 italic">লোড হচ্ছে...</p>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDuoF0108YerBICZzydjjZzDawtG-BQLW8U",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // সেলারের নাম সেট করা (লগইন থেকে আসা নাম, না থাকলে 'Fariha' ডিফল্ট)
        const currentSeller = localStorage.getItem('seller_name') || "Fariha";
        document.getElementById('displayShopName').innerText = currentSeller;

        function handleLogout() {
            if(confirm("লগআউট করবেন?")) {
                localStorage.clear();
                location.href = "index.html";
            }
        }

        async function submitProduct() {
            const files = document.getElementById('pImage').files;
            const name = document.getElementById('pName').value.trim();
            const price = document.getElementById('pPrice').value.trim();
            const btn = document.getElementById('uploadBtn');

            if(files.length === 0 || !name || !price) return alert("সব তথ্য সঠিকভাবে দিন!");
            
            btn.innerText = "আপলোড হচ্ছে... একটু অপেক্ষা করুন"; 
            btn.disabled = true;

            try {
                let imageUrls = [];
                for(let i=0; i<files.length; i++) {
                    const ref = storage.ref('products/' + Date.now() + "_" + i + ".jpg");
                    const task = await ref.put(files[i]);
                    const url = await task.ref.getDownloadURL();
                    imageUrls.push(url);
                }

                await db.ref('pending_products').push({
                    name: name,
                    price: parseInt(price),
                    colors: document.getElementById('pColors').value,
                    description: document.getElementById('pDesc').value,
                    imageUrl: imageUrls[0], 
                    allImages: imageUrls,
                    seller: currentSeller, // বর্তমানে লগইন করা সেলারের নাম যাবে
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                alert("সাফল্যের সাথে অ্যাডমিন প্যানেলে পাঠানো হয়েছে!");
                location.reload(); 
            } catch(e) { 
                alert("ভুল হয়েছে: " + e.message); 
                btn.disabled = false; 
                btn.innerText = "পণ্য আপলোড করুন";
            }
        }

        function loadMyProducts() {
            db.ref('live_products').on('value', snap => {
                const list = document.getElementById('liveProductList');
                list.innerHTML = "";
                if (!snap.exists()) {
                    list.innerHTML = "<p class='text-center text-gray-400 text-[10px] py-4 italic'>আপনার কোনো পণ্য লাইভ নেই।</p>";
                    return;
                }
                
                let hasProduct = false;
                snap.forEach(child => {
                    const p = child.val();
                    // শুধুমাত্র বর্তমান সেলারের পণ্যগুলো দেখাবে
                    if(p.seller === currentSeller) {
                        hasProduct = true;
                        list.innerHTML += `
                            <div class="p-3 border rounded-xl flex items-center bg-white shadow-sm mb-2">
                                <img src="${p.imageUrl}" class="w-10 h-10 rounded-lg object-cover mr-3 border" onerror="this.src='https://via.placeholder.com/50'">
                                <div class="flex-1">
                                    <h4 class="font-bold text-[11px]">${p.name}</h4>
                                    <p class="text-orange-600 font-bold text-[10px]">৳ ${p.price}</p>
                                </div>
                                <button onclick="deleteProduct('${child.key}')" class="text-red-400 p-2"><i class="fa-solid fa-trash-can"></i></button>
                            </div>`;
                    }
                });
                if(!hasProduct) list.innerHTML = "<p class='text-center text-gray-400 text-[10px] py-4 italic'>আপনার কোনো পণ্য লাইভ নেই।</p>";
            });
        }

        function deleteProduct(id) {
            if(confirm("আপনি কি এই পণ্যটি ডিলিট করতে চান?")) {
                db.ref('live_products/' + id).remove();
            }
        }

        window.onload = loadMyProducts;
    </script>
</body>
</html>
