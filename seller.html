<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Center | RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; font-size: 14px; }
        .btn { background: #f85606; color: white; width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #d44905; }
    </style>
</head>
<body class="p-4">

    <div id="authBox" class="max-w-md mx-auto mt-10">
        <div class="card" id="regForm">
            <h2 class="text-2xl font-bold text-center mb-6">Create Seller Account</h2>
            <input type="text" id="regShopName" placeholder="Shop Name">
            <input type="tel" id="regPhone" placeholder="Mobile Number (017...)">
            <input type="password" id="regPass" placeholder="Set Password">
            <button class="btn w-full bg-green-600" onclick="registerSeller()">Register Now</button>
            <p class="text-center text-sm mt-4">Already registered? <a href="#" onclick="toggleAuth()" class="text-orange-600 font-bold">Login</a></p>
        </div>

        <div class="card" id="loginForm" style="display: none;">
            <h2 class="text-2xl font-bold text-center mb-6">Seller Login</h2>
            <input type="tel" id="loginPhone" placeholder="Phone Number">
            <input type="password" id="loginPass" placeholder="Password">
            <button class="btn w-full" onclick="loginSeller()">Login</button>
            <p class="text-center text-sm mt-4">New seller? <a href="#" onclick="toggleAuth()" class="text-orange-600 font-bold">Create Account</a></p>
        </div>
    </div>

    <div id="sellerDash" class="max-w-xl mx-auto mt-6" style="display: none;">
        <div class="card">
            <div class="flex justify-between items-center border-b pb-4 mb-6">
                <h1 class="text-lg font-bold" id="dashShopName">Dashboard</h1>
                <button onclick="location.reload()" class="text-red-500 font-bold text-sm">Logout</button>
            </div>
            
            <h3 class="font-bold text-slate-700 mb-4 text-sm">Upload New Product</h3>
            <input type="text" id="pName" placeholder="Product Name">
            <input type="number" id="pPrice" placeholder="Price (৳)">
            <textarea id="pDesc" placeholder="Product Description..." rows="3"></textarea>
            <input type="text" id="pImg" placeholder="Image URL (ImgBB)">
            <button class="btn w-full" onclick="uploadProduct()">Upload to Shop</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IG8NerMCC6zyxUJzZOautG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function toggleAuth() {
            const l = document.getElementById('loginForm'), r = document.getElementById('regForm');
            l.style.display = l.style.display === "none" ? "block" : "none";
            r.style.display = r.style.display === "none" ? "block" : "none";
        }

        function registerSeller() {
            const name = document.getElementById('regShopName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const pass = document.getElementById('regPass').value.trim();

            if(!name || !phone || !pass) { alert("Please fill all fields!"); return; }

            // Check if phone already exists
            database.ref('sellers').orderByChild('phone').equalTo(phone).once('value', s => {
                if(s.exists()){
                    alert("This phone is already registered!");
                } else {
                    database.ref('sellers').push({
                        shopName: name,
                        phone: phone,
                        password: pass,
                        status: "Approved"
                    }).then(() => {
                        alert("Registration Successful!");
                        toggleAuth();
                    }).catch(e => alert("Error: " + e.message));
                }
            });
        }

        let currentShop = "";
        function loginSeller() {
            const phone = document.getElementById('loginPhone').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            database.ref('sellers').orderByChild('phone').equalTo(phone).once('value', s => {
                const data = s.val();
                if(data){
                    const id = Object.keys(data)[0];
                    const seller = data[id];
                    if(seller.password === pass){
                        currentShop = seller.shopName;
                        document.getElementById('authBox').style.display = "none";
                        document.getElementById('sellerDash').style.display = "block";
                        document.getElementById('dashShopName').innerText = seller.shopName;
                    } else { alert("Wrong Password!"); }
                } else { alert("No account found!"); }
            });
        }

        function uploadProduct() {
            const name = document.getElementById('pName').value, price = document.getElementById('pPrice').value, desc = document.getElementById('pDesc').value, img = document.getElementById('pImg').value;
            if(!name || !price || !img) return alert("Fill all details");

            database.ref('pending_products').push({
                name, price, description: desc, img, shopName: currentShop, status: "Pending"
            }).then(() => {
                alert("Product Uploaded! Waiting for Admin Approval.");
                ['pName','pPrice','pDesc','pImg'].forEach(id => document.getElementById(id).value = "");
            });
        }
    </script>
</body>
</html>
