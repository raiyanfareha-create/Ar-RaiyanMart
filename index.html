<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RaiyanMart | Official Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 1. Global System Reset & Base Styles */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        
        body { 
            font-family: 'Poppins', 'Hind Siliguri', sans-serif; 
            background: #fdfaf5; /* Premium Off-white/Nude Background */
            color: #333; 
            line-height: 1.6; 
            overflow-x: hidden; 
            padding-bottom: 50px; 
        }

        /* 2. Professional Header - Gold Accent */
        header { 
            background: #ffaa33; 
            padding: 12px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            position: sticky; 
            top: 0; 
            z-index: 9999; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
        }
        
        .header-left { display: flex; align-items: center; gap: 15px; }
        
        .logo-box { 
            width: 45px; 
            height: 45px; 
            background: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px solid #d4af37; /* Original Gold Border */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .logo-box img { width: 85%; height: 85%; object-fit: contain; }
        
        .brand-name { 
            font-size: 24px; 
            font-weight: 700; 
            color: #fff; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .cart-icon { font-size: 26px; color: white; position: relative; cursor: pointer; }

        /* 3. Hero Banner System */
        .hero-section { 
            width: 100%; 
            background: #fff; 
            margin-bottom: 30px; 
            border-bottom: 3px solid #ffaa33;
            overflow: hidden;
        }
        
        .hero-section img { 
            width: 100%; 
            height: auto; 
            display: block; 
            max-height: 280px; 
            object-fit: cover; 
            animation: fadeIn 1.2s ease-in;
        }

        /* 4. Main Product Grid Layout */
        #productDisplayGrid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            padding: 0 15px 80px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* 5. Product Card Component */
        .product-card { 
            background: white; 
            padding: 15px; 
            border-radius: 25px; 
            border: 1px solid #f0f0f0; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
            display: flex; 
            flex-direction: column; 
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }
        
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.06); }
        .product-card:active { transform: scale(0.96); }
        
        .img-holder { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 18px; 
            overflow: hidden; 
            background: #fff; 
            margin-bottom: 15px;
            border: 1px solid #f9f9f9;
        }
        
        .img-holder img { width: 100%; height: 100%; object-fit: contain; }

        .product-title { 
            font-size: 15px; 
            font-weight: 600; 
            color: #2c3e50; 
            margin-bottom: 10px; 
            height: 42px; 
            overflow: hidden; 
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* Question History Box */
        .question-box { 
            background: #fffdf9; 
            border: 1px solid #f3e5ab; 
            border-radius: 12px; 
            padding: 10px; 
            margin-bottom: 15px; 
            font-size: 11px; 
            color: #5d4037;
        }
        
        .q-row { border-bottom: 1px dashed #eee; padding: 4px 0; display: flex; gap: 5px; }
        .q-row:last-child { border-bottom: none; }
        .q-row b { color: #d35400; font-weight: 700; }

        .product-price { 
            color: #f85606; 
            font-weight: 700; 
            font-size: 20px; 
            margin-bottom: 15px; 
            display: flex;
            align-items: center;
        }

        /* Action Buttons */
        .btn-wrapper { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }
        
        .ask-btn { 
            background: #fff; 
            color: #d4af37; 
            border: 1.5px solid #d4af37; 
            padding: 10px; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 13px; 
            text-align: center;
        }
        
        .buy-btn { 
            background: #2ecc71; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: 700; 
            font-size: 15px; 
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
        }

        /* 6. Checkout Modal System */
        .overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 10000; 
            justify-content: center; 
            align-items: center; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(8px);
            padding: 20px;
        }
        
        .modal { 
            background: white; 
            padding: 35px; 
            border-radius: 30px; 
            width: 100%; 
            max-width: 480px; 
            position: relative; 
            max-height: 90vh; 
            overflow-y: auto; 
            animation: modalSlideUp 0.4s ease-out;
        }
        
        .close-modal { position: absolute; top: 15px; right: 25px; font-size: 35px; color: #bbb; cursor: pointer; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #444; }
        .input-group input, .input-group select { 
            width: 100%; 
            padding: 16px; 
            border: 2px solid #f2f2f2; 
            border-radius: 15px; 
            font-size: 15px; 
            font-family: inherit;
            transition: border 0.3s;
        }
        .input-group input:focus { border-color: #ffaa33; }

        .billing-card { 
            background: #fffcf5; 
            padding: 20px; 
            border-radius: 18px; 
            margin: 25px 0; 
            border: 1px dashed #d4af37; 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes modalSlideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo-box">
                <img src="https://i.ibb.co/VWVXf1Y/ar-logo.png" alt="RaiyanMart Logo">
            </div>
            <span class="brand-name">RaiyanMart</span>
        </div>
        <div class="cart-icon">🛒</div>
    </header>

    <div class="hero-section">
        <img src="https://i.ibb.co/3ykXFv0/bannar.jpg" alt="RaiyanMart Banner">
    </div>

    <div id="productDisplayGrid">
        </div>

    <div id="checkoutOverlay" class="overlay">
        <div class="modal">
            <span class="close-modal" onclick="closeOrderWindow()">&times;</span>
            <div style="text-align:center; margin-bottom:25px;">
                <img id="mImg" src="" style="width:100px; border-radius:18px; border:1px solid #eee; padding:5px;">
                <h3 id="mTitle" style="margin-top:15px; font-size: 20px; color: #222;"></h3>
            </div>
            
            <div class="input-group">
                <label>আপনার নাম (Full Name)</label>
                <input type="text" id="cName" placeholder="সম্পূর্ণ নাম লিখুন">
            </div>
            <div class="input-group">
                <label>মোবাইল নম্বর (Phone Number)</label>
                <input type="tel" id="cPhone" placeholder="01XXXXXXXXX">
            </div>
            <div class="input-group">
                <label>ডেলিভারি এলাকা (Delivery Area)</label>
                <select id="dArea" onchange="refreshBill()">
                    <option value="70">ঢাকার ভিতরে (Inside Dhaka) - 70 TK</option>
                    <option value="130">ঢাকার বাইরে (Outside Dhaka) - 130 TK</option>
                </select>
            </div>
            <div class="input-group">
                <label>বিস্তারিত ঠিকানা (Full Address)</label>
                <input type="text" id="cAddr" placeholder="বাসা নং, রোড, জেলা ও থানা">
            </div>
            
            <div class="billing-card">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>মূল্য (Price):</span> <span><span id="baseVal">0</span>৳</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-weight:700; color: #f85606; font-size: 22px;">
                    <span>সর্বমোট (Total):</span> <span><span id="totalVal">0</span>৳</span>
                </div>
            </div>

            <button class="buy-btn" style="width:100%;" onclick="submitToWhatsApp()">অর্ডার নিশ্চিত করুন (Confirm Order)</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // 1. Firebase Setup
        const config = { 
            apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU", 
            authDomain: "ar-raiyanmart.firebaseapp.com", 
            projectId: "ar-raiyanmart", 
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        firebase.initializeApp(config);
        const dbRef = firebase.database();
        
        let currentOrder = null;

        // 2. Fetch & Render
        dbRef.ref('live_products').on('value', (snapshot) => {
            const grid = document.getElementById('productDisplayGrid');
            const data = snapshot.val();
            if (!data) return;
            
            let htmlBody = "";
            Object.keys(data).forEach(id => {
                const item = data[id];
                const thumb = Array.isArray(item.imgs) ? item.imgs[0] : (item.img || '');
                
                htmlBody += `
                <div class="product-card" onclick="openOrderWindow('${item.name}', ${item.price}, '${thumb}')">
                    <div class="img-holder">
                        <img src="${thumb}" alt="${item.name}">
                    </div>
                    <h4 class="product-title">${item.name}</h4>
                    <div class="question-box">
                        <div class="q-row"><b>Rr:</b> Onno color available?</div>
                        <div class="q-row"><b>Vjh:</b> Stock e hobe?</div>
                    </div>
                    <div class="product-price">৳${item.price}</div>
                    <div class="btn-wrapper">
                        <button class="ask-btn" onclick="event.stopPropagation(); window.open('https://wa.me/8801704100288?text=I want to know about: ${item.name}', '_blank')">প্রশ্ন করুন</button>
                        <button class="buy-btn">অর্ডার করুন</button>
                    </div>
                </div>`;
            });
            grid.innerHTML = htmlBody;
        });

        // 3. Modal Functions
        function openOrderWindow(name, price, img) {
            currentOrder = { name, price, img };
            document.getElementById('mImg').src = img;
            document.getElementById('mTitle').innerText = name;
            document.getElementById('baseVal').innerText = price;
            refreshBill();
            document.getElementById('checkoutOverlay').style.display = 'flex';
        }

        function closeOrderWindow() { document.getElementById('checkoutOverlay').style.display = 'none'; }

        function refreshBill() {
            const del = parseInt(document.getElementById('dArea').value);
            document.getElementById('totalVal').innerText = currentOrder.price + del;
        }

        // 4. WhatsApp Submission
        function submitToWhatsApp() {
            const name = document.getElementById('cName').value.trim();
            const phone = document.getElementById('cPhone').value.trim();
            const addr = document.getElementById('cAddr').value.trim();
            const delivery = document.getElementById('dArea').value;

            if(!name || !phone || !addr) return alert("দয়া করে সব তথ্য পূরণ করুন।");
            
            const grandTotal = currentOrder.price + parseInt(delivery);
            
            // Format Based on Your Hand-written Note
            const finalMsg = `🔔 *নতুন অর্ডার!*\n\n` +
                             `🏪 *Shop:* RaiyanMart\n` +
                             `📦 *Product:* ${currentOrder.name}\n` +
                             `🖼️ *Image:* ${currentOrder.img}\n` +
                             `💰 *দাম:* ${currentOrder.price} TK\n` +
                             `🚚 *ডেলিভারি:* ${delivery} TK\n` +
                             `💵 *মোট:* ${grandTotal} TK\n\n` +
                             `👤 *ক্রেতা:* ${name}\n` +
                             `📞 *ফোন:* ${phone}\n` +
                             `📍 *ঠিকানা:* ${addr}`;

            const url = `https://api.whatsapp.com/send?phone=8801704100288&text=${encodeURIComponent(finalMsg)}`;
            window.open(url, '_blank');
            closeOrderWindow();
        }
    </script>
</body>
</html>
