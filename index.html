<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaiyanMart - Premium Marketplace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { 
            background-color: #FAF9F6; 
            font-family: 'Hind Siliguri', sans-serif; 
            scroll-behavior: smooth;
        }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        .modal-overlay { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); }
        .hidden { display: none; }
        /* মোবাইলে বাটন ও টেক্সট বড় দেখানোর জন্য */
        @media (max-width: 640px) {
            .product-card { padding: 1rem !important; }
            .product-title { font-size: 1.1rem !important; }
            .btn-text { font-size: 12px !important; }
        }
    </style>
</head>
<body>

    <header class="bg-white/90 backdrop-blur-md shadow-sm p-4 flex justify-between items-center sticky top-0 z-50 px-4 md:px-10">
        <div class="text-3xl font-bold gold-text flex items-center gap-2">
            <i class="fa-solid fa-gem"></i>
            <span class="text-xl tracking-tighter text-gray-800">RaiyanMart</span>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="relative cursor-pointer group" onclick="openCartModal()">
                <i class="fa-solid fa-cart-shopping text-2xl text-gray-700"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] rounded-full px-1.5 py-0.5 font-bold shadow-lg">0</span>
            </div>
        </div>
    </header>

    <section class="w-full">
        <img src="https://raw.githubusercontent.com/raiyanfareha-create/Ar-RaiyanMart/main/hero-banner.jpg" 
             alt="RaiyanMart Banner" 
             class="w-full h-auto object-cover border-b-4 border-[#D4AF37]">
    </section>

    <main class="container mx-auto p-4 md:p-10">
        <h2 class="text-2xl font-bold text-gray-800 mb-8 border-l-4 border-[#D4AF37] pl-3">সেরা সংগ্রহসমূহ</h2>
        
        <div id="productList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="col-span-full py-20 flex flex-col items-center justify-center text-gray-400">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3 gold-text"></i>
                <p>পণ্যগুলো লোড হচ্ছে...</p>
            </div>
        </div>
    </main>

    <div id="cartModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 relative shadow-2xl">
            <button onclick="closeCartModal()" class="absolute top-5 right-6 text-3xl text-gray-400">&times;</button>
            <h2 class="text-xl font-bold mb-5 border-b pb-3"><i class="fa-solid fa-bag-shopping gold-text"></i> আপনার ব্যাগ</h2>
            <div id="cartItemsList" class="max-h-80 overflow-y-auto space-y-4 pr-2"></div>
            <div class="border-t mt-6 pt-5">
                <div class="flex justify-between items-center text-lg font-bold">
                    <span>মোট:</span>
                    <span class="gold-text">৳ <span id="cartTotal">0</span></span>
                </div>
                <button onclick="closeCartModal()" class="w-full gold-bg text-white py-4 rounded-2xl mt-6 font-bold shadow-lg uppercase">কেনাকাটা চালিয়ে যান</button>
            </div>
        </div>
    </div>

    <div id="fullView" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-[200]">
        <button onclick="closeImg()" class="absolute top-6 right-8 text-white text-5xl">&times;</button>
        <img id="zImg" src="" class="max-w-[95%] max-h-[90%] border-4 border-white rounded-lg shadow-2xl">
    </div>

    <script>
        // Firebase Config (আপনার অরিজিনাল ডাটা)
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IG8NerMCC6zyxUJzZOautG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // পণ্য লোড করার ফাংশন (আপনার ডাটাবেস অনুযায়ী 'live_products' থেকে)
        const productListDiv = document.getElementById('productList');

        db.ref('live_products').on('value', (snapshot) => {
            productListDiv.innerHTML = "";
            const products = snapshot.val();
            
            if (!products) {
                productListDiv.innerHTML = "<p class='col-span-full text-center py-10 text-gray-500'>কোনো পণ্য পাওয়া যায়নি!</p>";
                return;
            }

            for (let key in products) {
                const p = products[key];
                productListDiv.innerHTML += `
                    <div class="bg-white rounded-3xl shadow-sm border p-4 transition-all hover:shadow-xl product-card">
                        <img src="${p.imageUrl}" class="w-full h-64 object-cover rounded-2xl cursor-zoom-in" onclick="openZoom(this.src)">
                        <div class="mt-4 px-1">
                            <h3 class="text-lg font-bold text-gray-800 line-clamp-1 product-title">${p.name}</h3>
                            <p class="text-xl font-black gold-text mt-2">৳ ${p.price}</p>
                            <p class="text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-widest">Store: ${p.seller || 'RaiyanMart'}</p>
                        </div>
                        <div class="flex gap-2 mt-5">
                            <button onclick="addToCart('${p.name}', ${p.price}, '${p.imageUrl}')" class="flex-1 border-2 border-gray-800 text-gray-800 py-3 rounded-xl font-bold btn-text hover:bg-gray-800 hover:text-white transition">Add to Cart</button>
                            <button onclick="buyNow('${p.name}', '${p.price}', '${p.seller}')" class="flex-1 gold-bg text-white py-3 rounded-xl font-bold btn-text shadow-md hover:opacity-90 transition">Buy Now</button>
                        </div>
                    </div>`;
            }
        });

        // কার্ট ফাংশন
        let cart = [];
        function addToCart(name, price, img) {
            cart.push({name, price, img});
            document.getElementById('cartCount').innerText = cart.length;
            alert("✅ " + name + " ব্যাগে যোগ হয়েছে!");
        }

        function openCartModal() {
            const list = document.getElementById('cartItemsList');
            const total = document.getElementById('cartTotal');
            list.innerHTML = "";
            let sum = 0;
            if(cart.length === 0) {
                list.innerHTML = "<p class='text-center py-10 text-gray-400'>আপনার ব্যাগটি খালি!</p>";
            } else {
                cart.forEach((item) => {
                    sum += item.price;
                    list.innerHTML += `
                    <div class='flex items-center gap-4 bg-gray-50 p-3 rounded-2xl border'>
                        <img src="${item.img}" class="w-14 h-14 object-cover rounded-lg">
                        <div class="flex-1">
                            <p class="text-sm font-bold text-gray-800">${item.name}</p>
                            <p class="text-xs gold-text font-bold">৳ ${item.price}</p>
                        </div>
                    </div>`;
                });
            }
            total.innerText = sum;
            document.getElementById('cartModal').classList.remove('hidden');
        }

        function closeCartModal() { document.getElementById('cartModal').classList.add('hidden'); }

        // হোয়াটসঅ্যাপ অর্ডার
        function buyNow(name, price, seller) {
            const adminWA = "8801704100288";
            const msg = `🔔 *অর্ডার মেসেজ!*\n\n🏪 *Shop:* ${seller}\n📦 *Product:* ${name}\n💰 *Price:* ${price} Tk\n\nঅর্ডারটি কনফার্ম করতে আমার সাথে যোগাযোগ করুন।`;
            window.open(`https://wa.me/${adminWA}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // জুম ফাংশন
        function openZoom(src) {
            document.getElementById('zImg').src = src;
            document.getElementById('fullView').classList.remove('hidden');
        }
        function closeImg() { document.getElementById('fullView').classList.add('hidden'); }
    </script>
</body>
</html>
