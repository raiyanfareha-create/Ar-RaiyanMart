<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Center | RaiyanMart</title>
    <style>
        /* লোডিং স্ক্রিন স্টাইল */
        #loader {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: #fcfcfc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d4af37; /* Gold color */
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 15px;
            font-family: sans-serif;
            color: #d4af37;
            font-weight: bold;
        }

        /* মূল কন্টেন্ট স্টাইল */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f8f9fa; 
            margin: 0;
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
        }

        #main-content {
            display: none; /* শুরুতে লুকানো */
            width: 100%;
            justify-content: center;
            padding: 20px;
        }

        .form-card { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 400px; 
            border-top: 5px solid #d4af37; 
        }

        h2 { color: #333; text-align: center; margin-bottom: 25px; }
        
        input, textarea { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border: 1px solid #eee; 
            border-radius: 8px; 
            box-sizing: border-box; 
            background: #fafafa;
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(45deg, #d4af37, #b8860b); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 10px;
        }

        button:disabled { background: #ccc; }
        
        label { font-size: 14px; font-weight: bold; color: #666; display: block; margin-top: 15px; }
        #status { text-align: center; font-weight: bold; margin-top: 15px; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">RAIYANMART</div>
    </div>

    <div id="main-content">
        <div class="form-card">
            <h2>সেলার প্যানেল</h2>
            <input type="text" id="shopName" placeholder="দোকানের নাম">
            <input type="text" id="pName" placeholder="পণ্যের নাম">
            <input type="number" id="pPrice" placeholder="দাম (৳)">
            
            <label>পণ্যের ছবি সিলেক্ট করুন:</label>
            <input type="file" id="pImage" accept="image/*" style="border: none;">
            
            <textarea id="pDesc" rows="3" placeholder="পণ্যের বিবরণ"></textarea>
            
            <button id="submitBtn" onclick="handleUploadAndSend()">রিভিউয়ের জন্য পাঠান</button>
            <div id="status"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        // পেজ লোড হলে লোডার বন্ধ হবে
        window.onload = function() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
        };

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            projectId: "ar-raiyanmart",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b82c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        async function handleUploadAndSend() {
            const sName = document.getElementById('shopName').value;
            const pName = document.getElementById('pName').value;
            const pPrice = document.getElementById('pPrice').value;
            const fileInput = document.getElementById('pImage');
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('submitBtn');

            if (!sName || !pName || !pPrice || !fileInput.files[0]) {
                alert("দয়া করে সব তথ্য এবং ছবি দিন!");
                return;
            }

            btn.disabled = true;
            statusDiv.style.color = "#d4af37";
            statusDiv.innerText = "ছবি আপলোড হচ্ছে...";

            const apiKey = 'c01e05cfc3241e9f57336dc80cc38d0f';
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    const imageUrl = result.data.url;
                    statusDiv.innerText = "ডাটাবেজে সেভ হচ্ছে...";

                    await database.ref('pending_products').push({
                        shopName: sName,
                        name: pName,
                        price: pPrice,
                        img: imageUrl,
                        desc: document.getElementById('pDesc').value,
                        status: "pending",
                        time: Date.now()
                    });

                    statusDiv.style.color = "green";
                    statusDiv.innerText = "সফলভাবে পাঠানো হয়েছে!";
                    
                    document.getElementById('pName').value = "";
                    document.getElementById('pPrice').value = "";
                    document.getElementById('pImage').value = "";
                    document.getElementById('pDesc').value = "";
                }
            } catch (error) {
                statusDiv.style.color = "red";
                statusDiv.innerText = "ব্যর্থ হয়েছে! আবার চেষ্টা করুন।";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
