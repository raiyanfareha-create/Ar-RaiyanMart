<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart | কাস্টমার শপ</title>
    <style>
        /* মূল ডিজাইন ও অ্যানিমেশন */
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 0; overflow-x: hidden; }
        
        header { 
            background: linear-gradient(135deg, #f85606, #ff8c52); 
            color: white; text-align: center; padding: 40px 20px; 
            border-radius: 0 0 30px 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            animation: fadeInDown 0.8s ease;
        }

        /* কার্ডের এনিমেশন */
        .grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            max-width: 800px; margin: 25px auto; padding: 0 15px; 
        }

        .product-card { 
            background: white; padding: 12px; border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; 
            display: flex; flex-direction: column; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* স্মুথ এনিমেশন */
            border: 1px solid #eee;
            animation: fadeInUp 0.6s ease both;
        }

        /* মাউস নিলে বা টাচ করলে যা হবে */
        .product-card:hover { 
            transform: translateY(-10px) scale(1.03); 
            box-shadow: 0 15px 30px rgba(248, 86, 6, 0.15);
            border-color: #f85606;
        }

        .product-card img { 
            width: 100%; height: 160px; object-fit: cover; 
            border-radius: 12px; transition: 0.3s;
        }

        .product-card:hover img { transform: scale(1.05); }

        .price { color: #f85606; font-weight: bold; font-size: 20px; margin: 10px 0; }
        
        .btn-buy { 
            background: #25D366; color: white; border: none; padding: 12px; 
            width: 100%; border-radius: 10px; cursor: pointer; font-weight: bold; 
            transition: 0.3s; margin-top: auto;
        }

        .btn-buy:active { transform: scale(0.9); } /* ক্লিক করলে দেবে যাবে */

        /* এনিমেশন কি-ফ্রেমস */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* পপআপ ডিজাইন */
        #orderModal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; 
            z-index: 9999; backdrop-filter: blur(5px);
        }
        .modal-content { 
            background: white; padding: 30px; border-radius: 20px; width: 90%; 
            max-width: 400px; text-align: center; animation: zoomIn 0.3s ease;
        }
        @keyframes zoomIn { from { transform: scale(0.5); } to { transform: scale(1); } }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn-confirm { background: #25D366; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0;">Ar RaiyanMart</h1>
        <p style="margin:8px 0 0; font-size:15px; font-weight: 300;">সেরা পণ্য, সেরা দাম—আপনার আস্থাই আমাদের শক্তি</p>
    </header>

    <div class="grid" id="productGrid">লোড হচ্ছে...</div>

    <div id="orderModal">
        <div class="modal-content">
            <img id="modalImg" style="width: 100px; height: 100px; border-radius: 15px; object-fit: cover; margin-bottom: 10px; border: 2px solid #f85606;">
            <h3 id="selectedItemTitle"></h3>
            <p id="modalDesc" style="font-size: 13px; color: #666; margin-bottom: 15px;"></p>
            <input type="text" id="custName" placeholder="আপনার নাম">
            <input type="number" id="custNumber" placeholder="মোবাইল নম্বর">
            <textarea id="custAddress" rows="3" placeholder="পুরো ঠিকানা (থানা, জেলা)"></textarea>
            <button class="btn-confirm" onclick="sendToWhatsApp()">WhatsApp-এ অর্ডার পাঠান</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">বন্ধ করুন</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            projectId: "ar-raiyanmart",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b82c96a26f38601e4"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let selectedProduct = null;

        database.ref('live_products').on('value', (snapshot) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            const data = snapshot.val();
            if (!data) return;

            Object.keys(data).forEach((id, index) => {
                const p = data[id];
                const desc = p.description || "";
                grid.innerHTML += `
                    <div class="product-card" style="animation-delay: ${index * 0.1}s">
                        <img src="${p.img}">
                        <h4>${p.name}</h4>
                        <div class="price">৳${p.price}</div>
                        <button class="btn-buy" onclick="openOrderModal('${p.name}', '${p.price}', '${p.img}', '${desc.replace(/'/g, "\\'")}')">অর্ডার করুন</button>
                    </div>`;
            });
        });

        function openOrderModal(name, price, img, desc) {
            selectedProduct = { name, price, img, desc };
            document.getElementById('modalImg').src = img;
            document.getElementById('selectedItemTitle').innerText = name + " - ৳" + price;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

        function sendToWhatsApp() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custNumber').value;
            const address = document.getElementById('custAddress').value;
            if (!name || !phone || !address) { alert("সব তথ্য দিন!"); return; }

            const myWhatsApp = "8801704100288"; 
            const message = `🛍 *নতুন অর্ডার - Ar RaiyanMart*%0A%0A📦 *পণ্য:* ${selectedProduct.name}%0A💰 *দাম:* ৳${selectedProduct.price}%0A📝 *বিবরণ:* ${selectedProduct.desc}%0A🖼 *পণ্য দেখুন:* ${selectedProduct.img}%0A--------------------------%0A👤 *কাস্টমার:* ${name}%0A📞 *ফোন:* ${phone}%0A📍 *ঠিকানা:* ${address}`;
            window.open(`https://wa.me/${myWhatsApp}?text=${message}`, '_blank');
            closeModal();
        }
    </script>
</body>
</html>
