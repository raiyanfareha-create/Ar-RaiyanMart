<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaiyanMart | Your Premium Marketplace</title>
    <style>
        /* লাক্সারিয়াস অফ-হোয়াইট ব্যাকগ্রাউন্ড */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #fdfdfd; 
            background-image: radial-gradient(#f0f0f0 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .main-card {
            text-align: center;
            padding: 50px 30px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 90%;
            border: 1px solid #f1f1f1;
            position: relative;
            overflow: hidden;
        }

        /* গোল্ডেন বর্ডার এফেক্ট */
        .main-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #d4af37, #f7ef8a, #b8860b);
        }

        .brand-name {
            font-size: 35px;
            font-weight: 700;
            color: #d4af37; /* Gold color */
            margin-bottom: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
            font-weight: 300;
        }

        .welcome-msg {
            font-size: 18px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* সিম্পল লোডার এনিমেশন (যদি প্রয়োজন হয়) */
        .pulse {
            width: 12px;
            height: 12px;
            background-color: #d4af37;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-animation 1.5s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        .copyright {
            margin-top: 40px;
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="brand-name">RaiyanMart</div>
        <div class="tagline">Premium Lifestyle Shopping</div>
        
        <div class="welcome-msg">
            আমাদের ওয়েবসাইটটি আপডেট করা হচ্ছে।<br>
            খুব শীঘ্রই আমরা নতুন সব প্রিমিয়াম কালেকশন নিয়ে আসছি।
        </div>

        <div class="pulse"></div>
        <p style="font-size: 13px; color: #d4af37;">Work in Progress</p>

        <div class="copyright">
            &copy; 2026 RaiyanMart | All Rights Reserved
        </div>
    </div>

</body>
</html>
