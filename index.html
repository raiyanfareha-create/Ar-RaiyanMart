<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart - Your Premium Marketplace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { background-color: #FAF9F6; font-family: 'Hind Siliguri', sans-serif; transition: all 0.3s; scroll-behavior: smooth; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        .modal-overlay { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); }
        .hidden { display: none; }
        .product-card { border-radius: 28px; background: #fff; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .zoom-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
        .zoom-img { max-width: 95%; max-height: 90vh; border-radius: 12px; transform: scale(0.9); transition: 0.3s ease-in-out; }
    </style>
</head>
<body>

    <header class="bg-white/95 sticky top-0 z-50 p-4 border-b">
        <div class="container mx-auto flex justify-between items-center gap-4">
            <div class="text-xl font-bold gold-text flex items-center gap-2">
                <i class="fa-solid fa-gem"></i>
                <span class="text-gray-800">Ar RaiyanMart</span>
            </div>
            <div class="flex items-center gap-1 bg-gray-100 p-1 rounded-full border">
                <button onclick="changeLang('bn')" id="btn-bn" class="px-4 py-1.5 rounded-full font-bold text-xs gold-bg text-white transition-all">বাংলা</button>
                <button onclick="changeLang('en')" id="btn-en" class="px-4 py-1.5 rounded-full font-bold text-xs text-gray-500 transition-all">English</button>
            </div>
        </div>
        
        <div class="container mx-auto mt-4 px-2">
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="searchProducts()" data-bn="পছন্দের পণ্যটি খুঁজুন..." data-en="Search for products..." placeholder="পছন্দের পণ্যটি খুঁজুন..." 
                       class="w-full pl-10 pr-10 py-3 rounded-2xl border-none bg-gray-100 focus:ring-2 focus:ring-[#D4AF37]">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-400"></i>
                <button onclick="clearSearch()" class="absolute right-4 top-3.5 text-gray-400 hover:text-gray-600"><i class="fa-solid fa-circle-xmark text-xl"></i></button>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <h2 id="section-title" class="text-xl font-bold text-gray-800 mb-8 border-l-4 border-[#D4AF37] pl-3" data-bn="সেরা সংগ্রহসমূহ" data-en="Our Collections">সেরা সংগ্রহসমূহ</h2>
        <div id="productList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full py-20 text-center text-gray-400">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-2"></i>
                <p>Loading Products...</p>
            </div>
        </div>
    </main>

    <div id="imageModal" class="zoom-overlay hidden" onclick="closeImg()">
        <button class="absolute top-6 right-6 text-white text-4xl">&times;</button>
        <img id="fullImage" src="" class="zoom-img shadow-2xl">
    </div>

    <div id="orderModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center p-4 z-[300]">
        <div class="bg-white w-full max-w-md rounded-[35px] p-8 relative shadow-2xl">
            <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="absolute top-5 right-6 text-3xl text-gray-300 hover:text-red-500">&times;</button>
            <h2 class="text-xl font-bold mb-6 text-gray-800" data-bn="অর্ডার করার জন্য তথ্য দিন" data-en="Delivery Details">ডেলিভারি তথ্য দিন</h2>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <input type="number" id="custPhone" placeholder="মোবাইল নম্বর" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <textarea id="custAddr" placeholder="পুরো ঠিকানা" class="w-full p-4 bg-gray-50 rounded-2xl h-28 border-none"></textarea>
                <div class="p-4 bg-yellow-50 rounded-2xl border border-yellow-100">
                    <p class="text-sm font-bold text-gray-800 flex justify-between mt-1">Total: <span id="totalDisplay" class="gold-text"></span></p>
                </div>
                <button onclick="submitOrder()" class="w-full bg-black text-white py-4 rounded-2xl font-bold uppercase tracking-widest">Confirm Order</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IG8NerMCC6zyxUJzZOautG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allProducts = [];
        let currentLang = 'bn';
        let activeProduct = null;

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('[data-bn]').forEach(el => { el.innerText = el.getAttribute(`data-${lang}`); });
            document.getElementById('btn-bn').className = lang === 'bn' ? 'px-4 py-1.5 rounded-full font-bold text-xs gold-bg text-white' : 'px-4 py-1.5 rounded-full font-bold text-xs text-gray-500';
            document.getElementById('btn-en').className = lang === 'en' ? 'px-4 py-1.5 rounded-full font-bold text-xs gold-bg text-white' : 'px-4 py-1.5 rounded-full font-bold text-xs text-gray-500';
            renderAll(allProducts);
        }

        db.ref('live_products').on('value', (snapshot) => {
            const data = snapshot.val();
            allProducts = [];
            for(let key in data) { let p = data[key]; p.id = key; allProducts.push(p); }
            renderAll(allProducts);
        });

        function renderAll(products) {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            products.forEach(p => {
                // ইমেজ এবং ডেসক্রিপশন ফিক্স: ডাটাবেসে পপুলার সব Key চেক করা হয়েছে
                let img = p.image || p.imageUrl || p.img || (p.allImages && p.allImages[0]) || 'https://via.placeholder.com/400';
                let desc = p.description || p.desc || p.details || (currentLang === 'bn' ? 'কোনো বিবরণ নেই' : 'No description');
                
                list.innerHTML += `
                    <div class="product-card p-5 border border-gray-100 flex flex-col h-full">
                        <img src="${img}" class="w-full h-72 object-cover rounded-2xl cursor-zoom-in" onclick="openFullImg('${img}')">
                        <div class="mt-5 flex-1 flex flex-col">
                            <h3 class="text-xl font-bold text-gray-800">${p.name}</h3>
                            <p class="gold-text font-black text-2xl mt-2">৳ ${p.price}</p>
                            <div class="mt-4 text-sm text-gray-500 bg-gray-50/50 p-4 rounded-2xl border border-dashed">
                                <b>${currentLang === 'bn' ? 'বিবরণ:' : 'Description:'}</b> ${desc}
                            </div>
                            <div class="mt-6 flex gap-2">
                                <input type="text" id="q-${p.id}" placeholder="${currentLang === 'bn' ? 'প্রশ্ন লিখুন...' : 'Ask question...'}" class="flex-1 text-xs p-3 rounded-xl bg-gray-100 border-none outline-none">
                                <button onclick="askQuestion('${p.id}', '${p.name}')" class="bg-green-500 text-white w-10 h-10 rounded-xl flex items-center justify-center">
                                    <i class="fa-solid fa-paper-plane text-xs"></i>
                                </button>
                            </div>
                            <button onclick="openOrderModal('${p.id}')" class="w-full mt-6 gold-bg text-white py-4 rounded-2xl font-bold uppercase shadow-xl">ORDER NOW</button>
                        </div>
                    </div>`;
            });
        }

        function openFullImg(src) { document.getElementById('fullImage').src = src; document.getElementById('imageModal').classList.remove('hidden'); }
        function closeImg() { document.getElementById('imageModal').classList.add('hidden'); }
        function searchProducts() { const q = document.getElementById('searchInput').value.toLowerCase(); renderAll(allProducts.filter(p => p.name.toLowerCase().includes(q))); }
        function clearSearch() { document.getElementById('searchInput').value = ""; renderAll(allProducts); }

        function askQuestion(id, name) {
            const val = document.getElementById('q-' + id).value;
            if(!val) return;
            window.open(`https://wa.me/8801704100288?text=${encodeURIComponent('আসসালামু আলাইকুম, "'+name+'" সম্পর্কে জানতে চাই: '+val)}`, '_blank');
        }

        function openOrderModal(id) {
            activeProduct = allProducts.find(p => p.id === id);
            document.getElementById('totalDisplay').innerText = `৳ ${parseInt(activeProduct.price) + 60}`;
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function submitOrder() {
            const n = document.getElementById('custName').value, ph = document.getElementById('custPhone').value, a = document.getElementById('custAddr').value;
            if(!n || !ph || !a) { alert("সবগুলো তথ্য সঠিকভাবে পূরণ করুন"); return; }
            
            const pImg = activeProduct.image || activeProduct.imageUrl || (activeProduct.allImages && activeProduct.allImages[0]) || 'No Image';
            
            const msg = `🔔 *নতুন অর্ডার (Ar RaiyanMart)*\n\n` +
                        `📦 *পণ্য:* ${activeProduct.name}\n` +
                        `💰 *মূল্য:* ${activeProduct.price} Tk\n` +
                        `🚚 *ডেলিভারি:* 60 Tk\n` +
                        `💵 *মোট:* ${parseInt(activeProduct.price)+60} Tk\n\n` +
                        `👤 *নাম:* ${n}\n` +
                        `📞 *ফোন:* ${ph}\n` +
                        `📍 *ঠিকানা:* ${a}\n\n` +
                        `🖼️ *Image:* ${pImg}`;
            window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
