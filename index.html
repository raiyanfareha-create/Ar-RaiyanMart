<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaiyanMart | Premium Marketplace</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { background-color: #f8f9fa; font-family: 'Hind Siliguri', sans-serif; margin: 0; overflow-x: hidden; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        
        /* Product Slider & Cards */
        .slider-container { width: 100%; height: 190px; position: relative; overflow: hidden; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .product-card { 
            background: #fff; border-radius: 15px; height: 270px; border: 1px solid #eee; 
            display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .product-card:active { transform: scale(0.97); }

        /* Details Modal */
        #productDetails { position: fixed; inset: 0; background: #fff; z-index: 2000; display: none; overflow-y: auto; }
        .color-swatch { width: 60px; height: 60px; border-radius: 10px; border: 2px solid #eee; cursor: pointer; object-fit: cover; flex-shrink: 0; }
        .color-swatch.active { border-color: #D4AF37; ring: 2px; ring-color: #D4AF37; transform: scale(1.05); }

        /* Checkout */
        #checkoutModal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        
        .q-bubble { background: #f1f1f1; padding: 10px; border-radius: 12px; margin-bottom: 8px; font-size: 13px; border-left: 4px solid #D4AF37; }
    </style>
</head>
<body>

    <div class="bg-black text-white text-[11px] py-2 px-5 flex justify-end gap-6 font-bold">
        <button onclick="updateLanguage('bn')" id="btn-bn">বাংলা</button>
        <button onclick="updateLanguage('en')" id="btn-en" class="opacity-40">English</button>
    </div>

    <div id="homeScreen">
        <header class="bg-white/80 backdrop-blur-md p-4 flex justify-between items-center sticky top-0 z-50 border-b">
            <span class="text-2xl font-black gold-text tracking-tighter">RAIYANMART</span>
            <div onclick="openCheckout()" class="relative">
                <i class="fa-solid fa-cart-shopping text-2xl text-gray-800"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] rounded-full px-1.5 border-2 border-white">0</span>
            </div>
        </header>

        <div class="slider-container">
            <div class="slide active"><img src="https://raw.githubusercontent.com/raiyanfareha-create/Ar-RaiyanMart/main/hero-banner.jpg"></div>
            <div class="slide"><img src="https://raw.githubusercontent.com/raiyanfareha-create/Ar-RaiyanMart/main/b-1.jpg"></div>
        </div>

        <div class="p-4 bg-white">
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="searchProduct(this.value)" class="w-full p-3.5 pl-11 bg-gray-100 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-yellow-500/20 transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-4.5 text-gray-400"></i>
            </div>
        </div>

        <div id="productList" class="catalog-grid"></div>
        <div class="pb-28"></div>
    </div>

    <div id="productDetails">
        <button onclick="closeDetails()" class="fixed top-5 left-5 bg-black/50 text-white w-10 h-10 rounded-full z-[2001] flex items-center justify-center backdrop-blur-md"><i class="fa-solid fa-xmark"></i></button>
        <div id="detailsContent"></div>
    </div>

    <div id="checkoutModal">
        <div class="bg-white w-full max-w-md rounded-3xl p-7 relative shadow-2xl">
            <h2 class="text-xl font-extrabold mb-5 border-b pb-3" id="modalTitle">অর্ডার নিশ্চিত করুন</h2>
            <div class="space-y-4">
                <input type="text" id="custName" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:bg-white focus:ring-1 focus:ring-yellow-500">
                <input type="number" id="custPhone" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:bg-white focus:ring-1 focus:ring-yellow-500">
                <textarea id="custAddr" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none h-24 focus:bg-white focus:ring-1 focus:ring-yellow-500"></textarea>
                
                <select id="deliverySelect" onchange="updateTotal()" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none">
                    <option value="80" id="optIn">ঢাকার ভেতরে - 80 TK</option>
                    <option value="140" id="optOut">ঢাকার বাইরে - 140 TK</option>
                </select>

                <div class="p-5 bg-yellow-50 rounded-2xl border border-yellow-100 flex justify-between font-bold text-xl gold-text">
                    <span id="totalLabel">সর্বমোট:</span><span><span id="summaryTotal">0</span> TK</span>
                </div>

                <button onclick="sendOrder()" class="w-full bg-[#25D366] text-white py-4.5 rounded-2xl font-bold flex justify-center items-center gap-3 shadow-lg active:scale-95 transition-transform">
                    <i class="fa-brands fa-whatsapp text-2xl"></i> <span id="waBtn">অর্ডার করুন</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBucDF68HVd8nyxUJz20utG-EQLYRU", authDomain: "ar-raiyanmart.firebaseapp.com", databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "ar-raiyanmart", storageBucket: "ar-raiyanmart.appspot.com", messagingSenderId: "336578883565", appId: "1:336578883565:web:54d73b52c96a26f38601ef" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let allProducts = [], cart = [], currentLang = 'bn', currentSelectedImg = '';

        const langData = {
            bn: { search: "পছন্দের পণ্যটি খুঁজুন...", buy: "অর্ডার করুন", modal: "অর্ডার নিশ্চিত করুন", name: "আপনার পূর্ণ নাম", phone: "সচল মোবাইল নম্বর", addr: "পুরো ঠিকানা (থানা, জেলাসহ)", total: "সর্বমোট:", wa: "অর্ডার কনফার্ম করুন", in: "ঢাকার ভেতরে", out: "ঢাকার বাইরে", ask: "পণ্য সম্পর্কে প্রশ্ন", send: "জিজ্ঞেস করুন", color: "কালার বা ডিজাইন বেছে নিন:" },
            en: { search: "Search your products...", buy: "Order Now", modal: "Confirm Order", name: "Full Name", phone: "Mobile Number", addr: "Full Address (Area, District)", total: "Total:", wa: "Confirm Order", in: "Inside Dhaka", out: "Outside Dhaka", ask: "Ask about product", send: "Send", color: "Choose Color/Design:" }
        };

        function updateLanguage(lang) {
            currentLang = lang;
            const t = langData[lang];
            document.getElementById('btn-bn').classList.toggle('opacity-40', lang !== 'bn');
            document.getElementById('btn-en').classList.toggle('opacity-40', lang !== 'en');
            document.getElementById('searchInput').placeholder = t.search;
            document.getElementById('modalTitle').innerText = t.modal;
            document.getElementById('custName').placeholder = t.name;
            document.getElementById('custPhone').placeholder = t.phone;
            document.getElementById('custAddr').placeholder = t.addr;
            document.getElementById('totalLabel').innerText = t.total;
            document.getElementById('waBtn').innerText = t.wa;
            document.getElementById('optIn').innerText = `${t.in} - 80 TK`;
            document.getElementById('optOut').innerText = `${t.out} - 140 TK`;
            renderCatalog(allProducts);
        }

        db.ref('live_products').on('value', (snap) => {
            allProducts = snap.val() ? Object.keys(snap.val()).map(key => ({ id: key, ...snap.val()[key] })) : [];
            renderCatalog(allProducts);
        });

        function renderCatalog(products) {
            document.getElementById('productList').innerHTML = products.map(p => `
                <div class="product-card" onclick="openDetails('${p.id}')">
                    <img src="${p.img || p.image}" class="w-full h-[160px] object-contain p-2">
                    <div class="p-3">
                        <p class="text-[9px] text-gray-400 uppercase font-bold mb-1">${p.shop_name || 'Official Store'}</p>
                        <h3 class="text-[12px] font-bold h-8 overflow-hidden text-gray-800 leading-tight">${p.name}</h3>
                        <p class="gold-text font-bold text-base mt-1">৳${p.price}</p>
                    </div>
                </div>`).join('');
        }

        function openDetails(id) {
            const p = allProducts.find(x => x.id === id);
            const t = langData[currentLang];
            currentSelectedImg = p.img || p.image;

            let colorHtml = '';
            if(p.images && Array.isArray(p.images)) {
                colorHtml = `<p class="font-bold text-sm mt-5 mb-3">${t.color}</p>
                             <div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
                                ${p.images.map((img, i) => `<img src="${img}" onclick="selectColor(this, '${img}')" class="color-swatch ${i===0?'active':''}">`).join('')}
                             </div>`;
            }

            document.getElementById('detailsContent').innerHTML = `
                <img id="mainImg" src="${currentSelectedImg}" class="w-full h-auto max-h-[450px] object-contain bg-white">
                <div class="p-6 pb-32 bg-white rounded-t-[30px] -mt-6 shadow-2xl relative z-10">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[11px] text-gray-500 uppercase tracking-widest font-bold">${p.shop_name || 'Official Store'}</p>
                            <h1 class="text-2xl font-bold text-gray-900 mt-1">${p.name}</h1>
                        </div>
                        <p class="text-3xl font-black gold-text">৳${p.price}</p>
                    </div>

                    ${colorHtml}

                    <div class="mt-8">
                        <h4 class="font-bold text-gray-800 border-b pb-2 mb-3 uppercase text-xs tracking-wider">Product Description</h4>
                        <div class="text-gray-600 text-[14px] leading-relaxed whitespace-pre-line">${p.description || ''}</div>
                    </div>

                    <div class="mt-10 p-5 bg-gray-50 rounded-2xl border border-gray-100">
                        <h4 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="fa-regular fa-comment-dots text-yellow-600"></i> ${t.ask}</h4>
                        <div id="q-list-${p.id}" class="max-h-40 overflow-y-auto mb-4"></div>
                        <div class="flex gap-2">
                            <input type="text" id="uQ" placeholder="..." class="flex-1 p-3.5 bg-white border border-gray-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-yellow-500/20">
                            <button onclick="postQ('${p.id}')" class="bg-gray-800 text-white px-5 rounded-xl text-xs font-bold uppercase tracking-widest">${t.send}</button>
                        </div>
                    </div>
                </div>
                <div class="fixed bottom-0 left-0 right-0 p-5 bg-white/80 backdrop-blur-lg border-t z-20">
                    <button onclick="buyNow('${p.id}')" class="w-full gold-bg text-white py-4.5 rounded-2xl font-extrabold shadow-xl text-lg active:scale-95 transition-transform uppercase tracking-widest">${t.buy}</button>
                </div>`;
            
            document.getElementById('productDetails').style.display = 'block';
            document.getElementById('productDetails').scrollTo(0,0);
            loadQ(p.id);
        }

        function selectColor(el, url) {
            document.getElementById('mainImg').src = url;
            currentSelectedImg = url;
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }

        function sendOrder() {
            const name = document.getElementById('custName').value, phone = document.getElementById('custPhone').value, addr = document.getElementById('custAddr').value;
            if(!name || !phone || !addr) return alert("Please fill all information");
            
            const p = cart[0], dev = document.getElementById('deliverySelect').value, total = document.getElementById('summaryTotal').innerText;
            const productLink = window.location.origin + window.location.pathname + "?id=" + p.id;

            const invoice = `🔔 *নতুন অর্ডার এসেছে!*\n\n🏪 *দোকান:* ${p.shop_name || 'RaiyanMart Official'}\n📦 *পণ্য:* ${p.name}\n🖼️ *নির্বাচিত ছবি:* ${currentSelectedImg}\n🔗 *লিঙ্ক:* ${productLink}\n💰 *দাম:* ${p.price} TK\n🚚 *ডেলিভারি:* ${dev} TK\n💵 *সর্বমোট:* ${total} TK\n\n👤 *ক্রেতা:* ${name}\n📞 *ফোন:* ${phone}\n📍 *ঠিকানা:* ${addr}`;
            
            window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(invoice)}`, '_blank');
        }

        function postQ(id) {
            const q = document.getElementById('uQ').value;
            if(q) { db.ref('questions/'+id).push({ text: q, time: Date.now() }); document.getElementById('uQ').value = ''; }
        }

        function loadQ(id) {
            db.ref('questions/'+id).on('value', (s) => {
                const container = document.getElementById('q-list-'+id);
                if(s.val()) container.innerHTML = Object.values(s.val()).map(q => `<div class="q-bubble">👤 ${q.text}</div>`).join('');
                else container.innerHTML = `<p class="text-[11px] text-gray-400 italic">No questions yet.</p>`;
            });
        }

        setInterval(() => {
            const slides = document.querySelectorAll('.slide');
            let active = document.querySelector('.slide.active');
            active.classList.remove('active');
            (active.nextElementSibling || slides[0]).classList.add('active');
        }, 4500);

        function closeDetails() { document.getElementById('productDetails').style.display = 'none'; }
        function buyNow(id) { cart = [allProducts.find(x => x.id === id)]; openCheckout(); }
        function searchProduct(v) { renderCatalog(allProducts.filter(p => p.name.toLowerCase().includes(v.toLowerCase()))); }
        function openCheckout() { document.getElementById('summaryTotal').innerText = parseInt(cart[0].price) + 80; document.getElementById('checkoutModal').style.display = 'flex'; }
        function closeCheckout() { document.getElementById('checkoutModal').style.display = 'none'; }
        function updateTotal() { document.getElementById('summaryTotal').innerText = parseInt(cart[0].price) + parseInt(document.getElementById('deliverySelect').value); }
        
        updateLanguage('bn');
    </script>
</body>
</html>
