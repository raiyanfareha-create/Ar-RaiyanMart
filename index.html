<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar Raiyan Mart - Premium Marketplace</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { background-color: #f8f1f3; font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }

        /* Updated Product Grid: added 1 column layout for small screens */
        .product-grid { display: grid; grid-template-columns: repeat(1, 1fr); gap: 20px; padding: 15px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }

        .product-card { background: #fff; border-radius: 15px; overflow: hidden; border: 1px solid #e5e7eb; padding: 15px; transition: all 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-img { width: 100%; height: auto; max-height: 450px; object-fit: contain; border-radius: 10px; background-color: #f3f4f6; cursor: pointer; } /* Added cursor pointer */

        .sticky-header { position: sticky; top: 0; z-index: 100; background: white; border-bottom: 1px solid #e5e7eb; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }

        .q-bubble { background: #f3f4f6; padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 12px; border-left: 3px solid #6c757d; }
        .a-bubble { background: #f9fafb; padding: 10px; border-radius: 10px; margin-bottom: 12px; font-size: 12px; border-left: 3px solid #28a745; margin-left: 20px;}

        .desc-section { background: #fdfbf7; border-left: 4px solid #d4af37; padding: 12px; margin: 15px 0; font-size: 14px; color: #4b5563; }

        input, select, textarea { border: 1px solid #ddd!important; transition: all 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #d4af37!important; outline: none; box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1); }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #b89730; }

        /* Full Image Overlay Styles */
        #imageOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(5px); }
        #fullImage { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 10px; }
        #closeImageBtn { position: absolute; top: 20px; right: 20px; color: white; background: none; border: none; font-size: 30px; cursor: pointer; transition: color 0.3s; }
        #closeImageBtn:hover { color: #d4af37; }
    </style>
</head>
<body>

    <header class="sticky-header p-4 flex flex-col md:flex-row justify-between items-center shadow-sm">
        <div class="flex items-center gap-2 mb-3 md:mb-0">
            <i class="fa-solid fa-store font-bold gold-text text-2xl"></i><span class="text-xl font-bold text-gray-800">Ar Raiyan Mart</span>
        </div>
        
        <div class="relative w-full md:w-1/3 mb-3 md:mb-0 px-2 md:px-0">
            <input type="text" id="searchInput" placeholder="পণ্যের নাম দিয়ে সার্চ করুন..." class="w-full p-2.5 pl-10 bg-gray-50 rounded-lg border focus:ring-1">
            <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>

        <div class="relative cursor-pointer" onclick="toggleCart()">
            <i class="fa-solid fa-bag-shopping text-2xl text-gray-700"></i>
            <span id="cartCount" class="cart-badge">0</span>
        </div>
    </header>

    <div class="banner">
        <img src="https://via.placeholder.com/1200x300?text=Premium+Marketplace+Banner" alt="Ar Raiyan Mart Banner" class="w-full height-auto display-block">
    </div>

    <main class="container mx-auto max-w-4xl pb-24 p-2 md:p-0">
        <div id="productList" class="product-grid mt-4">
            <p class="text-center py-20 text-gray-500 flex flex-col items-center gap-3 w-full">
                <i class="fa-solid fa-circle-notch animate-spin text-3xl gold-text"></i>
                লোডিং হচ্ছে, অপেক্ষা করুন...
            </p>
        </div>
    </main>

    <div id="cartModal" class="fixed inset-0 bg-black/70 hidden z-[5000] flex justify-end">
        <div class="bg-white w-full max-w-md h-full p-6 overflow-y-auto relative shadow-2xl flex flex-col">
            <button onclick="toggleCart()" class="absolute top-5 right-5 text-gray-400 text-3xl font-light hover:text-red-500 transition">&times;</button>
            <h2 class="text-xl font-bold mb-8 border-b pb-3 flex items-center gap-2"><i class="fa-solid fa-cart-shopping gold-text"></i>আপনার ব্যাগ</h2>
            
            <div id="cartItems" class="space-y-5 flex-grow">
                </div>

            <div class="border-t pt-5 mt-auto">
                <div class="flex justify-between items-center font-bold text-lg mb-6">
                    <span>সর্বমোট:</span>
                    <span class="gold-text"><span id="cartTotal">0</span> TK</span>
                </div>
                <button onclick="openCheckout()" class="w-full gold-bg text-white py-4 rounded-xl font-bold text-lg shadow-md hover:brightness-105 transition">অর্ডার কনফার্ম করুন</button>
            </div>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black/70 hidden z-[6000] flex justify-center items-center p-4">
        <div class="bg-white w-full max-w-lg md:max-w-2xl rounded-3xl p-7 relative max-h-[92vh] overflow-y-auto shadow-2xl custom-scrollbar">
            <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="absolute top-5 right-6 text-gray-400 text-3xl font-light hover:text-red-500 transition">&times;</button>
            <h2 class="text-xl font-bold mb-6 border-b pb-3">আপনার ডেলিভারি তথ্য দিন</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 ml-1">আপনার নাম</label>
                    <input type="text" id="custName" placeholder="আপনার নাম লিখুন..." class="w-full p-3.5 bg-gray-50 rounded-xl focus:ring-1">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 ml-1">মোবাইল নম্বর</label>
                    <input type="number" id="custPhone" placeholder="11 ডিজিটের নম্বরটি দিন" class="w-full p-3.5 bg-gray-50 rounded-xl focus:ring-1">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-gray-500 ml-1">বিভাগ</label>
                        <input type="text" id="custDivision" placeholder="যেমন: ঢাকা, খুলনা" class="w-full p-3.5 bg-gray-50 rounded-xl focus:ring-1">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 ml-1">জেলা</label>
                        <input type="text" id="custDistrict" placeholder="জেলা লিখুন" class="w-full p-3.5 bg-gray-50 rounded-xl focus:ring-1">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-500 ml-1">ডেলিভারি এরিয়া</label>
                    <select id="deliverySelect" onchange="updateFinalTotal()" class="w-full p-3.5 bg-gray-50 rounded-xl text-sm focus:ring-1">
                        <option value="60">ঢাকার ভেতরে - 60 TK</option>
                        <option value="120">ঢাকার বাইরে - 120 TK</option>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-500 ml-1">সম্পূর্ণ ঠিকানা (গ্রাম, পাড়া, হাউজ নং)</label>
                    <textarea id="custAddr" placeholder="সম্পূর্ণ ঠিকানা..." class="w-full p-3.5 bg-gray-50 rounded-xl h-24 focus:ring-1"></textarea>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl border">
                    <div class="flex justify-between text-sm text-gray-600 mb-1">
                        <span>পণ্যের দাম:</span>
                        <b><span id="modalSubtotal">0</span> TK</b>
                    </div>
                    <div class="flex justify-between text-sm text-gray-600 mb-2">
                        <span>ডেলিভারি চার্জ:</span>
                        <b><span id="modalDelivery">60</span> TK</b>
                    </div>
                    <div class="flex justify-between font-bold text-lg mt-3 pt-2 border-t text-gray-800">
                        <span>মোট দেয়:</span>
                        <span class="gold-text"><span id="modalFinalTotal">0</span> TK</span>
                    </div>
                </div>
                
                <button onclick="submitOrder()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg mt-4 flex items-center justify-center gap-2 shadow-lg hover:bg-green-700 transition">
                    <i class="fab fa-whatsapp"></i>
                    অর্ডার কনফার্ম করুন
                </button>
            </div>
        </div>
    </div>

    <div id="imageOverlay">
        <button id="closeImageBtn">&times;</button>
        <img id="fullImage" src="" alt="Full Product Image">
    </div>

    <script>
        // --- Firebase Configuration ---
        // REPLACE WITH YOUR ACTUAL FIREBASE CONFIG FROM IMAGE 1
        const firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "YOUR_AUTH_DOMAIN",
          databaseURL: "YOUR_DATABASE_URL",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_STORAGE_BUCKET",
          messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
          appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [];
        let cart = [];

        // --- Real-time Product Loading ---
        function loadProducts() {
            db.ref('live_products').on('value', (snapshot) => {
                const data = snapshot.val();
                allProducts = [];
                for(let key in data) {
                    allProducts.push({ id: key, ...data[key] });
                }
                renderAllProducts(allProducts); // Initial render
            });
        }

        // --- Core Rendering Function ---
        function renderAllProducts(products) {
            const list = document.getElementById('productList');
            list.innerHTML = "";

            if (products.length === 0) {
                list.innerHTML = '<p class="text-center py-20 text-gray-400 w-full col-span-2">কোনো পণ্য পাওয়া যায়নি।</p>';
                return;
            }

            products.forEach(p => {
                let img = p.img || p.image || 'https://via.placeholder.com/300';
                let description = p.description || 'এই পণ্যটির কোনো বিস্তারিত বিবরণ এখনো যুক্ত করা হয়নি।';
                
                let productHTML = `
                    <div class="product-card shadow-sm border">
                        <img src="${img}" alt="${p.name}" class="product-img mb-4" onerror="this.src='https://via.placeholder.com/300'" onclick="showFullImage('${img}')">
                        
                        <h3 class="font-bold text-lg text-gray-800 leading-snug mb-1">${p.name}</h3>
                        <p class="gold-text font-bold text-2xl mt-1 mb-4">${p.price} TK</p>

                        <div class="desc-section">
                            <p class="font-bold text-black border-b border-gray-100 inline-block mb-2 pb-0.5">পণ্যের বিবরণ:</p>
                            <p class="text-gray-700 text-sm leading-relaxed">${description}</p>
                        </div>

                        <button onclick="addToCart('${p.id}')" class="w-full gold-bg text-white py-3.5 rounded-xl font-bold text-md mt-4 flex items-center justify-center gap-2 hover:brightness-105 transition">
                            <i class="fa-solid fa-cart-plus"></i>
                            ADD TO CART
                        </button>
                    </div>
                `;
                list.innerHTML += productHTML;
            });
        }

        // --- Search Functionality ---
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase().trim();
            const filteredProducts = allProducts.filter(p => p.name.toLowerCase().includes(searchTerm));
            renderAllProducts(filteredProducts);
        });

        // --- Full Image View Logic ---
        function showFullImage(imgSrc) {
            const overlay = document.getElementById('imageOverlay');
            const fullImage = document.getElementById('fullImage');
            fullImage.src = imgSrc;
            overlay.style.display = 'flex';
        }

        document.getElementById('closeImageBtn').addEventListener('click', closeImageView);
        document.getElementById('imageOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeImageView();
            }
        });

        function closeImageView() {
            document.getElementById('imageOverlay').style.display = 'none';
        }

        // --- Shopping Cart Logic ---
        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            const item = cart.find(x => x.id === id);

            if(item) {
                item.qty++;
            } else {
                cart.push({...p, qty: 1});
            }

            updateCartUI();
            if(cart.length === 1) toggleCart();
        }

        function updateCartUI() {
            const count = cart.reduce((total, item) => total + item.qty, 0);
            const total = cart.reduce((total, item) => total + (item.price * item.qty), 0);

            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartTotal').innerText = total;

            const list = document.getElementById('cartItems');
            list.innerHTML = cart.length === 0 ? '<p class="text-center py-10 text-gray-400">আপনার ব্যাগ খালি</p>' : '';

            cart.forEach((item, index) => {
                list.innerHTML += `
                    <div class="flex items-center justify-between border-b pb-3 border-gray-100">
                        <div class="flex-1 min-w-0 pr-2">
                            <p class="text-sm font-bold text-gray-800 line-clamp-1">${item.name}</p>
                            <p class="text-xs text-gray-500 mt-0.5">${item.price} x ${item.qty} = ${item.price * item.qty} TK</p>
                        </div>
                        <div class="flex items-center gap-3 bg-gray-50 p-1.5 rounded-full border">
                            <button onclick="changeQty(${index}, -1)" class="w-7 h-7 bg-white rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 transition shadow-inner">-</button>
                            <span class="text-sm font-bold w-5 text-center">${item.qty}</span>
                            <button onclick="changeQty(${index}, 1)" class="w-7 h-7 bg-white rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 transition shadow-inner">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function changeQty(index, delta) {
            cart[index].qty += delta;
            if(cart[index].qty <= 0) cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cartModal').classList.toggle('hidden');
        }

        // --- Checkout Logic ---
        function openCheckout() {
            if(cart.length === 0) return alert("অর্ডার করার জন্য পণ্যে ব্যাগে যোগ করুন!");
            
            const subtotal = cart.reduce((total, item) => total + (item.price * item.qty), 0);
            document.getElementById('modalSubtotal').innerText = subtotal;
            
            toggleCart();
            updateFinalTotal();
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function updateFinalTotal() {
            const subtotal = parseInt(document.getElementById('modalSubtotal').innerText);
            const deliveryCharge = parseInt(document.getElementById('deliverySelect').value);
            
            document.getElementById('modalDelivery').innerText = deliveryCharge;
            document.getElementById('modalFinalTotal').innerText = subtotal + deliveryCharge;
        }

        // --- WhatsApp Order Submission ---
        function submitOrder() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const division = document.getElementById('custDivision').value.trim();
            const district = document.getElementById('custDistrict').value.trim();
            const address = document.getElementById('custAddr').value.trim();
            const deliveryCharge = document.getElementById('deliverySelect').value;
            const finalTotal = document.getElementById('modalFinalTotal').innerText;

            if(!name || !phone || !address || !division || !district) {
                alert("অনুগ্রহ করে সব তথ্য সঠিকভাবে প্রদান করুন!");
                return;
            }

            // WhatsApp Message Formatting
            let itemDetails = cart.map(i => `\n👉 Product: ${i.name} [${i.qty} Pcs]\n💵 Price: ${i.price * i.qty} TK`).join('\n');
            
            const finalMsg = `⚠️ নতুন অর্ডার ⚠️\n\n🛍️ *Shop Name:* Ar Raiyan Mart\n${itemDetails}\n\n=========================\n\n💵 *উপ-মোট:* ${document.getElementById('modalSubtotal').innerText} TK\n🚚 *ডেলিভারি চার্জ:* ${deliveryCharge} TK\n✅ *সর্বমোট:* ${finalTotal} TK\n\n=========================\n\n👤 *কাস্টমার নাম:* ${name}\n📞 *ফোন:* ${phone}\n📍 *ঠিকানা:* ${address}, ${district}, ${division}`;
            
            const encodedMsg = encodeURIComponent(finalMsg);
            window.open(`https://wa.me/8801704100286?text=${encodedMsg}`, '_blank');
        }

        // Initialize Product Loading
        loadProducts();

    </script>
</body>
</html>
