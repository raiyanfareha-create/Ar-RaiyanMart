<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaiyanMart | Multi-Vendor Marketplace</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { background-color: #f7f7f7; font-family: 'Hind Siliguri', sans-serif; margin: 0; padding: 0; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        .slider-container { width: 100%; height: 180px; position: relative; overflow: hidden; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .product-card { background: #fff; border-radius: 12px; height: 260px; border: 1px solid #eee; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #productDetails { position: fixed; inset: 0; background: #fff; z-index: 2000; display: none; overflow-y: auto; }
        #checkoutModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 15px; }
        .q-section { border-top: 1px solid #eee; padding: 15px; background: #fafafa; border-radius: 12px; margin-top: 20px; }
        .comment-item { background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 8px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="bg-black text-white text-[11px] py-2 px-4 flex justify-end gap-6">
        <button onclick="updateLanguage('bn')" id="btn-bn" class="font-bold">বাংলা</button>
        <button onclick="updateLanguage('en')" id="btn-en" class="opacity-50 font-bold">English</button>
    </div>

    <div id="homeScreen">
        <header class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
            <span class="text-xl font-extrabold gold-text uppercase">RaiyanMart</span>
            <div onclick="openCheckout()" class="relative cursor-pointer">
                <i class="fa-solid fa-bag-shopping text-2xl text-gray-700"></i>
                <span id="cartCount" class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] rounded-full px-1.5 border-2 border-white">0</span>
            </div>
        </header>

        <div class="slider-container">
            <div class="slide active"><img src="https://raw.githubusercontent.com/raiyanfareha-create/Ar-RaiyanMart/main/hero-banner.jpg"></div>
            <div class="slide"><img src="https://raw.githubusercontent.com/raiyanfareha-create/Ar-RaiyanMart/main/b-1.jpg"></div>
        </div>

        <div class="p-3 bg-white">
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="searchProduct(this.value)" class="w-full p-3 pl-10 bg-gray-100 rounded-xl text-sm outline-none">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-4 text-gray-400 text-xs"></i>
            </div>
        </div>

        <div id="productList" class="catalog-grid"></div>
        <div class="pb-24"></div> 
    </div>

    <div id="productDetails">
        <button onclick="closeDetails()" class="fixed top-4 left-4 bg-black/40 text-white w-9 h-9 rounded-full z-[2001] flex items-center justify-center"><i class="fa-solid fa-arrow-left"></i></button>
        <div id="detailsContent"></div>
    </div>

    <div id="checkoutModal">
        <div class="bg-white w-full max-w-md rounded-2xl p-6 relative shadow-2xl">
            <h2 class="text-xl font-bold mb-4 border-b pb-2" id="modalTitle">অর্ডার তথ্য</h2>
            <div class="space-y-3">
                <input type="text" id="custName" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <input type="number" id="custPhone" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <textarea id="custAddr" class="w-full p-3 bg-gray-50 border rounded-xl outline-none h-20"></textarea>
                <select id="deliverySelect" onchange="updateTotal()" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                    <option value="80" id="optIn">ঢাকার ভেতরে - 80 TK</option>
                    <option value="140" id="optOut">ঢাকার বাইরে - 140 TK</option>
                </select>
                <div class="p-4 bg-yellow-50 rounded-xl border flex justify-between font-bold text-lg gold-text">
                    <span id="totalLabel">সর্বমোট:</span><span><span id="summaryTotal">0</span> TK</span>
                </div>
                <button onclick="sendOrder()" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-bold flex justify-center items-center gap-2">
                    <i class="fa-brands fa-whatsapp text-xl"></i> <span id="waBtnLabel">হোয়াটসঅ্যাপ অর্ডার</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBucDF68HVd8nyxUJz20utG-EQLYRU", authDomain: "ar-raiyanmart.firebaseapp.com", databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "ar-raiyanmart", storageBucket: "ar-raiyanmart.appspot.com", messagingSenderId: "336578883565", appId: "1:336578883565:web:54d73b52c96a26f38601ef" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let allProducts = [], cart = [], currentLang = 'bn';

        const langData = {
            bn: { search: "পণ্য খুঁজুন...", buy: "এখনই কিনুন", modal: "অর্ডার তথ্য", name: "আপনার নাম", phone: "মোবাইল নম্বর", addr: "বিস্তারিত ঠিকানা", total: "সর্বমোট:", wa: "হোয়াটসঅ্যাপ অর্ডার", in: "ঢাকার ভেতরে", out: "ঢাকার বাইরে", ask: "প্রশ্ন করুন", send: "পাঠান", seller: "দোকান:" },
            en: { search: "Search products...", buy: "Buy Now", modal: "Order Details", name: "Your Name", phone: "Phone Number", addr: "Address Details", total: "Total:", wa: "Order via WhatsApp", in: "Inside Dhaka", out: "Outside Dhaka", ask: "Ask Question", send: "Send", seller: "Shop:" }
        };

        function updateLanguage(lang) {
            currentLang = lang;
            const t = langData[lang];
            document.getElementById('btn-bn').classList.toggle('opacity-50', lang !== 'bn');
            document.getElementById('btn-en').classList.toggle('opacity-50', lang !== 'en');
            document.getElementById('searchInput').placeholder = t.search;
            document.getElementById('modalTitle').innerText = t.modal;
            document.getElementById('custName').placeholder = t.name;
            document.getElementById('custPhone').placeholder = t.phone;
            document.getElementById('custAddr').placeholder = t.addr;
            document.getElementById('totalLabel').innerText = t.total;
            document.getElementById('waBtnLabel').innerText = t.wa;
            document.getElementById('optIn').innerText = `${t.in} - 80 TK`;
            document.getElementById('optOut').innerText = `${t.out} - 140 TK`;
            renderCatalog(allProducts);
        }

        db.ref('live_products').on('value', (snap) => {
            allProducts = snap.val() ? Object.keys(snap.val()).map(key => ({ id: key, ...snap.val()[key] })) : [];
            renderCatalog(allProducts);
        });

        function renderCatalog(products) {
            document.getElementById('productList').innerHTML = products.map(p => `
                <div class="product-card" onclick="openDetails('${p.id}')">
                    <img src="${p.img || p.image}" class="w-full h-[150px] object-contain p-2">
                    <div class="p-3">
                        <h3 class="text-[13px] font-bold h-8 overflow-hidden text-gray-800">${p.name}</h3>
                        <p class="text-[10px] text-gray-400 uppercase mt-1">${p.shop_name || 'RaiyanMart Store'}</p>
                        <p class="gold-text font-bold text-sm">৳${p.price}</p>
                    </div>
                </div>`).join('');
        }

        function openDetails(id) {
            const p = allProducts.find(x => x.id === id);
            const t = langData[currentLang];
            document.getElementById('detailsContent').innerHTML = `
                <img src="${p.img || p.image}" class="w-full h-80 object-contain bg-white pt-10">
                <div class="p-6 pb-32">
                    <p class="text-[12px] text-gray-500 uppercase tracking-widest">${t.seller} ${p.shop_name || 'RaiyanMart Store'}</p>
                    <p class="text-3xl font-bold gold-text">৳${p.price}</p>
                    <h1 class="text-xl font-bold mt-1">${p.name}</h1>
                    <p class="mt-4 text-gray-600 text-sm">${p.description || ''}</p>
                    <div class="q-section">
                        <h4 class="font-bold text-gray-800 mb-3">${t.ask}</h4>
                        <div id="q-list-${p.id}" class="max-h-32 overflow-y-auto mb-3"></div>
                        <div class="flex gap-2">
                            <input type="text" id="uQ" placeholder="..." class="flex-1 p-3 bg-white border rounded-xl text-sm outline-none">
                            <button onclick="postQ('${p.id}')" class="bg-gray-800 text-white px-4 py-2 rounded-xl text-xs font-bold">${t.send}</button>
                        </div>
                    </div>
                </div>
                <div class="fixed bottom-0 left-0 right-0 p-3 bg-white border-t">
                    <button onclick="buyNow('${p.id}')" class="w-full gold-bg text-white py-4 rounded-xl font-bold shadow-lg">${t.buy}</button>
                </div>`;
            document.getElementById('productDetails').style.display = 'block';
            loadQ(p.id);
        }

        function postQ(id) {
            const q = document.getElementById('uQ').value;
            if(q) { db.ref('questions/'+id).push({ text: q }); document.getElementById('uQ').value = ''; }
        }

        function loadQ(id) {
            db.ref('questions/'+id).on('value', (s) => {
                const container = document.getElementById('q-list-'+id);
                if(s.val()) container.innerHTML = Object.values(s.val()).map(q => `<div class="comment-item">👤 ${q.text}</div>`).join('');
            });
        }

        function sendOrder() {
            const name = document.getElementById('custName').value, phone = document.getElementById('custPhone').value, addr = document.getElementById('custAddr').value;
            if(!name || !phone || !addr) return alert("All fields required");
            
            const p = cart[0];
            const dev = document.getElementById('deliverySelect').value;
            const total = document.getElementById('summaryTotal').innerText;
            const productLink = window.location.origin + window.location.pathname + "?id=" + p.id;

            // Invoice with Dynamic Seller Name
            const invoice = `🔔 *নতুন অর্ডার!*

🏪 *দোকানের নাম:* ${p.shop_name || 'RaiyanMart Store'}
📦 *পণ্য:* ${p.name}
🔗 *লিঙ্ক:* ${productLink}
💰 *দাম:* ${p.price} TK
🚚 *ডেলিভারি:* ${dev} TK
💵 *মোট:* ${total} TK

👤 *ক্রেতা:* ${name}
📞 *ফোন:* ${phone}
📍 *ঠিকানা:* ${addr}`;
            
            window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(invoice)}`, '_blank');
        }

        setInterval(() => {
            const slides = document.querySelectorAll('.slide');
            let active = document.querySelector('.slide.active');
            active.classList.remove('active');
            (active.nextElementSibling || slides[0]).classList.add('active');
        }, 4000);

        function closeDetails() { document.getElementById('productDetails').style.display = 'none'; }
        function buyNow(id) { cart = [allProducts.find(x => x.id === id)]; openCheckout(); }
        function searchProduct(v) { renderCatalog(allProducts.filter(p => p.name.toLowerCase().includes(v.toLowerCase()))); }
        function openCheckout() { document.getElementById('summaryTotal').innerText = parseInt(cart[0].price) + 80; document.getElementById('checkoutModal').style.display = 'flex'; }
        function closeCheckout() { document.getElementById('checkoutModal').style.display = 'none'; }
        function updateTotal() { document.getElementById('summaryTotal').innerText = parseInt(cart[0].price) + parseInt(document.getElementById('deliverySelect').value); }
        
        updateLanguage('bn');
    </script>
</body>
</html>
