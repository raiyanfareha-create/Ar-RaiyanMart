<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart - Professional Marketplace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { background-color: #f8f1f1; font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        
        /* Grid System from your original design */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(5, 1fr); } }

        .product-card { 
            background: #fff; border-radius: 8px; overflow: hidden; display: flex; 
            flex-direction: column; border: 1px solid #e1e7eb; transition: all 0.2s;
        }
        .product-card:active { transform: scale(0.97); }
        .product-img { height: 160px; width: 100%; object-fit: cover; cursor: pointer; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .sticky-header { position: sticky; top: 0; z-index: 1000; background: white; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <header class="sticky-header shadow-sm">
        <div class="p-3 flex justify-between items-center border-b">
            <div class="text-xl font-bold gold-text flex items-center gap-1">
                <i class="fa-solid fa-gem"></i><span>Ar RaiyanMart</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="relative cursor-pointer mr-2" onclick="toggleCart()">
                    <i class="fa-solid fa-cart-shopping text-2xl text-gray-700"></i>
                    <span id="cartCount" class="cart-badge">0</span>
                </div>
                <div class="flex gap-1 bg-gray-100 p-1 rounded-full scale-90">
                    <button onclick="changeLang('bn')" id="btn-bn" class="px-2 py-1 rounded-full font-bold text-[10px] gold-bg text-white">বাংলা</button>
                    <button onclick="changeLang('en')" id="btn-en" class="px-2 py-1 rounded-full font-bold text-[10px] text-gray-700">Eng</button>
                </div>
            </div>
        </div>
        <div class="p-2 bg-white">
            <div class="relative max-w-2xl mx-auto">
                <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="পণ্য খুঁজুন..." 
                class="w-full pl-10 pr-4 py-2 rounded-lg bg-gray-100 text-sm outline-none border-none focus:ring-1 focus:ring-[#D4AF37]">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
            </div>
        </div>
    </header>

    <main class="container mx-auto max-w-6xl">
        <div class="p-2">
            <img src="hero-banner.jpg" alt="Banner" class="w-full h-auto rounded-lg shadow-sm" onerror="this.src='https://via.placeholder.com/800x400?text=Ar+RaiyanMart'">
        </div>
        
        <h2 id="section-title" class="text-sm font-bold text-gray-600 p-3 uppercase tracking-widest border-l-4 border-[#D4AF37] mt-3">সমস্ত পণ্য</h2>
        
        <div id="productList" class="product-grid">
            <p class="col-span-2 text-center py-10 text-gray-400">পণ্য লোড হচ্ছে...</p>
        </div>
    </main>

    <div id="cartModal" class="fixed inset-0 bg-black/70 hidden z-[5000] flex justify-end">
        <div class="bg-white w-80 h-full p-5 overflow-y-auto relative shadow-2xl">
            <button onclick="toggleCart()" class="absolute top-4 right-4 text-gray-400 text-2xl font-bold">&times;</button>
            <h2 class="text-lg font-bold mb-6 border-b pb-2 text-gray-800">আপনার ব্যাগ</h2>
            <div id="cartItems" class="space-y-4"></div>
            <div class="mt-8 border-t pt-4">
                <div class="flex justify-between font-bold text-lg mb-4">
                    <span>সর্বমোট:</span> <span class="gold-text">৳ <span id="cartTotal">0</span></span>
                </div>
                <button onclick="openCheckout()" class="w-full gold-bg text-white py-3.5 rounded-xl font-bold shadow-lg">অর্ডার কনফার্ম করুন</button>
            </div>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black/70 hidden z-[6000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 relative">
            <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="absolute top-4 right-5 text-gray-400 text-2xl font-bold">&times;</button>
            <h2 class="text-lg font-bold mb-5 border-b pb-2">অর্ডার তথ্য দিন</h2>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-3 bg-gray-50 rounded-xl text-sm border">
                <input type="number" id="custPhone" placeholder="মোবাইল নম্বর" class="w-full p-3 bg-gray-50 rounded-xl text-sm border">
                <textarea id="custAddr" placeholder="পুরো ঠিকানা" class="w-full p-3 bg-gray-50 rounded-xl h-20 text-sm border"></textarea>
                <button onclick="submitOrder()" class="w-full gold-bg text-white py-3.5 rounded-xl font-bold shadow-lg">অর্ডার করুন (WhatsApp)</button>
            </div>
        </div>
    </div>

    <div id="imageModal" class="fixed inset-0 bg-black/95 hidden z-[7000] flex items-center justify-center p-4">
        <button onclick="document.getElementById('imageModal').classList.add('hidden')" class="absolute top-5 right-5 text-white text-3xl">&times;</button>
        <img id="fullImage" src="" class="max-w-full max-h-[90vh] rounded-lg">
    </div>

    <script>
        // Your Verified Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBucDFQ0iHiC6xyxUjz2OwUtG-EQlyRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebaseio.com",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.appspot.com",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allProducts = [], cart = [], currentLang = 'bn';

        // ডাটাবেস থেকে পণ্য লোড (live_products নোড থেকে)
        db.ref('live_products').on('value', (snapshot) => {
            const data = snapshot.val(); 
            allProducts = [];
            if(data) {
                for(let key in data) { 
                    let p = data[key]; p.id = key; 
                    allProducts.push(p); 
                }
            }
            renderAll(allProducts);
        });

        // পণ্য দেখানোর মূল ফাংশন
        function renderAll(products) {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            if(products.length === 0) {
                list.innerHTML = '<p class="col-span-2 text-center py-10">কোনো পণ্য নেই।</p>';
                return;
            }
            products.forEach(p => {
                let img = p.img || p.image || p.imageURL || 'https://via.placeholder.com/300';
                list.innerHTML += `
                    <div class="product-card shadow-sm">
                        <img src="${img}" class="product-img" onclick="openImg('${img}')">
                        <div class="p-2.5 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="text-[11px] font-semibold text-gray-800 line-clamp-2 leading-tight">${p.name}</h3>
                                <p class="gold-text font-bold text-sm mt-1">৳ ${p.price}</p>
                            </div>
                            <button onclick="addToCart('${p.id}')" class="w-full gold-bg text-white py-2 rounded-lg mt-3 text-[11px] font-bold">
                                <i class="fa-solid fa-cart-plus mr-1"></i> ADD TO CART
                            </button>
                        </div>
                    </div>`;
            });
        }

        // কার্ট ম্যানেজমেন্ট
        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            const item = cart.find(x => x.id === id);
            if(item) item.qty++; else cart.push({...p, qty: 1});
            updateCartUI();
            if(cart.length === 1) toggleCart();
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.reduce((a, b) => a + b.qty, 0);
            const list = document.getElementById('cartItems');
            let total = 0;
            list.innerHTML = cart.length === 0 ? '<p class="text-center text-gray-400 mt-10">ব্যাগ খালি!</p>' : '';
            cart.forEach(item => {
                total += item.price * item.qty;
                let img = item.img || item.image || item.imageURL || 'https://via.placeholder.com/50';
                list.innerHTML += `
                    <div class="flex items-center gap-3 border-b pb-3 border-gray-100">
                        <img src="${img}" class="w-10 h-10 rounded object-cover">
                        <div class="flex-1"><h4 class="text-[10px] font-bold">${item.name}</h4><p class="text-[10px] gold-text">৳ ${item.price} x ${item.qty}</p></div>
                    </div>`;
            });
            document.getElementById('cartTotal').innerText = total;
        }

        function toggleCart() { document.getElementById('cartModal').classList.toggle('hidden'); }
        function openImg(s) { document.getElementById('fullImage').src = s; document.getElementById('imageModal').classList.remove('hidden'); }
        function openCheckout() { if(cart.length > 0) document.getElementById('orderModal').classList.remove('hidden'); }

        // WhatsApp অর্ডার সিস্টেম
        function submitOrder() {
            const n = document.getElementById('custName').value;
            const ph = document.getElementById('custPhone').value;
            const a = document.getElementById('custAddr').value;
            if(!n || !ph || !a) return alert('সব তথ্য দিন!');
            let items = cart.map(i => `${i.name} (x${i.qty})`).join(', ');
            let total = document.getElementById('cartTotal').innerText;
            const msg = `আসসালামু আলাইকুম (Ar RaiyanMart)\n\nনতুন অর্ডার:\nনাম: ${n}\nফোন: ${ph}\nঠিকানা: ${a}\nপণ্য: ${items}\nমোট: ${total} TK`;
            window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function searchProducts() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderAll(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }

        function changeLang(lang) {
            currentLang = lang;
            document.getElementById('section-title').innerText = lang === 'bn' ? "সমস্ত পণ্য" : "All Products";
            document.getElementById('btn-bn').className = lang === 'bn' ? "px-2 py-1 rounded-full font-bold text-[10px] gold-bg text-white" : "px-2 py-1 rounded-full font-bold text-[10px] text-gray-700";
            document.getElementById('btn-en').className = lang === 'en' ? "px-2 py-1 rounded-full font-bold text-[10px] gold-bg text-white" : "px-2 py-1 rounded-full font-bold text-[10px] text-gray-700";
        }
    </script>
</body>
</html>
