<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart - Professional Marketplace</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { background-color: #f8f1f3; font-family: 'Hind Siliguri', sans-serif; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 8px;
        }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(5, 1fr); } }

        .product-card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
        }
        .product-card:active { transform: scale(0.97); }
        .product-img { height: 170px; width: 100%; object-fit: cover; cursor: pointer; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .sticky-header { position: sticky; top: 0; z-index: 100; background: white; }
    </style>
</head>
<body>

<header class="sticky-header shadow-sm">
    <div class="p-3 flex justify-between items-center border-b">
        <div class="text-xl font-bold gold-text flex items-center gap-1">
            <i class="fa-solid fa-gem"></i><span>Ar RaiyanMart</span>
        </div>
        <div class="flex gap-1 bg-gray-100 p-1 rounded-full scale-90">
            <button onclick="changeLang('bn')" id="btn-bn" class="px-3 py-1 rounded-full font-bold text-[10px] gold-bg text-white">বাংলা</button>
            <button onclick="changeLang('en')" id="btn-en" class="px-3 py-1 rounded-full font-bold text-[10px] text-gray-500">EN</button>
        </div>
    </div>
    <div class="p-2 bg-white">
        <div class="relative max-w-2xl mx-auto">
            <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="পণ্য খুঁজুন..."
                   class="w-full pl-10 pr-4 py-2 rounded-lg bg-gray-100 text-sm outline-none border-none focus:ring-1 focus:ring-yellow-500">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
        </div>
    </div>
</header>

<main class="container mx-auto max-w-6xl">
    <div class="p-2">
        <img src="hero-banner.jpg" alt="Banner" class="w-full h-auto rounded-lg shadow-sm">
    </div>

    <h2 id="section-title" class="text-xs font-bold text-gray-600 p-3 uppercase tracking-widest border-l-4 border-[#D4AF37] mt-2">সেরা সংগ্রহসমূহ</h2>
    
    <div id="productList" class="product-grid">
        <div class="col-span-full text-center py-20 text-gray-400">
            <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
            <p>অপেক্ষা করুন...</p>
        </div>
    </div>
</main>

<div id="imageModal" class="fixed inset-0 bg-black/95 hidden z-[1000] flex items-center justify-center p-4">
    <button onclick="document.getElementById('imageModal').classList.add('hidden')" class="absolute top-5 right-5 text-white text-3xl font-bold">&times;</button>
    <img id="fullImage" src="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl">
</div>

<div id="orderModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-[5001]">
    <div class="bg-white w-full max-w-sm rounded-2xl p-6 relative shadow-2xl">
        <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="absolute top-4 right-5 text-gray-400 text-2xl">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <h2 id="modal-title" class="text-lg font-bold mb-5 border-b pb-2">অর্ডার কনফার্ম করুন</h2>
        <div class="space-y-4">
            <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-3 bg-gray-50 rounded-xl text-sm border focus:outline-none">
            <input type="number" id="custPhone" placeholder="মোবাইল নম্বর" class="w-full p-3 bg-gray-50 rounded-xl text-sm border focus:outline-none">
            
            <div class="text-[10px] font-bold text-gray-500 uppercase ml-1">ডেলিভারি এরিয়া:</div>
            <select id="delCharge" class="w-full p-3 bg-gray-50 rounded-xl text-sm border focus:outline-none">
                <option value="Inside Dhaka - 80 TK">Inside Dhaka - 80 TK</option>
                <option value="Outside Dhaka - 140 TK">Outside Dhaka - 140 TK</option>
            </select>

            <textarea id="custAddr" placeholder="পুরো ঠিকানা" class="w-full p-3 bg-gray-50 rounded-xl h-20 text-sm border focus:outline-none"></textarea>
            <button onclick="submitOrder()" id="confirm-btn" class="w-full bg-black text-white py-3.5 rounded-xl font-bold transition active:scale-95">অর্ডার দিন</button>
        </div>
    </div>
</div>

<script>
// Firebase কনফিগ (তোমার স্ক্রিনশট থেকে নেওয়া)
const firebaseConfig = {
    apiKey: "AIzaSyBucDfG8NmMC6xyxUJzZOautG-EQLVRU",
    authDomain: "ar-raiyanmart.firebaseapp.com",
    databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ar-raiyanmart",
    storageBucket: "ar-raiyanmart.firebasestorage.app",
    messagingSenderId: "336578883565",
    appId: "1:336578883565:web:54d73b52c96a26f38601e4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let allProducts = [], currentLang = 'bn', activeProduct = null;

const uiText = {
    bn: { title: "সেরা সংগ্রহসমূহ", search: "পণ্য খুঁজুন...", ask: "প্রশ্ন...", order: "অর্ডার দিন", modal: "অর্ডার কনফার্ম করুন", name: "আপনার নাম", phone: "মোবাইল নম্বর", addr: "পুরো ঠিকানা", btn: "অর্ডার দিন" },
    en: { title: "Best Collections", search: "Search products...", ask: "Ask...", order: "Order Now", modal: "Confirm Order", name: "Your Name", phone: "Phone Number", addr: "Address", btn: "Order Now" }
};

db.ref('live_products').on('value', (s) => {
    const d = s.val(); allProducts = [];
    for(let k in d) {
        let p = d[k]; p.id = k;
        p.displayShop = p.seller || p.shopName || 'Ar RaiyanMart';
        allProducts.push(p);
    }
    renderAll(allProducts);
});

function renderAll(products) {
    const list = document.getElementById('productList');
    list.innerHTML = "";
    const t = uiText[currentLang];

    products.forEach(p => {
        let img = p.image || p.imageURL || p.img || (p.allImages && p.allImages[0]) || 'https://via.placeholder.com/150';
        list.innerHTML += `
            <div class="product-card shadow-sm">
                <div class="relative">
                    <img src="${img}" class="product-img" onclick="openImg('${img}')">
                    <div class="absolute top-2 left-2 bg-white/80 backdrop-blur px-2 py-0.5 rounded text-[8px] font-bold">
                        <i class="fa-solid fa-store mr-0.5"></i> ${p.displayShop}
                    </div>
                </div>
                <div class="p-2.5 flex-1 flex flex-col justify-between">
                    <div>
                        <h3 class="text-[11px] font-semibold text-gray-800 line-clamp-2 leading-tight">${p.name}</h3>
                        <p class="gold-text font-bold text-sm mt-1">৳ ${p.price}</p>
                        <p class="text-[10px] text-gray-500 line-clamp-2 mt-1">${p.description || p.desc || ''}</p>
                    </div>
                    <div class="mt-3">
                        <div class="flex gap-1 mb-2">
                            <input type="text" id="q-${p.id}" placeholder="${t.ask}" class="w-full p-1.5 rounded bg-gray-50 text-[10px] border outline-none focus:ring-1">
                            <button onclick="askQ('${p.id}', '${p.name}', '${p.displayShop}')" class="bg-green-500 text-white px-2 rounded-lg"><i class="fa-solid fa-paper-plane text-[10px]"></i></button>
                        </div>
                        <button onclick="openOrder('${p.id}')" class="w-full gold-bg text-white py-2 rounded-lg font-bold text-xs">${t.order}</button>
                    </div>
                </div>
            </div>`;
    });
}

function openImg(s) { document.getElementById('fullImage').src = s; document.getElementById('imageModal').classList.remove('hidden'); }
function openOrder(id) { activeProduct = allProducts.find(p => p.id === id); document.getElementById('orderModal').classList.remove('hidden'); }

function submitOrder() {
    const n = document.getElementById('custName').value, ph = document.getElementById('custPhone').value, a = document.getElementById('custAddr').value, dc = document.getElementById('delCharge').value;
    if(!n || !ph || !a) { alert("সব তথ্য পূরণ করুন!"); return; }

    let imgLink = activeProduct.image || activeProduct.imageURL || activeProduct.img || '';
    const msg = `🔔 নতুন অর্ডার (Ar RaiyanMart)\n\n🏪 Shop: ${activeProduct.displayShop}\n📦 Product: ${activeProduct.name}\n💰 Price: ${activeProduct.price}\n🚚 Delivery: ${dc}\n🖼️ Photo: ${imgLink}\n\n👤 Name: ${n}\n📞 Phone: ${ph}\n🏠 Address: ${a}`;
    window.open('https://wa.me/8801704100288?text='+encodeURIComponent(msg), '_blank');
}

function askQ(id, name, shop) {
    const q = document.getElementById('q-'+id).value;
    if(!q) return;
    window.open('https://wa.me/8801704100288?text='+encodeURIComponent('আসসালামু আলাইকুম, শপ: '+shop+'\nপ্রোডাক্ট: '+name+'\nপ্রশ্ন: '+q), '_blank');
}

function searchProducts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderAll(allProducts.filter(p => p.name.toLowerCase().includes(q)));
}

function changeLang(l) {
    currentLang = l;
    document.getElementById('section-title').innerText = uiText[l].title;
    document.getElementById('searchInput').placeholder = uiText[l].search;
    document.getElementById('modal-title').innerText = uiText[l].modal;
    document.getElementById('custName').placeholder = uiText[l].name;
    document.getElementById('custPhone').placeholder = uiText[l].phone;
    document.getElementById('custAddr').placeholder = uiText[l].addr;
    document.getElementById('confirm-btn').innerText = uiText[l].btn;
    renderAll(allProducts);
}
</script>
</body>
</html>
