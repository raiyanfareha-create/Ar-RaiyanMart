<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar Raiyan Mart | Premium Shopping</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { background-color: #f7f7f7; font-family: 'Hind Siliguri', sans-serif; margin: 0; padding: 0; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        
        /* Banner Slider Style */
        .slider-container { width: 100%; height: 180px; position: relative; overflow: hidden; margin-bottom: 10px; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease-in-out; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }

        /* Catalog Grid: 1 screen-ay 4ti product */
        .catalog-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .product-card { 
            background: #fff; border-radius: 12px; overflow: hidden; 
            display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            height: 250px; cursor: pointer; border: 1px solid #eee;
        }
        .product-img { width: 100%; height: 140px; object-fit: contain; background: #fff; padding: 10px; }
        
        /* Modal Views */
        #productDetails { position: fixed; inset: 0; background: #fff; z-index: 2000; display: none; overflow-y: auto; }
        .back-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); color: #fff; width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2001; }
        
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; padding: 12px; display: flex; gap: 10px; border-top: 1px solid #eee; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); }
        #checkoutModal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 15px; }
    </style>
</head>
<body>

    <div class="bg-gray-900 text-white text-[11px] py-2 px-4 flex justify-end gap-6">
        <button onclick="changeLang('bn')" id="btn-bn" class="font-bold">বাংলা</button>
        <button onclick="changeLang('en')" id="btn-en" class="font-bold opacity-50">English</button>
    </div>

    <div id="homeScreen">
        <header class="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
            <span class="text-xl font-extrabold gold-text tracking-tight uppercase">Ar Raiyan Mart</span>
            <div class="relative cursor-pointer" onclick="openCheckout()">
                <i class="fa-solid fa-bag-shopping text-2xl text-gray-700"></i>
                <span id="cartCount" class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] rounded-full px-1.5 font-bold border-2 border-white">0</span>
            </div>
        </header>

        <div class="slider-container" id="slider">
            <div class="slide active"><img src="https://img.freepik.com/free-vector/modern-sale-banner-with-product-description_1361-1259.jpg"></div>
            <div class="slide"><img src="https://img.freepik.com/free-psd/horizontal-banner-online-fashion-sale_23-2148585404.jpg"></div>
        </div>

        <div class="p-3 bg-white">
            <input type="text" id="searchInput" onkeyup="searchProduct(this.value)" placeholder="পণ্য খুঁজুন..." class="w-full p-3 bg-gray-100 rounded-xl text-sm outline-none border-none">
        </div>

        <div id="productList" class="catalog-grid"></div>
        <div class="h-20"></div>
    </div>

    <div id="productDetails">
        <button onclick="closeDetails()" class="back-btn"><i class="fa-solid fa-arrow-left"></i></button>
        <div id="detailsContent"></div>
    </div>

    <div id="checkoutModal">
        <div class="bg-white w-full max-w-md rounded-2xl p-6 relative">
            <button onclick="closeCheckout()" class="absolute top-4 right-4 text-2xl text-gray-400">&times;</button>
            <h2 class="text-xl font-bold mb-4 border-b pb-2" id="orderFormTitle">অর্ডার তথ্য</h2>
            <div class="space-y-3">
                <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <input type="number" id="custPhone" placeholder="মোবাইল নম্বর" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <textarea id="custAddr" placeholder="বিস্তারিত ঠিকানা" class="w-full p-3 bg-gray-50 border rounded-xl outline-none h-20"></textarea>
                
                <select id="deliverySelect" onchange="updateTotal()" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                    <option value="80">ঢাকার ভেতরে - 80 TK</option>
                    <option value="140">ঢাকার বাইরে - 140 TK</option>
                </select>

                <div class="p-4 bg-yellow-50 rounded-xl border border-dashed border-yellow-200">
                    <div class="flex justify-between text-sm"><span>আইটেম মোট:</span> <span id="summarySubtotal">0</span> TK</div>
                    <div class="flex justify-between font-bold text-lg mt-2 pt-2 border-t border-yellow-200 gold-text">
                        <span>সর্বমোট:</span> <span id="summaryTotal">0</span> TK
                    </div>
                </div>

                <button onclick="sendOrder()" class="w-full bg-[#25D366] text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 shadow-lg">
                    <i class="fa-brands fa-whatsapp text-xl"></i> হোয়াটসঅ্যাপ অর্ডার
                </button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyBucDF68HVd8nyxUJz20utG-EQLYRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.appspot.com",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601ef"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let allProducts = [], cart = [], currentLang = localStorage.getItem('lang') || 'bn';

        const langData = {
            bn: { ask: "প্রশ্ন করুন", buy: "এখনই কিনুন", cart: "কার্টে রাখুন", desc: "পণ্যের বিবরণ", success: "ব্যাগ-এ যোগ হয়েছে!" },
            en: { ask: "Ask Question", buy: "Order Now", cart: "Add to Cart", desc: "Description", success: "Added to Bag!" }
        };

        // Banner Slider Logic
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 4000);

        function changeLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.getElementById('btn-bn').style.opacity = (lang === 'bn' ? '1' : '0.5');
            document.getElementById('btn-en').style.opacity = (lang === 'en' ? '1' : '0.5');
            renderCatalog(allProducts);
        }

        db.ref('live_products').on('value', (snap) => {
            const data = snap.val();
            allProducts = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            renderCatalog(allProducts);
        });

        function renderCatalog(products) {
            const list = document.getElementById('productList');
            list.innerHTML = products.map(p => `
                <div class="product-card" onclick="openDetails('${p.id}')">
                    <img src="${p.img || p.image}" class="product-img">
                    <div class="p-3 flex flex-col justify-between flex-grow">
                        <h3 class="text-[13px] font-bold leading-tight h-8 overflow-hidden">${p.name}</h3>
                        <p class="gold-text font-black text-sm mt-1">৳${p.price}</p>
                    </div>
                </div>
            `).join('');
        }

        function openDetails(id) {
            const p = allProducts.find(x => x.id === id);
            const content = document.getElementById('detailsContent');
            const t = langData[currentLang];
            
            content.innerHTML = `
                <img src="${p.img || p.image}" class="w-full h-80 object-contain bg-white pt-10">
                <div class="p-6 pb-32">
                    <p class="text-3xl font-black gold-text">৳${p.price}</p>
                    <h1 class="text-xl font-bold mt-2 text-gray-900">${p.name}</h1>
                    <div class="mt-6 p-5 bg-gray-50 rounded-2xl border border-gray-100 text-gray-600 text-sm">
                        <h4 class="font-bold text-gray-400 text-[10px] mb-2 uppercase tracking-widest">${t.desc}</h4>
                        ${p.description || 'বিবরণ দেওয়া নেই'}
                    </div>
                </div>
                <div class="sticky-footer">
                    <button onclick="askQuestion('${p.name}')" class="bg-gray-100 text-gray-700 px-4 py-3.5 rounded-xl font-bold text-sm border"><i class="fa-brands fa-whatsapp"></i> ${t.ask}</button>
                    <button onclick="addToCart('${p.id}')" class="flex-1 border-2 border-[#D4AF37] text-[#D4AF37] py-3.5 rounded-xl font-bold text-sm">${t.cart}</button>
                    <button onclick="buyNow('${p.id}')" class="flex-1 gold-bg text-white py-3.5 rounded-xl font-bold text-sm shadow-lg">${t.buy}</button>
                </div>
            `;
            document.getElementById('productDetails').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeDetails() {
            document.getElementById('productDetails').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function askQuestion(productName) {
            const msg = `আসসালামু আলাইকুম, আমি এই প্রোডাক্টটি সম্পর্কে জানতে চাই: ${productName}`;
            window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            cart = [{...p, qty: 1}];
            document.getElementById('cartCount').innerText = "1";
            alert(langData[currentLang].success);
        }

        function buyNow(id) {
            const p = allProducts.find(x => x.id === id);
            cart = [{...p, qty: 1}];
            openCheckout();
        }

        function openCheckout() {
            if(cart.length === 0) return alert("ব্যাগ খালি!");
            document.getElementById('summarySubtotal').innerText = cart[0].price;
            updateTotal();
            document.getElementById('checkoutModal').style.display = 'flex';
        }

        function closeCheckout() { document.getElementById('checkoutModal').style.display = 'none'; }

        function updateTotal() {
            const sub = parseInt(document.getElementById('summarySubtotal').innerText) || 0;
            const dev = parseInt(document.getElementById('deliverySelect').value) || 0;
            document.getElementById('summaryTotal').innerText = sub + dev;
        }

        // Updated WhatsApp Order Format (Inspired by)
        function sendOrder() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const addr = document.getElementById('custAddr').value;
            if(!name || !phone || !addr) return alert("সব তথ্য দিন");

            const p = cart[0];
            const delivery = document.getElementById('deliverySelect').value;
            const total = document.getElementById('summaryTotal').innerText;
            
            // Note Format from
            const invoice = `🔔 *নতুন অর্ডার!*\n\n🏪 *Shop name:* Ar Raiyan Mart\n📦 *Product:* ${p.name}\n🖼️ *Product Link:* (Auto-generated)\n💰 *দাম:* ${p.price} TK\n🚚 *ডেলিভারি:* ${delivery} TK\n💵 *মোট:* ${total} TK\n\n👤 *ক্রেতা:* ${name}\n📞 *ফোন:* ${phone}\n📍 *ঠিকানা:* ${addr}`;

            window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(invoice)}`, '_blank');
        }

        function searchProduct(val) {
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(val.toLowerCase()));
            renderCatalog(filtered);
        }

        changeLang(currentLang);
    </script>
</body>
</html>
