<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart - Premium Marketplace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        
        :root {
            --gold: #D4AF37;
            --marble: #fcf8f8;
        }

        body { 
            background-color: var(--marble); 
            font-family: 'Hind Siliguri', sans-serif; 
            margin: 0;
            padding: 0;
        }

        .gold-text { color: var(--gold); }
        .gold-bg { background-color: var(--gold); }
        
        /* Product Grid */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding: 12px; 
        }

        .product-card { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid #eee; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .product-img { 
            height: 150px; 
            width: 100%; 
            object-fit: cover; 
            cursor: pointer; 
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .sticky-header { 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background: white; 
            border-bottom: 1px solid #eee;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4d4d;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="sticky-header">
        <div class="p-4 flex justify-between items-center">
            <div class="text-xl font-bold gold-text flex items-center gap-2">
                <i class="fa-solid fa-gem"></i> Ar RaiyanMart
            </div>
            <div class="flex items-center gap-4">
                <div class="relative cursor-pointer" onclick="toggleCart()">
                    <i class="fa-solid fa-cart-shopping text-2xl text-gray-700"></i>
                    <span id="cartCount" class="cart-badge">0</span>
                </div>
            </div>
        </div>
        <div class="px-4 pb-3">
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="পণ্য খুঁজুন..." class="w-full pl-10 pr-4 py-2 bg-gray-100 rounded-lg text-sm outline-none">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto">
        <div class="p-2">
            <img src="hero-banner.jpg" class="w-full rounded-xl shadow-sm" onerror="this.src='https://via.placeholder.com/800x400?text=Ar+RaiyanMart'">
        </div>

        <h2 class="font-bold text-gray-700 p-4 border-l-4 border-[#D4AF37] my-2">সমস্ত পণ্য</h2>
        
        <div id="productList" class="product-grid">
            <p class="col-span-2 text-center py-10 text-gray-400">পণ্য লোড হচ্ছে...</p>
        </div>
    </main>

    <div id="cartModal" class="fixed inset-0 bg-black/60 hidden z-[5000] flex justify-end">
        <div class="bg-white w-80 h-full p-5 relative shadow-xl overflow-y-auto">
            <button onclick="toggleCart()" class="absolute top-4 right-4 text-2xl">&times;</button>
            <h2 class="text-lg font-bold mb-6 border-b pb-2">আপনার ব্যাগ</h2>
            <div id="cartItems" class="space-y-4"></div>
            <div class="mt-10 border-t pt-5">
                <div class="flex justify-between font-bold text-lg mb-5">
                    <span>মোট:</span> <span class="gold-text">৳ <span id="cartTotal">0</span></span>
                </div>
                <button onclick="openCheckout()" class="w-full gold-bg text-white py-4 rounded-xl font-bold active:scale-95">অর্ডার কনফার্ম করুন</button>
            </div>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black/60 hidden z-[6000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl p-6 relative">
            <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="absolute top-4 right-5 text-2xl">&times;</button>
            <h2 class="text-lg font-bold mb-4 border-b pb-2 text-gray-800">অর্ডার তথ্য দিন</h2>
            <div class="space-y-3">
                <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-3 bg-gray-50 border rounded-xl text-sm">
                <input type="number" id="custPhone" placeholder="মোবাইল নম্বর" class="w-full p-3 bg-gray-50 border rounded-xl text-sm">
                <textarea id="custAddr" placeholder="পুরো ঠিকানা" class="w-full p-3 bg-gray-50 border rounded-xl h-20 text-sm"></textarea>
                <button onclick="submitOrder()" class="w-full gold-bg text-white py-4 rounded-xl font-bold shadow-lg">WhatsApp অর্ডার করুন</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Config (Updating with your provided credentials)
        const firebaseConfig = {
            apiKey: "AIzaSyBucDFQ0iHiC6xyxUjz2OwUtG-EQlyRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebaseio.com",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.appspot.com",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [];
        let cart = [];

        // ১. ডাটা লোড করা (live_products নোড থেকে)
        db.ref('live_products').on('value', (snapshot) => {
            const data = snapshot.val();
            allProducts = [];
            if (data) {
                for (let key in data) {
                    let p = data[key];
                    p.id = key;
                    allProducts.push(p);
                }
                renderAll(allProducts);
            } else {
                document.getElementById('productList').innerHTML = '<p class="col-span-2 text-center py-10 text-gray-400">কোনো পণ্য নেই।</p>';
            }
        });

        // ২. পণ্য দেখানোর ফাংশন (ইমেজ ও প্রশ্ন বাটন ঠিক করা হয়েছে)
        function renderAll(products) {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            products.forEach(p => {
                let img = p.img || p.image || p.imageURL || 'https://via.placeholder.com/150';
                list.innerHTML += `
                    <div class="product-card">
                        <img src="${img}" class="product-img" onclick="window.open('${img}')">
                        <div class="p-3 flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="text-[12px] font-bold text-gray-800 line-clamp-2">${p.name}</h3>
                                <p class="gold-text font-bold text-sm mt-1">৳ ${p.price}</p>
                            </div>
                            <div class="mt-3 space-y-2">
                                <button onclick="addToCart('${p.id}')" class="w-full gold-bg text-white py-2 rounded-lg text-[10px] font-bold active:scale-95 transition">
                                    ADD TO CART
                                </button>
                                <a href="https://wa.me/8801704100288?text=আসসালামু আলাইকুম, আমি এই পণ্যটি সম্পর্কে জানতে চাই: ${p.name}" 
                                   target="_blank" 
                                   class="w-full border border-[#D4AF37] gold-text py-1.5 rounded-lg text-[10px] font-bold flex items-center justify-center">
                                    <i class="fa-brands fa-whatsapp mr-1"></i> প্রশ্ন করুন
                                </a>
                            </div>
                        </div>
                    </div>`;
            });
        }

        // ৩. কার্ট লজিক
        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            const item = cart.find(x => x.id === id);
            if(item) { item.qty++; } else { cart.push({...p, qty: 1}); }
            updateCartUI();
            if(cart.length === 1) toggleCart();
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.reduce((a, b) => a + b.qty, 0);
            const list = document.getElementById('cartItems');
            let total = 0;
            list.innerHTML = cart.length === 0 ? '<p class="text-center text-gray-400 mt-10">ব্যাগ খালি!</p>' : '';
            cart.forEach(item => {
                total += (item.price * item.qty);
                list.innerHTML += `<div class="flex justify-between text-xs border-b pb-2"><span>${item.name} (x${item.qty})</span><span>৳${item.price * item.qty}</span></div>`;
            });
            document.getElementById('cartTotal').innerText = total;
        }

        function toggleCart() { document.getElementById('cartModal').classList.toggle('hidden'); }
        function openCheckout() { if(cart.length > 0) document.getElementById('orderModal').classList.remove('hidden'); }

        // ৪. WhatsApp অর্ডার সিস্টেম
        function submitOrder() {
            const n = document.getElementById('custName').value.trim();
            const ph = document.getElementById('custPhone').value.trim();
            const a = document.getElementById('custAddr').value.trim();
            if(!n || !ph || !a) return alert('সব তথ্য দিন!');
            
            let items = cart.map(i => `${i.name} (${i.qty})`).join(', ');
            let total = document.getElementById('cartTotal').innerText;
            const msg = `আসসালামু আলাইকুম (Ar RaiyanMart)\n\nনতুন অর্ডার:\nনাম: ${n}\nফোন: ${ph}\nঠিকানা: ${a}\nপণ্য: ${items}\nমোট: ${total} TK`;
            window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function searchProducts() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderAll(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        }
    </script>
</body>
</html>
