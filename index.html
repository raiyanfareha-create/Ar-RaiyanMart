<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ar RaiyanMart | কাস্টমার শপ</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 0; overflow-x: hidden; }
        header { background: linear-gradient(135deg, #f85606, #ff8c52); color: white; text-align: center; padding: 20px 10px; border-radius: 0 0 15px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; }
        
        /* গ্রিড ফিক্স - মোবাইল স্ক্রিনের জন্য পারফেক্ট */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            width: 100%;
            max-width: 500px; 
            margin: 15px auto; 
            padding: 0 10px; 
        }

        .product-card { 
            background: white; 
            padding: 10px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            overflow: hidden;
            border: 1px solid #eee;
        }
        
        /* ছবি ফিক্স - আর চওড়া বা অতিরিক্ত বড় হবে না */
        .product-card img { 
            width: 100%; 
            height: 140px; 
            object-fit: contain; 
            background: #fff;
            border-radius: 8px; 
            cursor: zoom-in; 
        }
        
        .shop-tag { font-size: 9px; color: #f85606; background: #fff0e9; padding: 2px 6px; border-radius: 10px; display: inline-block; margin-top: 5px; font-weight: bold; }
        .product-card h4 { margin: 5px 0; font-size: 14px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* ডেসক্রিপশন ফিক্স - কার্ড যাতে বড় না হয় */
        .card-description { 
            font-size: 11px; 
            color: #666; 
            margin: 3px 0 8px; 
            line-height: 1.3; 
            text-align: left;
            height: 30px; /* নির্দিষ্ট উচ্চতা */
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .price { color: #f85606; font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        
        /* কমেন্ট সেকশন ফিক্স */
        .comment-section { text-align: left; border-top: 1px solid #eee; padding-top: 5px; margin-top: auto; }
        .comment-list { max-height: 60px; overflow-y: auto; font-size: 10px; margin-bottom: 5px; }
        .single-comment { background: #f9f9f9; padding: 4px; border-radius: 4px; margin-bottom: 4px; border-left: 2px solid #f85606; line-height: 1.2; }
        .seller-reply { margin-top: 3px; color: #25D366; font-weight: bold; font-size: 9px; }
        
        .comment-input-area { display: flex; gap: 3px; }
        .comment-input-area input { flex: 1; padding: 4px; font-size: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        .btn-comment { background: #f85606; color: white; border: none; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 9px; }

        .btn-buy { background: #25D366; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; margin-top: 8px; }

        /* মডাল ও অন্যান্য */
        #imageModal, #orderModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; justify-content: center; align-items: center; padding: 10px; }
        #imageModal { background: rgba(0,0,0,0.9); }
        #orderModal { background: rgba(0,0,0,0.8); }
        #fullImg { max-width: 100%; max-height: 80vh; border-radius: 5px; }
        .close-zoom { position: absolute; top: 15px; right: 20px; color: white; font-size: 40px; cursor: pointer; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0; font-size: 24px;">Ar RaiyanMart</h1>
        <p style="margin:5px 0 0; font-size:12px;">সেরা পণ্য, সঠিক দাম—আপনার আস্থাই শক্তি</p>
    </header>

    <div class="grid" id="productGrid">লোড হচ্ছে...</div>

    <div id="imageModal">
        <span class="close-zoom" onclick="closeImageModal()">×</span>
        <img id="fullImg" src="">
    </div>

    <div id="orderModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0; font-size: 18px; color:#f85606;"></h3>
            <p id="modalMainDesc" style="font-size: 13px; color: #444; border: 1px solid #eee; padding: 8px; border-radius: 5px; max-height: 100px; overflow-y: auto;"></p>
            <input type="text" id="custName" placeholder="আপনার নাম">
            <input type="number" id="custNumber" placeholder="মোবাইল নম্বর">
            <textarea id="custAddress" rows="2" placeholder="পুরো ঠিকানা"></textarea>
            <button style="background: #25D366; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer;" onclick="sendToWhatsApp()">অর্ডার নিশ্চিত করুন</button>
            <p onclick="closeOrderModal()" style="margin-top:12px; color:red; cursor:pointer; font-size:14px; font-weight:bold;">বন্ধ করুন</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            projectId: "ar-raiyanmart",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b82c96a26f38601e4"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let selectedProduct = null;

        database.ref('live_products').on('value', (snapshot) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            const data = snapshot.val();
            if (!data) { grid.innerHTML = "কোনো পণ্য নেই।"; return; }

            Object.keys(data).forEach(id => {
                const p = data[id];
                const currentDesc = p.desc || p.description || "বর্ণনা নেই।";
                const currentShop = p.shopName || "Ar RaiyanMart";
                
                let commentsHtml = "";
                if (p.comments) {
                    Object.values(p.comments).reverse().forEach(c => {
                        let replyHtml = c.reply ? `<div class="seller-reply">📩 ${c.reply}</div>` : "";
                        commentsHtml += `<div class="single-comment"><b>${c.user}:</b> ${c.text}${replyHtml}</div>`;
                    });
                } else {
                    commentsHtml = "<p style='color:#999; font-size:9px;'>প্রশ্ন করুন...</p>";
                }

                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" onclick="openImageModal('${p.img}')">
                        <div><span class="shop-tag">🏪 ${currentShop}</span></div>
                        <h4>${p.name}</h4>
                        <div class="card-description">${currentDesc}</div>
                        <div class="price">৳${p.price}</div>
                        <div class="comment-section">
                            <div class="comment-list">${commentsHtml}</div>
                            <div class="comment-input-area">
                                <input type="text" id="name-${id}" placeholder="নাম">
                                <input type="text" id="input-${id}" placeholder="প্রশ্ন..">
                                <button class="btn-comment" onclick="postComment('${id}')">Ok</button>
                            </div>
                        </div>
                        <button class="btn-buy" onclick="openOrderModal('${p.name}', '${p.price}', '${currentDesc.replace(/'/g, "\\'")}', '${p.img}', '${currentShop}')">অর্ডার</button>
                    </div>`;
            });
        });

        function postComment(productId) {
            const userName = document.getElementById(`name-${productId}`).value;
            const commentText = document.getElementById(`input-${productId}`).value;
            if (!userName || !commentText) return;

            database.ref(`live_products/${productId}`).once('value').then((snapshot) => {
                const pData = snapshot.val();
                database.ref(`live_products/${productId}/comments`).push({
                    user: userName,
                    text: commentText,
                    shopName: pData.shopName || "Ar RaiyanMart", 
                    time: Date.now()
                }).then(() => {
                    document.getElementById(`input-${productId}`).value = "";
                });
            });
        }

        function openImageModal(src) { document.getElementById('fullImg').src = src; document.getElementById('imageModal').style.display = 'flex'; }
        function closeImageModal() { document.getElementById('imageModal').style.display = 'none'; }
        function openOrderModal(name, price, desc, img, shop) {
            selectedProduct = { name, price, desc, img, shop };
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalMainDesc').innerText = desc;
            document.getElementById('orderModal').style.display = 'flex';
        }
        function closeOrderModal() { document.getElementById('orderModal').style.display = 'none'; }

        function sendToWhatsApp() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custNumber').value;
            const address = document.getElementById('custAddress').value;
            if (!name || !phone || !address) { alert("সব তথ্য দিন!"); return; }
            const myWhatsApp = "8801704100288"; 
            const message = `🛍 *নতুন অর্ডার*%0A🏪 *দোকান:* ${selectedProduct.shop}%0A📦 *পণ্য:* ${selectedProduct.name}%0A💰 *দাম:* ৳${selectedProduct.price}%0A👤 *কাস্টমার:* ${name}%0A📞 *ফোন:* ${phone}%0A📍 *ঠিকানা:* ${address}`;
            window.open(`https://wa.me/${myWhatsApp}?text=${message}`, '_blank');
            closeOrderModal();
        }
    </script>
</body>
</html>
