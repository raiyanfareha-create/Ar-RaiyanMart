<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RaiyanMart | Official Shopping App</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Hind Siliguri', 'Segoe UI', sans-serif; background: #fdfaf5; color: #333; line-height: 1.5; }
        
        /* পেশাদার হেডার ডিজাইন */
        header { background: #ffaa33; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1001; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .logo-box { width: 38px; height: 38px; background: white; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #eee; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        .header-title { font-size: 20px; font-weight: 700; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .header-icons { display: flex; gap: 15px; color: white; font-size: 22px; cursor: pointer; }

        /* আপনার আপলোড করা ব্যানার */
        .banner-container { width: 100%; margin-bottom: 15px; overflow: hidden; background: #fff; border-bottom: 2px solid #eee; }
        .banner-container img { width: 100%; display: block; height: auto; }

        /* প্রোডাক্ট গ্রিড লেআউট */
        #productGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px 25px; max-width: 1200px; margin: 0 auto; }
        
        /* প্রোডাক্ট কার্ড ডিজাইন */
        .product-card { background: white; padding: 12px; border-radius: 20px; display: flex; flex-direction: column; border: 1px solid #eee; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.2s; position: relative; }
        .shop-badge { font-size: 10px; color: #f85606; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 3px; }
        .shop-badge::before { content: '✔'; background: #f85606; color: white; border-radius: 50%; width: 12px; height: 12px; display: flex; align-items: center; justify-content: center; font-size: 7px; }

        /* ইমেজ স্লাইডার */
        .img-box { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 12px; background: #f9f9f9; cursor: pointer; }
        .product-img { width: 100%; height: 100%; object-fit: contain; display: none; transition: opacity 0.3s; }
        .product-img.active { display: block; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.8); color: #333; border: none; width: 30px; height: 30px; border-radius: 50%; z-index: 5; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-weight: bold; }
        .prev-btn { left: 5px; } .next-btn { right: 5px; }

        .product-card h4 { margin: 12px 0 5px; font-size: 15px; font-weight: 600; color: #222; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .desc { font-size: 12px; color: #777; margin-bottom: 10px; height: 35px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        /* প্রশ্নোত্তর সেকশন */
        .qna-box { background: #fdfaf5; padding: 10px; border-radius: 12px; margin-bottom: 10px; font-size: 11px; max-height: 100px; overflow-y: auto; border: 1px solid #f0e0d0; }
        .q-item { margin-bottom: 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        .q-item b { color: #f85606; }
        .ask-btn { background: #fff; color: #555; border: 1px solid #ddd; padding: 8px; border-radius: 10px; font-size: 12px; cursor: pointer; margin-bottom: 12px; width: 100%; font-weight: 600; transition: 0.3s; }
        .ask-btn:hover { background: #f85606; color: white; border-color: #f85606; }

        .price-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .price { color: #f85606; font-weight: bold; font-size: 20px; }
        .buy-btn { background: #2ecc71; color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: auto; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }

        /* মোডাল ডিজাইন */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; justify-content: center; align-items: center; padding: 15px; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 420px; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-preview { text-align: center; margin-bottom: 20px; background: #fffcf5; padding: 15px; border-radius: 15px; border: 1px dashed #f85606; }
        .modal-preview img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 10px; }
        .modal-content input, .modal-content select { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; outline: none; transition: 0.3s; }
        .modal-content input:focus { border-color: #f85606; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 30px; color: #bbb; cursor: pointer; }

        /* জুম মোডাল */
        #zoomOverlay img { transition: transform 0.3s; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo-box"><img src="https://i.ibb.co/VWVXf1Y/ar-logo.png" alt="Logo"></div>
            <span class="header-title">RaiyanMart</span>
        </div>
        <div class="header-icons">
            <span>🔗</span>
            <span>🔔</span>
        </div>
    </header>

    <div class="banner-container">
        <img src="https://i.ibb.co/3ykXFv0/bannar.jpg" alt="RaiyanMart Banner">
    </div>

    <div id="productGrid"></div>

    <div id="zoomOverlay" class="modal" onclick="this.style.display='none'">
        <span class="modal-close" style="color:white;">&times;</span>
        <img id="fullImg" src="" style="max-width:95%; max-height:85vh; object-fit:contain; border-radius:10px;">
    </div>

    <div id="askModal" class="modal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('askModal')">&times;</span>
            <h3 style="text-align:center; color:#f85606; margin-bottom:20px; font-weight:700;">আপনার প্রশ্ন লিখুন</h3>
            <input type="text" id="qUser" placeholder="আপনার নাম">
            <input type="text" id="qText" placeholder="আপনি কী জানতে চান?">
            <button class="buy-btn" onclick="submitQuestion()">প্রশ্নটি পাঠান</button>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('orderModal')">&times;</span>
            <div class="modal-preview">
                <p id="mShop" style="font-size: 11px; font-weight: bold; color: #f85606;"></p>
                <img id="mImg" src="">
                <h4 id="mTitle" style="font-size: 15px;"></h4>
            </div>
            <h3 style="text-align: center; color: #f85606; margin-bottom: 20px;">শিপিং ডিটেইলস</h3>
            <input type="text" id="cName" placeholder="আপনার পুরো নাম">
            <input type="tel" id="cPhone" placeholder="মোবাইল নম্বর">
            <input type="text" id="cJela" placeholder="আপনার জেলা">
            <input type="text" id="cThana" placeholder="থানা / উপজেলা">
            <input type="text" id="cAddr" placeholder="বিস্তারিত ঠিকানা">
            <select id="cColor"></select>
            <select id="cDelivery">
                <option value="70">ঢাকার ভিতরে (৭০ টাকা)</option>
                <option value="130">ঢাকার বাইরে (১৩০ টাকা)</option>
            </select>
            <button class="buy-btn" onclick="confirmOrder()">অর্ডার নিশ্চিত করুন</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU", 
            authDomain: "ar-raiyanmart.firebaseapp.com", 
            projectId: "ar-raiyanmart", 
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let selectedProduct = null;
        let activeQuestionId = null;

        // প্রোডাক্ট লোড করা
        database.ref('live_products').on('value', (snapshot) => {
            const grid = document.getElementById('productGrid');
            const data = snapshot.val();
            if (!data) {
                grid.innerHTML = "<p style='text-align:center; grid-column:1/3;'>লোড হচ্ছে অথবা কোনো প্রোডাক্ট নেই...</p>";
                return;
            }
            let cards = "";
            Object.keys(data).forEach(id => {
                const p = data[id];
                const imgs = Array.isArray(p.imgs) ? p.imgs : [p.img];
                let qnaHtml = "";
                if(p.comments) {
                    Object.values(p.comments).forEach(c => {
                        qnaHtml += `<div class="q-item"><b>${c.user}:</b> ${c.text}${c.reply ? `<br><span style="color:#2ecc71; margin-left:8px;">↳ এডমিন: ${c.reply}</span>` : ''}</div>`;
                    });
                }
                cards += `
                <div class="product-card">
                    <div class="shop-badge">${p.shopName || 'RaiyanMart'}</div>
                    <div class="img-box" id="slider-${id}" onclick="openZoom('${id}')">
                        ${imgs.map((img, i) => `<img src="${img}" class="product-img ${i === 0 ? 'active' : ''}">`).join('')}
                        ${imgs.length > 1 ? `<button class="nav-btn prev-btn" onclick="event.stopPropagation(); slide('${id}', -1)">❮</button><button class="nav-btn next-btn" onclick="event.stopPropagation(); slide('${id}', 1)">❯</button>` : ''}
                    </div>
                    <h4>${p.name}</h4>
                    <div class="desc">${p.desc || 'সেরা কোয়ালিটির পণ্য'}</div>
                    <div class="qna-box">${qnaHtml || 'এখনো কোনো প্রশ্ন নেই।'}</div>
                    <button class="ask-btn" onclick="openAsk('${id}')">প্রশ্ন করুন</button>
                    <div class="price-row">
                        <div class="price">৳${p.price}</div>
                    </div>
                    <button class="buy-btn" onclick="openOrder('${id}', '${p.name}', '${p.price}', '${p.colors || ''}', '${p.shopName || 'RaiyanMart'}')">অর্ডার করুন</button>
                </div>`;
            });
            grid.innerHTML = cards;
        });

        // স্লাইডার কন্ট্রোল
        function slide(id, dir) {
            const imgs = document.getElementById(`slider-${id}`).getElementsByClassName('product-img');
            let idx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
            imgs[idx].classList.remove('active');
            idx = (idx + dir + imgs.length) % imgs.length;
            imgs[idx].classList.add('active');
        }

        // জুম ফাংশন
        function openZoom(id) {
            const activeImg = document.querySelector(`#slider-${id} .product-img.active`);
            document.getElementById('fullImg').src = activeImg.src;
            document.getElementById('zoomOverlay').style.display = 'flex';
        }

        // প্রশ্ন মোডাল ফাংশন
        function openAsk(id) { 
            activeQuestionId = id; 
            document.getElementById('askModal').style.display = 'flex'; 
        }

        function closeModal(modalId) { 
            document.getElementById(modalId).style.display = 'none'; 
        }

        function submitQuestion() {
            const user = document.getElementById('qUser').value;
            const text = document.getElementById('qText').value;
            if(!user || !text) return alert("দয়া করে নাম এবং প্রশ্ন লিখুন!");
            database.ref(`live_products/${activeQuestionId}/comments`).push({ 
                user, 
                text, 
                timestamp: Date.now() 
            }).then(() => {
                alert("আপনার প্রশ্নটি জমা হয়েছে!");
                closeModal('askModal');
                document.getElementById('qUser').value = ""; 
                document.getElementById('qText').value = "";
            });
        }

        // অর্ডার মোডাল ফাংশন
        function openOrder(id, name, price, colors, shop) {
            const activeImg = document.querySelector(`#slider-${id} .product-img.active`).src;
            selectedProduct = { name, price, shop, img: activeImg };
            document.getElementById('mShop').innerText = shop;
            document.getElementById('mImg').src = activeImg;
            document.getElementById('mTitle').innerText = name;
            const colSelect = document.getElementById('cColor');
            const colOptions = colors ? colors.split(',') : ['Default'];
            colSelect.innerHTML = colOptions.map(c => `<option value="${c.trim()}">${c.trim()}</option>`).join('');
            document.getElementById('orderModal').style.display = 'flex';
        }

        // হোয়াটসঅ্যাপ অর্ডার নিশ্চিতকরণ
        function confirmOrder() {
            const name = document.getElementById('cName').value;
            const phone = document.getElementById('cPhone').value;
            const jela = document.getElementById('cJela').value;
            const thana = document.getElementById('cThana').value;
            const addr = document.getElementById('cAddr').value;
            const color = document.getElementById('cColor').value;
            const charge = document.getElementById('cDelivery').value;

            if(!name || !phone || !jela) return alert("দয়া করে সব তথ্য পূরণ করুন!");
            
            const total = parseInt(selectedProduct.price) + parseInt(charge);
            const msg = `*নতুন অর্ডার - RaiyanMart*\n\n` +
                        `📦 *পণ্য:* ${selectedProduct.name} (${color})\n` +
                        `💰 *মূল্য:* ${selectedProduct.price} টাকা\n` +
                        `🚚 *ডেলিভারি:* ${charge} টাকা\n` +
                        `💵 *মোট:* ${total} টাকা\n\n` +
                        `👤 *কাস্টমার:* ${name}\n` +
                        `📞 *ফোন:* ${phone}\n` +
                        `📍 *জেলা:* ${jela}\n` +
                        `🏠 *থানা:* ${thana}\n` +
                        `🏠 *ঠিকানা:* ${addr}\n\n` +
                        `🖼️ *পণ্য ইমেজ:* ${selectedProduct.img}`;
            
            const whatsappUrl = `https://api.whatsapp.com/send?phone=8801704100288&text=${encodeURIComponent(msg)}`;
            window.open(whatsappUrl, '_blank');
            closeModal('orderModal');
        }
    </script>
</body>
</html>
