<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaiyanMart - Your Premium Marketplace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { 
            background-color: #FAF9F6; 
            font-family: 'Hind Siliguri', sans-serif; 
            scroll-behavior: smooth;
        }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        .modal-overlay { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(8px); }
        .hidden { display: none; }
        .cart-badge { font-size: 10px; line-height: 1; }
    </style>
</head>
<body>

    <header class="bg-white/80 backdrop-blur-md shadow-sm p-4 flex justify-between items-center sticky top-0 z-50 px-6">
        <div class="text-3xl font-bold gold-text">
            <i class="fa-solid fa-gem"></i>
        </div>
        
        <div class="flex items-center gap-6">
            <select id="langSwitch" class="border rounded-lg px-2 py-1 text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-[#D4AF37]">
                <option value="bn">বাংলা</option>
                <option value="en">English</option>
            </select>
            
            <div class="relative cursor-pointer group" onclick="openCartModal()">
                <i class="fa-solid fa-cart-shopping text-2xl text-gray-700 group-hover:text-[#D4AF37] transition"></i>
                <span id="cartCount" class="absolute -top-2 -right-2 bg-red-600 text-white cart-badge rounded-full px-1.5 py-1 font-bold shadow-lg">0</span>
            </div>
        </div>
    </header>

    <section class="w-full">
        <img src="https://raw.githubusercontent.com/raiyanfareha-create/Ar-RaiyanMart/main/hero-banner.jpg" 
             alt="RaiyanMart Banner" 
             class="w-full h-auto object-cover border-b-4 border-[#D4AF37]">
    </section>

    <main class="container mx-auto p-4 md:p-10">
        <h2 class="text-2xl font-bold text-gray-800 mb-8 border-l-4 border-[#D4AF37] pl-3">সেরা সংগ্রহসমূহ</h2>
        
        <div id="productList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="col-span-full py-20 flex flex-col items-center justify-center text-gray-400">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3 gold-text"></i>
                <p>পণ্যগুলো আপনার জন্য সাজানো হচ্ছে...</p>
            </div>
        </div>
    </main>

    <div id="cartModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 relative shadow-2xl animate-scale-in">
            <button onclick="closeCartModal()" class="absolute top-5 right-6 text-3xl text-gray-400 hover:text-red-500 transition">&times;</button>
            <h2 class="text-xl font-bold mb-5 border-b pb-3 flex items-center gap-2">
                <i class="fa-solid fa-bag-shopping gold-text"></i> আপনার শপিং ব্যাগ
            </h2>
            
            <div id="cartItemsList" class="max-h-80 overflow-y-auto space-y-4 pr-2">
                </div>
            
            <div class="border-t mt-6 pt-5">
                <div class="flex justify-between items-center text-lg font-bold">
                    <span>মোট পরিমাণ:</span>
                    <span class="gold-text">৳ <span id="cartTotal">0</span></span>
                </div>
                <button onclick="closeCartModal()" class="w-full gold-bg text-white py-4 rounded-2xl mt-6 font-bold shadow-lg hover:opacity-90 transition uppercase tracking-wider">কেনাকাটা চালিয়ে যান</button>
            </div>
        </div>
    </div>

    <div id="fullView" class="fixed inset-0 modal-overlay hidden flex items-center justify-center z-[200]">
        <button onclick="closeImg()" class="absolute top-6 right-8 text-white text-5xl hover:text-red-500">&times;</button>
        <img id="zImg" src="" class="max-w-[95%] max-h-[90%] border-4 border-white rounded-lg shadow-2xl">
    </div>

    <script>
        // আপনার অরিজিনাল Firebase Config (স্ক্রিনশট অনুযায়ী)
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IG8NerMCC6zyxUJzZOautG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4",
            measurementId: "G-7BGSSGNYJ6"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ১. রিয়েলটাইম ডাটাবেস থেকে প্রোডাক্ট লোড করা
        const productListDiv = document.getElementById('productList');

        db.ref('products').on('value', (snapshot) => {
            productListDiv.innerHTML = ""; // লোডিং টেক্সট ক্লিয়ার করা
            const products = snapshot.val();
            
            if (!products) {
                productListDiv.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <i class="fa-solid fa-box-open text-5xl mb-4 text-gray-200"></i>
                        <p class="text-gray-500 italic">এখনো কোনো পণ্য আপলোড করা হয়নি।</p>
                    </div>`;
                return;
            }

            for (let key in products) {
                const p = products[key];
                productListDiv.innerHTML += `
                    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-5 hover:shadow-xl transition-all duration-300 group">
                        <div class="relative overflow-hidden rounded-2xl">
                            <img src="${p.imageUrl}" alt="${p.name}" class="w-full h-64 object-cover cursor-zoom-in transition duration-500 group-hover:scale-110" onclick="openZoom(this.src)">
                            <div class="absolute top-3 left-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold shadow-sm uppercase gold-text">New</div>
                        </div>
                        
                        <div class="mt-5">
                            <h3 class="text-lg font-bold text-gray-800 line-clamp-1">${p.name}</h3>
                            <p class="text-gray-400 text-xs font-semibold mt-1">🏪 সেলার: <span class="gold-text">${p.seller}</span></p>
                            <div class="flex items-center justify-between mt-4">
                                <p class="text-2xl font-black text-gray-900">৳ ${p.price}</p>
                            </div>
                        </div>

                        <div class="flex gap-2 mt-6">
                            <button onclick="addToCart('${p.name}', ${p.price}, '${p.imageUrl}')" class="flex-1 border-2 border-gray-800 text-gray-800 py-3 rounded-xl font-bold text-xs uppercase hover:bg-gray-800 hover:text-white transition">Add to Cart</button>
                            <button onclick="buyNow('${p.name}', '${p.price}', '${p.seller}')" class="flex-1 gold-bg text-white py-3 rounded-xl font-bold text-xs shadow-md uppercase hover:opacity-90 transition">Buy Now</button>
                        </div>
                    </div>
                `;
            }
        });

        // ২. কার্ট ফাংশনালিটি
        let cart = [];
        function addToCart(name, price, img) {
            cart.push({name, price, img});
            updateCartCount();
            alert("✅ " + name + " কার্টে যোগ হয়েছে!");
        }

        function updateCartCount() {
            document.getElementById('cartCount').innerText = cart.length;
        }

        function openCartModal() {
            const list = document.getElementById('cartItemsList');
            const total = document.getElementById('cartTotal');
            list.innerHTML = "";
            let sum = 0;
            
            if(cart.length === 0) {
                list.innerHTML = "<div class='text-center py-10'><i class='fa-solid fa-cart-arrow-down text-4xl text-gray-200 mb-2'></i><p class='text-gray-400'>আপনার ব্যাগটি খালি!</p></div>";
            } else {
                cart.forEach((item) => {
                    sum += item.price;
                    list.innerHTML += `
                    <div class='flex items-center gap-4 bg-gray-50 p-3 rounded-2xl border border-gray-100'>
                        <img src="${item.img}" class="w-14 h-14 object-cover rounded-lg border shadow-sm">
                        <div class="flex-1">
                            <p class="text-sm font-bold text-gray-800">${item.name}</p>
                            <p class="text-xs gold-text font-bold uppercase">৳ ${item.price}</p>
                        </div>
                    </div>`;
                });
            }
            total.innerText = sum;
            document.getElementById('cartModal').classList.remove('hidden');
        }

        function closeCartModal() {
            document.getElementById('cartModal').classList.add('hidden');
        }

        // ৩. হোয়াটসঅ্যাপ অর্ডার লিঙ্ক
        function buyNow(name, price, seller) {
            const adminWA = "8801704100288";
            const msg = `🔔 *নতুন অর্ডার!*\n\n🏪 *Shop:* ${seller}\n📦 *Product:* ${name}\n💰 *দাম:* ${price} Tk\n\nঅর্ডারটি নিশ্চিত করতে আমার নাম ও ঠিকানা নিচে দিচ্ছি...`;
            window.open(`https://wa.me/${adminWA}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // ৪. ইমেজ জুম ফাংশন
        function openZoom(src) {
            document.getElementById('zImg').src = src;
            document.getElementById('fullView').classList.remove('hidden');
        }

        function closeImg() {
            document.getElementById('fullView').classList.add('hidden');
        }
    </script>
</body>
</html>
