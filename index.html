<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart | Mobile Friendly Shop</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --gold: #D4AF37; --white: #ffffff; --bg: #f4f7f6; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: var(--bg); color: #333; }

        /* Header */
        header {
            background: var(--white); padding: 12px 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000;
        }
        .logo-text { font-size: 20px; font-weight: 700; color: var(--gold); }

        /* Banner */
        .banner-container {
            width: 95%; max-width: 1200px; margin: 15px auto;
            border-radius: 12px; overflow: hidden; border: 2px solid var(--gold);
        }
        .banner-img { width: 100%; display: block; height: auto; }

        /* Grid */
        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; padding: 15px 5%;
        }

        .product-card {
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05); text-align: center;
        }
        .product-img { width: 100%; border-radius: 8px; cursor: pointer; }
        .product-title { font-size: 18px; margin: 10px 0; font-weight: 700; }
        .product-price { color: var(--gold); font-size: 20px; font-weight: 700; margin-bottom: 12px; }

        .order-btn {
            background: var(--gold); color: white; border: none;
            width: 100%; padding: 14px; border-radius: 8px;
            font-size: 16px; font-weight: 700; cursor: pointer;
        }

        /* Modals */
        .modal {
            display: none; position: fixed; z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); justify-content: center; align-items: center;
            padding: 15px;
        }
        .modal-content {
            background: white; width: 100%; max-width: 400px;
            padding: 20px; border-radius: 15px; position: relative;
        }
        .close-x { position: absolute; top: 10px; right: 15px; font-size: 30px; cursor: pointer; }

        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .submit-wa { background: #25D366; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: 700; font-size: 18px; cursor: pointer; margin-top: 10px; }

        #imgViewModal img { max-width: 95%; max-height: 80%; border-radius: 8px; border: 2px solid var(--gold); }
    </style>
</head>
<body>

<header>
    <span class="logo-text">Ar RaiyanMart</span>
    <select id="langSwitch" onchange="changeLanguage()" style="padding: 5px; border-radius: 5px; border: 1px solid var(--gold);">
        <option value="bn">বাংলা</option>
        <option value="en">English</option>
    </select>
</header>

<div class="banner-container">
    <img src="banner.jpg" class="banner-img" onerror="this.src='https://via.placeholder.com/1200x500?text=Ar+RaiyanMart+Banner'">
</div>

<div class="product-grid" id="productContainer"></div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close-x" onclick="closeModal()">&times;</span>
        <h3 id="modalPName" style="color:var(--gold); margin-bottom:10px; text-align:center;"></h3>
        
        <label id="lblCustomer">আপনার নাম:</label>
        <input type="text" id="custName" placeholder="...">
        
        <label id="lblPhone">মোবাইল নম্বর:</label>
        <input type="tel" id="custPhone" placeholder="017XXXXXXXX">
        
        <label id="lblAddress">পূর্ণ ঠিকানা:</label>
        <textarea id="custAddr" rows="2" placeholder="..."></textarea>
        
        <label id="lblDelivery">ডেলিভারি এলাকা:</label>
        <select id="deliveryCost">
            <option value="70" id="optIn">ঢাকার ভিতরে (70 TK)</option>
            <option value="130" id="optOut">ঢাকার বাইরে (130 TK)</option>
        </select>

        <button class="submit-wa" onclick="sendWhatsApp()">
            <i class="fab fa-whatsapp"></i> <span id="btnText">অর্ডার সম্পন্ন করুন</span>
        </button>
    </div>
</div>

<div id="imgViewModal" class="modal" onclick="this.style.display='none'">
    <span class="close-x" style="color:white; top:20px; right:30px;">&times;</span>
    <img id="fullImg" src="">
</div>

<script>
    const translations = {
        bn: {
            orderNow: "Order Now",
            lblCustomer: "আপনার নাম:",
            lblPhone: "মোবাইল নম্বর:",
            lblAddress: "পূর্ণ ঠিকানা:",
            lblDelivery: "ডেলিভারি এলাকা:",
            optIn: "ঢাকার ভিতরে (70 TK)",
            optOut: "ঢাকার বাইরে (130 TK)",
            btnText: "অর্ডার সম্পন্ন করুন",
            currency: "টাকা",
            msgTitle: "নতুন অর্ডার"
        },
        en: {
            orderNow: "Order Now",
            lblCustomer: "Your Name:",
            lblPhone: "Phone Number:",
            lblAddress: "Full Address:",
            lblDelivery: "Delivery Area:",
            optIn: "Inside Dhaka (70 TK)",
            optOut: "Outside Dhaka (130 TK)",
            btnText: "Complete Order",
            currency: "TK",
            msgTitle: "New Order"
        }
    };

    // আপনার প্রোডাক্ট এখানে যোগ করুন
    const products = [
        { 
            nameBn: "প্রিমিয়াম হোয়াইট স্মার্ট ওয়াচ", 
            nameEn: "Premium White Smart Watch", 
            price: 3500, 
            img: "watch.jpg" 
        }
    ];

    let currentLang = 'bn';
    let selectedProd = null;

    function renderProducts() {
        const container = document.getElementById('productContainer');
        container.innerHTML = "";
        products.forEach(p => {
            const name = currentLang === 'bn' ? p.nameBn : p.nameEn;
            container.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}" class="product-img" onclick="viewImg('${p.img}')" onerror="this.src='https://via.placeholder.com/400'">
                    <h2 class="product-title">${name}</h2>
                    <p class="product-price">${translations[currentLang].currency}: ${p.price}</p>
                    <button class="order-btn" onclick="openOrder('${name}', ${p.price})">${translations[currentLang].orderNow}</button>
                </div>
            `;
        });
    }

    function viewImg(src) {
        document.getElementById('imgViewModal').style.display = 'flex';
        document.getElementById('fullImg').src = src;
    }

    function changeLanguage() {
        currentLang = document.getElementById('langSwitch').value;
        const t = translations[currentLang];
        document.getElementById('lblCustomer').innerText = t.lblCustomer;
        document.getElementById('lblPhone').innerText = t.lblPhone;
        document.getElementById('lblAddress').innerText = t.lblAddress;
        document.getElementById('lblDelivery').innerText = t.lblDelivery;
        document.getElementById('optIn').innerText = t.optIn;
        document.getElementById('optOut').innerText = t.optOut;
        document.getElementById('btnText').innerText = t.btnText;
        renderProducts();
    }

    function openOrder(name, price) {
        selectedProd = { name, price };
        document.getElementById('modalPName').innerText = name;
        document.getElementById('orderModal').style.display = "flex";
    }

    function closeModal() { document.getElementById('orderModal').style.display = "none"; }

    function sendWhatsApp() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;
        const addr = document.getElementById('custAddr').value;
        const delivery = document.getElementById('deliveryCost').value;
        const t = translations[currentLang];

        if(!name || !phone || !addr) { alert(currentLang === 'bn' ? "দয়া করে সব তথ্য দিন!" : "Please fill all fields!"); return; }

        const total = selectedProd.price + parseInt(delivery);
        const msg = `🔔 *${t.msgTitle}!*\n\n🏪 *Shop:* Ar RaiyanMart\n📦 *Product:* ${selectedProd.name}\n💰 *Price:* ${selectedProd.price} TK\n🚚 *Delivery:* ${delivery} TK\n💵 *Total:* ${total} TK\n\n👤 *Customer:* ${name}\n📞 *Phone:* ${phone}\n📍 *Address:* ${addr}`;
        
        window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(msg)}`, '_blank');
    }

    renderProducts();
</script>

</body>
</html>
