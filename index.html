<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart | কাস্টমার শপ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        header { background: linear-gradient(45deg, #f85606, #ff8c52); color: white; text-align: center; padding: 25px 15px; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 800px; margin: 20px auto; padding: 0 10px; }
        .product-card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); text-align: center; display: flex; flex-direction: column; }
        .product-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; }
        .price { color: #f85606; font-weight: bold; font-size: 18px; margin: 8px 0; }
        .btn-buy { background: #25D366; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; margin-top: auto; }

        /* অর্ডার পপআপ */
        #orderModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 9999; padding: 15px; box-sizing: border-box; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 380px; text-align: center; }
        #modalImg { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-bottom: 15px; border: 2px solid #f85606; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn-confirm { background: #25D366; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1 style="margin:0;">Ar RaiyanMart</h1>
        <p style="margin:5px 0 0; font-size:14px;">আপনার পছন্দের পণ্য কিনুন সহজে</p>
    </header>

    <div class="grid" id="productGrid">লোড হচ্ছে...</div>

    <div id="orderModal">
        <div class="modal-content">
            <img id="modalImg" src="">
            <h3 id="selectedItemTitle" style="margin: 0 0 15px 0; color: #333;"></h3>
            <input type="text" id="custName" placeholder="আপনার নাম">
            <input type="number" id="custNumber" placeholder="মোবাইল নম্বর">
            <textarea id="custAddress" rows="3" placeholder="পুরো ঠিকানা (থানা, জেলা)"></textarea>
            <button class="btn-confirm" onclick="sendToWhatsApp()">অর্ডার কনফার্ম করুন</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">বন্ধ করুন</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            projectId: "ar-raiyanmart",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b82c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let selectedProduct = null;

        database.ref('live_products').on('value', (snapshot) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            const data = snapshot.val();
            if (!data) { grid.innerHTML = "<p style='grid-column: 1/3; text-align:center;'>কোনো পণ্য নেই।</p>"; return; }

            Object.keys(data).forEach(id => {
                const p = data[id];
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}">
                        <h4>${p.name}</h4>
                        <div class="price">৳${p.price}</div>
                        <button class="btn-buy" onclick="openOrderModal('${p.name}', '${p.price}', '${p.img}')">অর্ডার করুন</button>
                    </div>`;
            });
        });

        function openOrderModal(name, price, img) {
            selectedProduct = { name, price, img };
            document.getElementById('modalImg').src = img;
            document.getElementById('selectedItemTitle').innerText = name + " - ৳" + price;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function sendToWhatsApp() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custNumber').value;
            const address = document.getElementById('custAddress').value;

            if (!name || !phone || !address) {
                alert("সব তথ্য দিন!");
                return;
            }

            // আপনার সঠিক নম্বর এখন এখানে:
            const myWhatsApp = "8801704100288"; 
            
            const message = `🛍 *নতুন অর্ডার - Ar RaiyanMart*%0A%0A` +
                            `📦 *পণ্য:* ${selectedProduct.name}%0A` +
                            `💰 *দাম:* ৳${selectedProduct.price}%0A` +
                            `🖼 *পণ্য দেখুন:* ${selectedProduct.img}%0A` +
                            `--------------------------%0A` +
                            `👤 *কাস্টমার:* ${name}%0A` +
                            `📞 *ফোন:* ${phone}%0A` +
                            `📍 *ঠিকানা:* ${address}`;

            window.open(`https://wa.me/${myWhatsApp}?text=${message}`, '_blank');
            closeModal();
        }
    </script>
</body>
</html>
