<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap');
        body { background-color: #fcf8f8; font-family: 'Hind Siliguri', sans-serif; }
        .gold-bg { background-color: #D4AF37; }
        .gold-text { color: #D4AF37; }
        .product-card { background: white; border-radius: 10px; border: 1px solid #eee; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <header class="bg-white sticky top-0 z-50 shadow-sm p-4 flex justify-between items-center">
        <div class="text-xl font-bold gold-text">Ar RaiyanMart</div>
        <div class="relative cursor-pointer" onclick="toggleCart()">
            <i class="fa-solid fa-cart-shopping text-2xl text-gray-700"></i>
            <span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] px-1.5 rounded-full">0</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div class="mb-6"><img src="hero-banner.jpg" class="w-full rounded-xl shadow" onerror="this.src='https://via.placeholder.com/800x400?text=Ar+RaiyanMart+Banner'"></div>
        
        <h2 class="font-bold text-gray-700 border-l-4 border-[#D4AF37] pl-2 mb-4">সমস্ত পণ্য</h2>
        
        <div id="productList" class="grid grid-cols-2 gap-3">
            <p id="loadingText" class="col-span-2 text-center py-10 text-gray-500">পণ্য লোড হচ্ছে...</p>
        </div>
    </main>

    <div id="cartModal" class="fixed inset-0 bg-black/60 hidden z-[5000] flex justify-end">
        <div class="bg-white w-72 h-full p-5 shadow-xl overflow-y-auto relative">
            <button onclick="toggleCart()" class="absolute top-4 right-4 text-2xl">&times;</button>
            <h2 class="font-bold mb-4 border-b pb-2">আপনার ব্যাগ</h2>
            <div id="cartItems" class="space-y-4"></div>
            <div class="mt-8 border-t pt-4">
                <div class="flex justify-between font-bold mb-4"><span>মোট:</span> ৳<span id="cartTotal">0</span></div>
                <button onclick="openCheckout()" class="w-full gold-bg text-white py-3 rounded-lg font-bold shadow-lg">অর্ডার করুন</button>
            </div>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 bg-black/60 hidden z-[6000] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-xs rounded-xl p-5">
            <h2 class="font-bold mb-4 border-b pb-2">অর্ডার তথ্য</h2>
            <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-2 mb-3 bg-gray-50 border rounded-lg">
            <input type="number" id="custPhone" placeholder="মোবাইল নম্বর" class="w-full p-2 mb-3 bg-gray-50 border rounded-lg">
            <textarea id="custAddr" placeholder="পুরো ঠিকানা" class="w-full p-2 mb-3 bg-gray-50 border rounded-lg h-20"></textarea>
            <button onclick="submitOrder()" class="w-full gold-bg text-white py-3 rounded-lg font-bold">অর্ডার কনফার্ম (WhatsApp)</button>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBucDFQ0iHiC6xyxUjz2OwUtG-EQlyRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebaseio.com",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.appspot.com",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allProducts = [], cart = [];

        // পণ্য লোড করার ফাংশন (Node Name চেক করা হয়েছে)
        db.ref('live_products').on('value', (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('productList');
            allProducts = [];
            
            if (data) {
                for (let key in data) {
                    allProducts.push({ id: key, ...data[key] });
                }
                renderProducts(allProducts);
            } else {
                list.innerHTML = '<p class="col-span-2 text-center py-10">কোনো পণ্য পাওয়া যায়নি। দয়া করে ডাটাবেস চেক করুন!</p>';
            }
        });

        function renderProducts(products) {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            products.forEach(p => {
                let img = p.img || p.image || p.imageURL || 'https://via.placeholder.com/300';
                list.innerHTML += `
                    <div class="product-card shadow-sm">
                        <img src="${img}" class="w-full h-40 object-cover" onclick="window.open('${img}')">
                        <div class="p-3">
                            <h3 class="text-[11px] font-bold text-gray-800 h-8 overflow-hidden">${p.name}</h3>
                            <p class="gold-text font-bold text-xs mt-1">৳ ${p.price}</p>
                            <button onclick="addToCart('${p.id}')" class="w-full gold-bg text-white text-[10px] py-2 rounded-lg mt-2 font-bold active:scale-95 transition">Add to Cart</button>
                            <a href="https://wa.me/8801704100288?text=পণ্য সম্পর্কে প্রশ্ন: ${p.name}" target="_blank" class="block text-center border border-[#D4AF37] gold-text text-[10px] py-1.5 rounded-lg mt-1 font-bold">প্রশ্ন করুন</a>
                        </div>
                    </div>`;
            });
        }

        function addToCart(id) {
            const p = allProducts.find(x => x.id === id);
            const item = cart.find(x => x.id === id);
            if(item) item.qty++; else cart.push({...p, qty: 1});
            updateCart();
            if(cart.length === 1) toggleCart();
        }

        function updateCart() {
            document.getElementById('cartCount').innerText = cart.reduce((a, b) => a + b.qty, 0);
            const list = document.getElementById('cartItems');
            let total = 0;
            list.innerHTML = cart.length === 0 ? '<p class="text-center text-gray-400 py-10">খালি!</p>' : '';
            cart.forEach(item => {
                total += item.price * item.qty;
                list.innerHTML += `<div class="flex justify-between text-xs border-b pb-2"><span>${item.name} (x${item.qty})</span><span>৳${item.price*item.qty}</span></div>`;
            });
            document.getElementById('cartTotal').innerText = total;
        }

        function toggleCart() { document.getElementById('cartModal').classList.toggle('hidden'); }
        function openCheckout() { if(cart.length > 0) document.getElementById('orderModal').classList.remove('hidden'); }

        function submitOrder() {
            const n = document.getElementById('custName').value;
            const ph = document.getElementById('custPhone').value;
            const a = document.getElementById('custAddr').value;
            if(!n || !ph || !a) return alert('সব তথ্য দিন!');
            let items = cart.map(i => `${i.name} (x${i.qty})`).join(', ');
            let total = document.getElementById('cartTotal').innerText;
            const msg = `নতুন অর্ডার:\nনাম: ${n}\nফোন: ${ph}\nঠিকানা: ${a}\nপণ্য: ${items}\nমোট: ${total} TK`;
            window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
