<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart - Professional Marketplace</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { background-color: #f8f1f3; font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        
        .product-card { background: #fff; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #e5e7eb; transition: all 0.2s; position: relative; }
        .product-img { height: 160px; width: 100%; object-fit: cover; cursor: pointer; background: #f3f4f6; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .sticky-header { position: sticky; top: 0; z-index: 100; background: white; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
        
        /* Question/Comment Bubbles */
        .q-bubble { background: #f3f4f6; padding: 10px; border-radius: 12px 12px 12px 0; margin-bottom: 8px; font-size: 12px; border: 1px solid #e5e7eb; }
        .a-bubble { background: #fff3cd; padding: 10px; border-radius: 12px 12px 0 12px; margin-bottom: 12px; font-size: 12px; margin-left: 20px; border-left: 3px solid #D4AF37; }
    </style>
</head>
<body>

<header class="sticky-header shadow-sm">
    <div class="p-3 flex justify-between items-center border-b">
        <div class="text-xl font-bold gold-text flex items-center gap-1">
            <i class="fa-solid fa-gem"></i><span>Ar RaiyanMart</span>
        </div>
        <div class="flex items-center gap-3">
            <div class="relative cursor-pointer mr-2" onclick="toggleCart()">
                <i class="fa-solid fa-bag-shopping text-2xl text-gray-700"></i>
                <span id="cartCount" class="cart-badge">0</span>
            </div>
            <div class="flex gap-1 bg-gray-100 p-1 rounded-full scale-90">
                <button onclick="changeLang('bn')" id="btn-bn" class="px-2 py-1 rounded-full font-bold text-[10px] gold-bg text-white">BN</button>
                <button onclick="changeLang('en')" id="btn-en" class="px-2 py-1 rounded-full font-bold text-[10px] text-gray-500">EN</button>
            </div>
        </div>
    </div>
    <div class="p-2 bg-white">
        <div class="relative max-w-2xl mx-auto">
            <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="পণ্য খুঁজুন..." class="w-full pl-10 pr-4 py-2 rounded-lg bg-gray-100 text-sm outline-none">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
        </div>
    </div>
</header>

<main class="container mx-auto max-w-6xl pb-20">
    <div class="p-2">
        <img src="hero-banner.jpg" alt="Banner" class="w-full h-auto rounded-lg shadow-sm" onerror="this.style.display='none'">
    </div>
    <h2 id="section-title" class="text-xs font-bold text-gray-400 p-3 uppercase tracking-widest border-l-4 border-[#D4AF37] ml-2 mt-2">আমাদের পণ্যসমূহ</h2>
    <div id="productList" class="product-grid">
        <p class="col-span-full text-center py-10 text-gray-500">পণ্য লোড হচ্ছে...</p>
    </div>
</main>

<div id="questionModal" class="fixed inset-0 bg-black/70 hidden z-[7000] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-2xl p-5 relative flex flex-col max-h-[85vh]">
        <button onclick="closeQuestionModal()" class="absolute top-4 right-5 text-gray-400 text-xl font-bold">&times;</button>
        <h2 id="modal-q-title" class="text-lg font-bold mb-1 gold-text">প্রশ্ন করুন</h2>
        <p id="qProductName" class="text-[10px] text-gray-400 mb-4 uppercase font-bold truncate"></p>
        
        <div id="qaContainer" class="flex-1 overflow-y-auto mb-4 pr-2 border-t pt-4">
            <div id="qaList" class="space-y-2"></div>
        </div>

        <div class="border-t pt-4 space-y-2">
            <input type="number" id="qUserPhone" placeholder="আপনার ফোন নম্বর" class="w-full p-2.5 bg-gray-50 rounded-lg border text-sm outline-none">
            <div class="flex gap-2">
                <input type="text" id="qText" placeholder="আপনার প্রশ্নটি লিখুন..." class="flex-1 p-2.5 bg-gray-50 rounded-lg border text-sm outline-none">
                <button onclick="saveQuestionToDB()" class="gold-bg text-white px-4 rounded-lg active:scale-90 transition-all">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="cartModal" class="fixed inset-0 bg-black/70 hidden z-[5000] flex justify-end">
    <div class="bg-white w-80 h-full p-5 overflow-y-auto relative shadow-2xl">
        <button onclick="toggleCart()" class="absolute top-4 right-4 text-gray-400 text-2xl font-bold">&times;</button>
        <h2 id="cart-header" class="text-lg font-bold mb-6 border-b pb-2 flex items-center gap-2">
            <i class="fa-solid fa-cart-arrow-down gold-text"></i> আপনার ব্যাগ
        </h2>
        <div id="cartItems" class="space-y-4"></div>
        <div class="mt-8 border-t pt-4">
            <div class="flex justify-between font-bold text-lg mb-4">
                <span id="total-lbl">Subtotal:</span>
                <span class="gold-text">৳ <span id="cartTotal">0</span></span>
            </div>
            <button onclick="openCheckout()" id="chk-btn" class="w-full gold-bg text-white py-3.5 rounded-xl font-bold">Order Now</button>
        </div>
    </div>
</div>

<div id="orderModal" class="fixed inset-0 bg-black/70 hidden z-[6000] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-sm rounded-2xl p-6 relative max-h-[95vh] overflow-y-auto">
        <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="absolute top-4 right-5 text-gray-400 text-xl">&times;</button>
        <h2 class="text-lg font-bold mb-5 border-b pb-2">অর্ডার তথ্য দিন</h2>
        <div class="space-y-3">
            <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-3 bg-gray-50 rounded-xl text-sm border outline-none">
            <input type="number" id="custPhone" placeholder="মোবাইল নম্বর" class="w-full p-3 bg-gray-50 rounded-xl text-sm border outline-none">
            
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="custDivision" placeholder="Division" class="p-3 bg-gray-50 rounded-xl text-sm border outline-none">
                <input type="text" id="custDistrict" placeholder="District" class="p-3 bg-gray-50 rounded-xl text-sm border outline-none">
            </div>

            <select id="deliverySelect" onchange="updateFinalTotal()" class="w-full p-3 bg-gray-50 rounded-xl text-sm border outline-none">
                <option value="80">Inside Dhaka (৮০ টাকা)</option>
                <option value="140">Outside Dhaka (১৪০ টাকা)</option>
            </select>

            <textarea id="custAddr" placeholder="পুরো ঠিকানা" class="w-full p-3 bg-gray-50 rounded-xl h-20 text-sm border outline-none"></textarea>
            
            <div class="bg-gray-50 p-3 rounded-xl border border-dashed text-xs space-y-1">
                <p class="flex justify-between"><span>পণ্যের দাম:</span> <span>৳ <span id="modalSubtotal">0</span></span></p>
                <p class="flex justify-between"><span>ডেলিভারি চার্জ:</span> <span>৳ <span id="modalDelivery">80</span></span></p>
                <p class="text-sm font-bold flex justify-between mt-2 border-t pt-1 gold-text"><span>মোট:</span> <span>৳ <span id="modalFinalTotal">0</span></span></p>
            </div>

            <button onclick="submitOrder()" class="w-full bg-black text-white py-3.5 rounded-xl font-bold shadow-lg active:scale-95 transition-all">অর্ডার সম্পন্ন করুন</button>
        </div>
    </div>
</div>

<div id="imageModal" class="fixed inset-0 bg-black/95 hidden z-[8000] flex items-center justify-center p-4">
    <button onclick="document.getElementById('imageModal').classList.add('hidden')" class="absolute top-5 right-5 text-white text-3xl font-bold">&times;</button>
    <img id="fullImage" src="" class="max-w-full max-h-[90vh] rounded-lg">
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBucDFG8NHW86xyxUJz2OutG-EQLYRU",
        authDomain: "ar-raiyanmart.firebaseapp.com",
        databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ar-raiyanmart",
        storageBucket: "ar-raiyanmart.firebasestorage.app",
        messagingSenderId: "336578883565",
        appId: "1:336578883565:web:54d73b52c96a26f38601ef"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allProducts = [], cart = [], currentLang = 'bn', selectedProductId = "";

    // Firebase Data Load
    db.ref('live_products').on('value', (s) => {
        const d = s.val();
        allProducts = [];
        for(let k in d) { allProducts.push({ id: k, ...d[k] }); }
        renderAll(allProducts);
    });

    function renderAll(products) {
        const list = document.getElementById('productList');
        list.innerHTML = products.length === 0 ? '<p class="col-span-full text-center py-10">পণ্য লোড হচ্ছে...</p>' : '';
        products.forEach(p => {
            let img = p.img || p.image || p.imageURL || 'https://via.placeholder.com/150';
            list.innerHTML += `
                <div class="product-card shadow-sm">
                    <img src="${img}" class="product-img" onclick="openZoom('${img}')" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="p-2.5 flex-1 flex flex-col justify-between">
                        <div>
                            <h3 class="text-[11px] font-semibold text-gray-800 line-clamp-2 leading-tight">${p.name}</h3>
                            <p class="gold-text font-bold text-sm mt-1">৳ ${p.price}</p>
                        </div>
                        <div class="flex flex-col gap-2 mt-3">
                            <button onclick="addToCart('${p.id}')" class="w-full gold-bg text-white py-2 rounded-lg text-[11px] font-bold active:scale-95 transition-all">ADD TO CART</button>
                            <button onclick="openQuestionModal('${p.id}', '${p.name}')" class="w-full bg-gray-100 text-gray-600 border border-gray-200 py-1.5 rounded-lg text-[10px] font-bold flex items-center justify-center gap-1 active:scale-95">
                                <i class="fa-regular fa-comment-dots"></i> ${currentLang === 'bn' ? 'প্রশ্ন করুন' : 'Ask Question'}
                            </button>
                        </div>
                    </div>
                </div>`;
        });
    }

    // Zoom Image
    function openZoom(src) {
        document.getElementById('fullImage').src = src;
        document.getElementById('imageModal').classList.remove('hidden');
    }

    // Question System
    function openQuestionModal(id, name) {
        selectedProductId = id;
        document.getElementById('qProductName').innerText = name;
        document.getElementById('questionModal').classList.remove('hidden');
        loadQuestions(id);
    }

    function loadQuestions(pid) {
        const qaList = document.getElementById('qaList');
        db.ref('product_questions').orderByChild('productId').equalTo(pid).on('value', (s) => {
            const data = s.val();
            qaList.innerHTML = "";
            if(!data) {
                qaList.innerHTML = `<p class="text-center text-gray-400 text-[11px] py-10">${currentLang === 'bn' ? 'এখনও কোনো প্রশ্ন নেই।' : 'No questions yet.'}</p>`;
                return;
            }
            for(let k in data) {
                const q = data[k];
                let html = `<div class="q-bubble"><b>👤 Q:</b> ${q.question}</div>`;
                if(q.answer) html += `<div class="a-bubble"><b>✅ A:</b> ${q.answer}</div>`;
                qaList.innerHTML += html;
            }
            const container = document.getElementById('qaContainer');
            container.scrollTop = container.scrollHeight;
        });
    }

    function saveQuestionToDB() {
        const ph = document.getElementById('qUserPhone').value, txt = document.getElementById('qText').value;
        if(!ph || !txt) return alert("তথ্য দিন!");
        db.ref('product_questions').push({
            productId: selectedProductId,
            customerPhone: ph,
            question: txt,
            answer: "",
            timestamp: Date.now()
        }).then(() => { document.getElementById('qText').value = ""; });
    }

    function closeQuestionModal() { document.getElementById('questionModal').classList.add('hidden'); }

    // Cart Logic
    function addToCart(id) {
        const p = allProducts.find(x => x.id === id);
        const item = cart.find(x => x.id === id);
        if(item) { item.qty++; } else { cart.push({...p, qty: 1}); }
        updateCartUI();
        if(cart.length === 1) toggleCart();
    }

    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.reduce((a, b) => a + b.qty, 0);
        let total = cart.reduce((a, b) => a + (b.price * b.qty), 0);
        document.getElementById('cartTotal').innerText = total;
        const list = document.getElementById('cartItems');
        list.innerHTML = "";
        cart.forEach(i => {
            list.innerHTML += `<div class="flex justify-between text-xs border-b pb-1"><span>${i.name}</span><span>৳${i.price}x${i.qty}</span></div>`;
        });
    }

    function toggleCart() { document.getElementById('cartModal').classList.toggle('hidden'); }
    
    function openCheckout() {
        if(cart.length === 0) return alert("কার্ট খালি!");
        document.getElementById('modalSubtotal').innerText = document.getElementById('cartTotal').innerText;
        updateFinalTotal();
        document.getElementById('orderModal').classList.remove('hidden');
    }

    function updateFinalTotal() {
        let subtotal = parseInt(document.getElementById('modalSubtotal').innerText);
        let delivery = parseInt(document.getElementById('deliverySelect').value);
        document.getElementById('modalDelivery').innerText = delivery;
        document.getElementById('modalFinalTotal').innerText = subtotal + delivery;
    }

    // WhatsApp Order Submission (Format as per Note)
    function submitOrder() {
        const n = document.getElementById('custName').value, ph = document.getElementById('custPhone').value;
        const div = document.getElementById('custDivision').value, dis = document.getElementById('custDistrict').value;
        const addr = document.getElementById('custAddr').value, dCharge = document.getElementById('deliverySelect').value;
        const total = document.getElementById('modalFinalTotal').innerText;

        if(!n || !ph || !addr) return alert("সব তথ্য দিন!");
        
        const baseUrl = window.location.href.split('?')[0];

        let itemDetails = cart.map(i => {
            return `📦 *Product:* ${i.name} (${i.qty} Pcs)\n🖼️ *Product Link:* ${baseUrl}?id=${i.id}\n💰 *দাম:* ${i.price} TK`;
        }).join('\n\n');

        const msg = `🔔 *নতুন অর্ডার!*\n\n` +
                    `🏪 *Shop name:* Ar RaiyanMart\n\n` +
                    `${itemDetails}\n\n` +
                    `🚚 *ডেলিভারি:* ${dCharge} TK\n` +
                    `💵 *মোট:* ${total} TK\n\n` +
                    `👤 *ক্রেতা:* ${n}\n` +
                    `📞 *ফোন:* ${ph}\n` +
                    `📍 *Division:* ${div}\n` +
                    `📍 *District:* ${dis}\n` +
                    `📍 *ঠিকানা:* ${addr}`;

        window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function searchProducts() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderAll(allProducts.filter(p => p.name.toLowerCase().includes(q)));
    }

    function changeLang(l) {
        currentLang = l;
        const isBn = l === 'bn';
        document.getElementById('btn-bn').className = isBn ? 'px-2 py-1 rounded-full font-bold text-[10px] gold-bg text-white' : 'px-2 py-1 rounded-full font-bold text-[10px] text-gray-500';
        document.getElementById('btn-en').className = !isBn ? 'px-2 py-1 rounded-full font-bold text-[10px] gold-bg text-white' : 'px-2 py-1 rounded-full font-bold text-[10px] text-gray-500';
        document.getElementById('section-title').innerText = isBn ? "আমাদের পণ্যসমূহ" : "OUR PRODUCTS";
        document.getElementById('modal-q-title').innerText = isBn ? "প্রশ্ন করুন" : "Ask Question";
        renderAll(allProducts);
    }
</script>
</body>
</html>
