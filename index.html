<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RaiyanMart | Fast Shop</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; color: #333; }
        header { background: linear-gradient(135deg, #f85606, #ff8c52); color: white; text-align: center; padding: 12px; position: sticky; top: 0; z-index: 1000; }
        #productGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; max-width: 1000px; margin: 0 auto; }
        .product-card { background: white; padding: 10px; border-radius: 12px; display: flex; flex-direction: column; border: 1px solid #eee; }
        .img-box { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 8px; }
        .product-img { width: 100%; height: 100%; object-fit: contain; display: none; cursor: pointer; }
        .product-img.active { display: block; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.3); color: white; border: none; width: 24px; height: 24px; border-radius: 50%; }
        .product-card h4 { margin: 8px 0 2px; font-size: 13px; font-weight: bold; }
        .price { color: #f85606; font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        
        /* Question Section Style */
        .qna-box { background: #f9f9f9; padding: 5px; border-radius: 5px; margin-bottom: 8px; font-size: 11px; max-height: 60px; overflow-y: auto; border: 1px solid #f0f0f0; }
        .q-item { margin-bottom: 4px; border-bottom: 1px dashed #ddd; padding-bottom: 2px; }
        .q-text { font-weight: bold; color: #444; }
        .a-text { color: #f85606; font-style: italic; margin-left: 5px; }
        
        .ask-btn { background: #eee; color: #555; border: 1px solid #ddd; padding: 5px; border-radius: 5px; font-size: 11px; cursor: pointer; margin-bottom: 8px; width: 100%; }
        .buy-btn { background: #2ecc71; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: auto; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 380px; position: relative; }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

    <header><h1>RaiyanMart</h1></header>
    <div id="productGrid"><p style="text-align: center; grid-column: span 2; padding: 50px;">Loading...</p></div>

    <div id="askModal" class="modal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-x" onclick="document.getElementById('askModal').style.display='none'">&times;</span>
            <h3 style="margin-bottom:15px; color:#f85606">Ask a Question</h3>
            <input type="text" id="qUser" placeholder="Your Name">
            <input type="text" id="qText" placeholder="Write your question here...">
            <button class="buy-btn" onclick="submitQuestion()">Submit Question</button>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-x" onclick="document.getElementById('orderModal').style.display='none'">&times;</span>
            <h3 style="margin-bottom:15px; color:#f85606">Confirm Order</h3>
            <input type="text" id="cName" placeholder="Full Name">
            <input type="tel" id="cPhone" placeholder="Mobile Number">
            <input type="text" id="cJela" placeholder="District">
            <input type="text" id="cFullAddr" placeholder="Full Address">
            <button class="buy-btn" onclick="confirmOrder()">Confirm Order Now</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU", 
            authDomain: "ar-raiyanmart.firebaseapp.com", 
            projectId: "ar-raiyanmart", 
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app", 
            storageBucket: "ar-raiyanmart.firebasestorage.app", 
            messagingSenderId: "336578883565", 
            appId: "1:336578883565:web:54d73b82c96a26f38601e4" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let selectedProdId = null;

        database.ref('live_products').on('value', (snapshot) => {
            const grid = document.getElementById('productGrid');
            const data = snapshot.val();
            if (!data) return;

            let cards = "";
            Object.keys(data).forEach(id => {
                const p = data[id];
                const imgs = Array.isArray(p.imgs) ? p.imgs : [p.img];
                
                // Get Comments/Questions
                let qnaHtml = "";
                if(p.comments){
                    Object.values(p.comments).forEach(c => {
                        qnaHtml += `<div class="q-item"><span class="q-text">${c.user}:</span> ${c.text} ${c.reply ? `<br><span class="a-text">Ans: ${c.reply}</span>` : ''}</div>`;
                    });
                }

                cards += `
                <div class="product-card">
                    <div class="img-box" id="slider-${id}">
                        ${imgs.map((img, i) => `<img src="${img}" class="product-img ${i === 0 ? 'active' : ''}" loading="lazy">`).join('')}
                    </div>
                    <h4>${p.name}</h4>
                    <div class="qna-box">${qnaHtml || 'No questions yet.'}</div>
                    <button class="ask-btn" onclick="openAsk('${id}')">Ask a Question</button>
                    <div class="price">৳${p.price}</div>
                    <button class="buy-btn" onclick="openOrder('${id}')">Order Now</button>
                </div>`;
            });
            grid.innerHTML = cards;
        });

        function openAsk(id) { selectedProdId = id; document.getElementById('askModal').style.display='flex'; }
        
        function submitQuestion() {
            const user = document.getElementById('qUser').value;
            const text = document.getElementById('qText').value;
            if(!user || !text) return alert("Fill all fields!");
            
            database.ref(`live_products/${selectedProdId}/comments`).push({ user, text, timestamp: Date.now() });
            document.getElementById('askModal').style.display='none';
            alert("Question submitted!");
        }

        function openOrder(id) { document.getElementById('orderModal').style.display='flex'; }

        // Slide logic and confirmOrder logic remain same as previous
    </script>
</body>
</html>
