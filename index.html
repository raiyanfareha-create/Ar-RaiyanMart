<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart - Your Premium Marketplace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { background-color: #FAF9F6; font-family: 'Hind Siliguri', sans-serif; scroll-behavior: smooth; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        .modal-overlay { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); }
        .hidden { display: none; }
        .product-card { border-radius: 28px; background: #fff; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .zoom-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; cursor: zoom-out; }
        .zoom-img { max-width: 95%; max-height: 90vh; border-radius: 12px; transform: scale(0.9); transition: 0.3s; }
    </style>
</head>
<body>

    <header class="bg-white sticky top-0 z-50 p-4 border-b flex justify-between items-center">
        <div class="text-xl font-bold gold-text flex items-center gap-2">
            <i class="fa-solid fa-gem"></i>
            <span class="text-gray-800">Ar RaiyanMart</span>
        </div>
        <div class="flex items-center gap-1 bg-gray-100 p-1 rounded-full border">
            <button onclick="changeLang('bn')" id="btn-bn" class="px-4 py-1.5 rounded-full font-bold text-xs gold-bg text-white">বাংলা</button>
            <button onclick="changeLang('en')" id="btn-en" class="px-4 py-1.5 rounded-full font-bold text-xs text-gray-500">English</button>
        </div>
    </header>

    <section class="w-full">
        <img src="https://raw.githubusercontent.com/raiyanfareha-create/Ar-RaiyanMart/main/hero-banner.jpg" 
             class="w-full h-auto object-cover border-b-4 border-[#D4AF37]" alt="Hero Banner">
    </section>

    <div class="container mx-auto mt-6 px-4 relative">
        <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="পণ্য খুঁজুন..." 
               class="w-full pl-10 pr-10 py-3 rounded-2xl border-none bg-gray-100 focus:ring-2 focus:ring-[#D4AF37]">
        <i class="fa-solid fa-magnifying-glass absolute left-8 top-4 text-gray-400"></i>
        <button onclick="clearSearch()" class="absolute right-8 top-3.5 text-gray-400"><i class="fa-solid fa-circle-xmark text-xl"></i></button>
    </div>

    <main class="container mx-auto p-4 md:p-8">
        <h2 id="section-title" class="text-xl font-bold text-gray-800 mb-8 border-l-4 border-[#D4AF37] pl-3">সেরা সংগ্রহসমূহ</h2>
        <div id="productList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="col-span-full text-center py-10">পণ্য লোড হচ্ছে...</p>
        </div>
    </main>

    <div id="imageModal" class="zoom-overlay hidden" onclick="closeImg()">
        <button class="absolute top-6 right-6 text-white text-4xl">&times;</button>
        <img id="fullImage" src="" class="zoom-img">
    </div>

    <div id="orderModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center p-4 z-[300]">
        <div class="bg-white w-full max-w-md rounded-[35px] p-8 relative shadow-2xl">
            <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="absolute top-5 right-6 text-3xl text-gray-300">&times;</button>
            <h2 class="text-xl font-bold mb-6 text-gray-800">অর্ডার কনফার্ম করুন</h2>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="আপনার নাম" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <input type="number" id="custPhone" placeholder="মোবাইল নম্বর" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                <textarea id="custAddr" placeholder="ঠিকানা" class="w-full p-4 bg-gray-50 rounded-2xl h-24 border-none"></textarea>
                <button onclick="submitOrder()" class="w-full bg-black text-white py-4 rounded-2xl font-bold">অর্ডার করুন</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IG8NerMCC6zyxUJzZOautG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allProducts = [], currentLang = 'bn', activeProduct = null;

        function changeLang(l) {
            currentLang = l;
            document.getElementById('btn-bn').className = l === 'bn' ? 'px-4 py-1.5 rounded-full font-bold text-xs gold-bg text-white' : 'px-4 py-1.5 rounded-full font-bold text-xs text-gray-500';
            document.getElementById('btn-en').className = l === 'en' ? 'px-4 py-1.5 rounded-full font-bold text-xs gold-bg text-white' : 'px-4 py-1.5 rounded-full font-bold text-xs text-gray-500';
            renderAll(allProducts);
        }

        db.ref('live_products').on('value', (s) => {
            const d = s.val(); allProducts = [];
            for(let k in d) { let p = d[k]; p.id = k; allProducts.push(p); }
            renderAll(allProducts);
        });

        function renderAll(products) {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            products.forEach(p => {
                let img = p.image || p.imageUrl || p.img || (p.allImages && p.allImages[0]) || 'https://via.placeholder.com/400';
                let desc = p.description || p.desc || 'No description available';
                list.innerHTML += `
                    <div class="product-card p-5 border flex flex-col h-full">
                        <img src="${img}" class="w-full h-72 object-cover rounded-2xl cursor-zoom-in" onclick="openFullImg('${img}')">
                        <div class="mt-5 flex-1 flex flex-col">
                            <h3 class="text-xl font-bold text-gray-800">${p.name}</h3>
                            <p class="gold-text font-black text-2xl mt-1">৳ ${p.price}</p>
                            <div class="mt-4 p-3 bg-gray-50 rounded-xl text-xs text-gray-500 border border-dashed">
                                <b>Description:</b> ${desc}
                            </div>
                            <div class="mt-4 flex gap-2">
                                <input type="text" id="q-${p.id}" placeholder="প্রশ্ন করুন..." class="flex-1 text-xs p-3 rounded-xl bg-gray-100 border-none outline-none">
                                <button onclick="ask('${p.id}', '${p.name}')" class="bg-green-500 text-white w-10 h-10 rounded-xl"><i class="fa-solid fa-paper-plane text-xs"></i></button>
                            </div>
                            <button onclick="openOrderModal('${p.id}')" class="w-full mt-5 gold-bg text-white py-4 rounded-2xl font-bold uppercase shadow-lg">Order Now</button>
                        </div>
                    </div>`;
            });
        }

        function openFullImg(s) { document.getElementById('fullImage').src = s; document.getElementById('imageModal').classList.remove('hidden'); }
        function closeImg() { document.getElementById('imageModal').classList.add('hidden'); }
        function openOrderModal(id) { activeProduct = allProducts.find(p => p.id === id); document.getElementById('orderModal').classList.remove('hidden'); }
        function submitOrder() {
            const n = document.getElementById('custName').value, ph = document.getElementById('custPhone').value, a = document.getElementById('custAddr').value;
            if(!n || !ph || !a) { alert("Fill all!"); return; }
            const pImg = activeProduct.image || activeProduct.imageUrl || (activeProduct.allImages && activeProduct.allImages[0]) || 'No Image';
            const msg = `🔔 *New Order*\n📦 *Product:* ${activeProduct.name}\n💰 *Price:* ${activeProduct.price} Tk\n👤 *Name:* ${n}\n📞 *Phone:* ${ph}\n📍 *Address:* ${a}\n🖼️ *Image:* ${pImg}`;
            window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(msg)}`, '_blank');
        }
        function searchProducts() { const q = document.getElementById('searchInput').value.toLowerCase(); renderAll(allProducts.filter(p => p.name.toLowerCase().includes(q))); }
        function clearSearch() { document.getElementById('searchInput').value = ""; renderAll(allProducts); }
        function ask(id, name) { const v = document.getElementById('q-'+id).value; if(v) window.open(`https://wa.me/8801704100288?text=${encodeURIComponent('Product: '+name+'\nQuestion: '+v)}`, '_blank'); }
    </script>
</body>
</html>
