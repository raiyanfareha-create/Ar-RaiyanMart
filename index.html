<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart - Premium Marketplace</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { 
            background-color: #FAF9F6; 
            font-family: 'Hind Siliguri', sans-serif; 
            scroll-behavior: smooth;
        }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }
        .modal-overlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); }
        .hidden { display: none; }
        
        /* Product Image Styling */
        .product-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .product-card:hover .product-img-container img {
            transform: scale(1.08);
        }

        @media (max-width: 640px) {
            .product-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 12px !important; }
            .product-card { padding: 12px !important; border-radius: 24px !important; }
            .product-img-container { height: 160px !important; }
            .product-title { font-size: 14px !important; line-height: 1.2; height: 34px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        }
    </style>
</head>
<body>

    <header class="bg-white/95 backdrop-blur-md shadow-sm sticky top-0 z-50 p-4">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-2xl font-bold gold-text flex items-center gap-2">
                <i class="fa-solid fa-gem"></i>
                <span class="text-gray-800 tracking-tighter">Ar RaiyanMart</span>
            </div>
            
            <div class="relative w-full md:w-1/2">
                <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="পছন্দের পণ্যটি খুঁজুন..." 
                       class="w-full pl-11 pr-4 py-2.5 rounded-2xl border border-gray-100 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-[#D4AF37]/20 focus:bg-white transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
            </div>

            <div class="flex items-center gap-4">
                <div class="relative cursor-pointer" onclick="openCartModal()">
                    <i class="fa-solid fa-bag-shopping text-2xl text-gray-700"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] rounded-full px-1.5 py-0.5 font-bold shadow-lg">0</span>
                </div>
            </div>
        </div>
    </header>

    <section class="w-full">
        <img src="https://raw.githubusercontent.com/raiyanfareha-create/Ar-RaiyanMart/main/hero-banner.jpg" 
             alt="Banner" class="w-full h-auto object-cover border-b-4 border-[#D4AF37]">
    </section>

    <main class="container mx-auto p-4 md:p-10">
        <h2 class="text-2xl font-bold text-gray-800 mb-8 border-l-4 border-[#D4AF37] pl-3">সেরা সংগ্রহসমূহ</h2>
        
        <div id="productList" class="grid grid-cols-2 md:grid-cols-4 gap-6 product-grid">
            <div class="col-span-full py-20 flex flex-col items-center justify-center text-gray-400">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-3 gold-text"></i>
                <p>পণ্যগুলো লোড হচ্ছে...</p>
            </div>
        </div>
    </main>

    <div id="detailsModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center p-4 z-[200]">
        <div class="bg-white w-full max-w-3xl rounded-[40px] overflow-hidden relative shadow-2xl flex flex-col md:flex-row">
            <button onclick="closeDetailsModal()" class="absolute top-5 right-6 text-3xl text-gray-400 z-10 hover:text-red-500">&times;</button>
            
            <div class="w-full md:w-1/2 h-72 md:h-auto bg-gray-50">
                <img id="modalImg" class="w-full h-full object-cover">
            </div>
            
            <div class="p-8 md:w-1/2 flex flex-col justify-between">
                <div>
                    <h2 id="modalTitle" class="text-2xl font-bold text-gray-800 leading-tight"></h2>
                    <p id="modalSeller" class="text-[10px] text-gray-400 mt-2 uppercase tracking-[3px] font-bold"></p>
                    <p id="modalPrice" class="text-3xl font-black gold-text mt-4"></p>
                    <div class="mt-5 text-gray-600 text-sm leading-relaxed max-h-40 overflow-y-auto pr-2" id="modalDesc"></div>
                </div>
                
                <div class="mt-8 flex flex-col gap-3">
                    <button id="modalAskBtn" class="w-full border-2 border-green-500 text-green-600 py-3 rounded-2xl font-bold hover:bg-green-50 transition flex items-center justify-center gap-2">
                        <i class="fa-brands fa-whatsapp text-lg"></i> সেলারকে প্রশ্ন করুন
                    </button>
                    <button id="modalOrderBtn" class="w-full gold-bg text-white py-4 rounded-2xl font-bold shadow-xl uppercase tracking-wider hover:opacity-90 transition">অর্ডার করুন</button>
                </div>
            </div>
        </div>
    </div>

    <div id="orderModal" class="fixed inset-0 modal-overlay hidden flex items-center justify-center p-4 z-[300]">
        <div class="bg-white w-full max-w-md rounded-[32px] p-8 relative shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-gray-800 flex items-center gap-2">
                <i class="fa-solid fa-truck-fast gold-text"></i> ডেলিভারি তথ্য দিন
            </h2>
            <div class="space-y-4">
                <input type="text" id="custName" placeholder="আপনার পুরো নাম" class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-[#D4AF37]">
                <input type="number" id="custPhone" placeholder="মোবাইল নম্বর" class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-[#D4AF37]">
                <textarea id="custAddr" placeholder="পুরো ঠিকানা (বাসা নং, রোড, এলাকা, জেলা)" class="w-full p-4 bg-gray-50 border-none rounded-2xl h-28 focus:ring-2 focus:ring-[#D4AF37]"></textarea>
                
                <div class="bg-yellow-50 p-4 rounded-2xl border border-yellow-100 mt-2">
                    <p class="text-xs text-gray-500 flex justify-between">পণ্যর দাম: <span id="summaryPrice">0</span></p>
                    <p class="text-xs text-gray-500 flex justify-between border-b pb-2">ডেলিভারি চার্জ: <span>৳ ৬০</span></p>
                    <p class="text-sm font-bold text-gray-800 flex justify-between pt-2">মোট: <span id="summaryTotal" class="gold-text">0</span></p>
                </div>

                <button onclick="submitOrder()" class="w-full bg-black text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-gray-800 transition">কনফার্ম অর্ডার</button>
                <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="w-full text-gray-400 text-sm font-medium">ফিরে যান</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBucf0IG8NerMCC6zyxUJzZOautG-EQLwRU",
            authDomain: "ar-raiyanmart.firebaseapp.com",
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ar-raiyanmart",
            storageBucket: "ar-raiyanmart.firebasestorage.app",
            messagingSenderId: "336578883565",
            appId: "1:336578883565:web:54d73b52c96a26f38601e4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allProductsData = [];
        let selectedProduct = null;

        // Fetch Products
        db.ref('live_products').on('value', (snapshot) => {
            const products = snapshot.val();
            const listDiv = document.getElementById('productList');
            listDiv.innerHTML = "";
            allProductsData = [];

            if (!products) {
                listDiv.innerHTML = "<p class='col-span-full py-20 text-gray-400 text-center font-bold'>এখনো কোনো পণ্য নেই!</p>";
                return;
            }

            for (let key in products) {
                const p = products[key];
                p.id = key;
                allProductsData.push(p);
                renderProduct(p);
            }
        });

        function renderProduct(p) {
            let img = p.image || p.imageUrl || p.img || (p.allImages && p.allImages[0]) || 'https://via.placeholder.com/300?text=No+Image';
            document.getElementById('productList').innerHTML += `
                <div class="bg-white rounded-[32px] shadow-sm border border-gray-100 p-3 product-card cursor-pointer flex flex-col justify-between" onclick="showDetails('${p.id}')">
                    <div>
                        <div class="h-44 md:h-56 overflow-hidden rounded-[24px] bg-gray-50 product-img-container">
                            <img src="${img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300?text=Error'">
                        </div>
                        <h3 class="font-bold text-gray-800 mt-4 product-title">${p.name}</h3>
                        <p class="gold-text font-black text-xl mt-1">৳ ${p.price}</p>
                    </div>
                    <button class="w-full mt-4 py-2.5 bg-gray-50 rounded-xl text-[10px] font-bold uppercase tracking-widest text-gray-500 hover:bg-black hover:text-white transition-all">Details</button>
                </div>`;
        }

        function searchProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const listDiv = document.getElementById('productList');
            listDiv.innerHTML = "";
            const filtered = allProductsData.filter(p => p.name.toLowerCase().includes(query));
            if(filtered.length === 0) {
                listDiv.innerHTML = "<p class='col-span-full py-10 text-gray-400 text-center'>পণ্যটি পাওয়া যায়নি!</p>";
            } else {
                filtered.forEach(renderProduct);
            }
        }

        function showDetails(id) {
            selectedProduct = allProductsData.find(p => p.id === id);
            const img = selectedProduct.image || selectedProduct.imageUrl || selectedProduct.img || (selectedProduct.allImages && selectedProduct.allImages[0]);
            
            document.getElementById('modalImg').src = img;
            document.getElementById('modalTitle').innerText = selectedProduct.name;
            document.getElementById('modalPrice').innerText = '৳ ' + selectedProduct.price;
            document.getElementById('modalSeller').innerText = 'Store: ' + (selectedProduct.seller || 'Ar RaiyanMart');
            document.getElementById('modalDesc').innerText = selectedProduct.description || "এই পণ্যটির কোনো বিস্তারিত বর্ণনা দেওয়া নেই।";
            
            // Order Summary update
            document.getElementById('summaryPrice').innerText = '৳ ' + selectedProduct.price;
            document.getElementById('summaryTotal').innerText = '৳ ' + (parseInt(selectedProduct.price) + 60);

            document.getElementById('modalAskBtn').onclick = (e) => {
                e.stopPropagation();
                const msg = `আসসালামু আলাইকুম, আমি এই প্রোডাক্টটি সম্পর্কে জানতে চাই:\n\n📦 *Product:* ${selectedProduct.name}\n💰 *Price:* ${selectedProduct.price} Tk`;
                window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(msg)}`, '_blank');
            };

            document.getElementById('modalOrderBtn').onclick = () => {
                document.getElementById('orderModal').classList.remove('hidden');
            };

            document.getElementById('detailsModal').classList.remove('hidden');
        }

        function closeDetailsModal() { 
            document.getElementById('detailsModal').classList.add('hidden'); 
        }

        function submitOrder() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const addr = document.getElementById('custAddr').value;

            if(!name || !phone || !addr) { alert("দয়া করে আপনার নাম, ফোন নম্বর এবং ঠিকানা দিন।"); return; }

            const shopName = selectedProduct.seller || 'Ar RaiyanMart';
            const productImg = selectedProduct.image || selectedProduct.imageUrl || (selectedProduct.allImages && selectedProduct.allImages[0]);
            const delCharge = 60;
            const total = parseInt(selectedProduct.price) + delCharge;

            const msg = `🔔 *নতুন অর্ডার!*\n\n` +
                        `🏪 *Shop:* ${shopName}\n` +
                        `📦 *Product:* ${selectedProduct.name}\n` +
                        `🖼️ *Image:* ${productImg}\n` +
                        `💰 *দাম:* ${selectedProduct.price} Tk\n` +
                        `🚚 *ডেলিভারি:* ${delCharge} Tk\n` +
                        `💵 *মোট:* ${total} Tk\n\n` +
                        `👤 *ক্রেতা:* ${name}\n` +
                        `📞 *ফোন:* ${phone}\n` +
                        `📍 *ঠিকানা:* ${addr}`;

            const adminWA = "8801704100288"; 
            window.open(`https://wa.me/${adminWA}?text=${encodeURIComponent(msg)}`, '_blank');
            
            document.getElementById('orderModal').classList.add('hidden');
            document.getElementById('detailsModal').classList.add('hidden');
            alert("ধন্যবাদ! আপনার অর্ডারটি হোয়াটসঅ্যাপের মাধ্যমে পাঠানো হচ্ছে।");
        }
    </script>
</body>
</html>
