<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RaiyanMart | সেরা অনলাইন শপিং</title>
    <style>
        /* মোবাইল ফ্রেন্ডলি ডিজাইন */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
        
        header { background: linear-gradient(135deg, #f85606, #ff8c52); color: white; text-align: center; padding: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 20px; }

        /* প্রোডাক্ট গ্রিড */
        #productGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; max-width: 1000px; margin: 0 auto; }
        
        .product-card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; border: 1px solid #eee; }
        
        /* ইমেজ স্লাইডার */
        .img-box { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 8px; background: #f9f9f9; }
        .product-img { width: 100%; height: 100%; object-fit: contain; display: none; cursor: pointer; }
        .product-img.active { display: block; }
        
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 16px; display: flex; align-items: center; justify-content: center; z-index: 5; }
        .prev-btn { left: 5px; } .next-btn { right: 5px; }

        .product-card h4 { margin: 10px 0 5px; font-size: 14px; color: #333; height: 34px; overflow: hidden; line-height: 1.3; }
        .price { color: #f85606; font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        
        .buy-btn { background: #25D366; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.3s; margin-top: auto; }
        .buy-btn:active { transform: scale(0.95); }

        /* পপআপ বা মডেল */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; position: relative; animation: popUp 0.3s ease; }
        
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-content h3 { margin: 0 0 15px; color: #f85606; font-size: 18px; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #999; }

        #zoomModal img { max-width: 95%; max-height: 80vh; border-radius: 10px; }
    </style>
</head>
<body>

    <header><h1>RaiyanMart</h1></header>
    
    <div id="productGrid">
        <p style="text-align: center; grid-column: span 2; padding: 50px; color: #888;">পণ্য লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</p>
    </div>

    <div id="zoomModal" class="modal" onclick="this.style.display='none'">
        <img id="zoomedImg" src="">
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-x" onclick="closeOrder()">&times;</span>
            <h3 id="orderProductName">অর্ডার নিশ্চিত করুন</h3>
            
            <input type="text" id="cName" placeholder="আপনার নাম লিখুন">
            <input type="tel" id="cPhone" placeholder="আপনার মোবাইল নাম্বার">
            <input type="text" id="cAddress" placeholder="আপনার পুরো ঠিকানা (থানা, জেলা)">
            
            <label style="font-size: 12px; color: #666; font-weight: bold;">কালার সিলেক্ট করুন:</label>
            <select id="cColor"></select>

            <label style="font-size: 12px; color: #666; font-weight: bold;">ডেলিভারি এরিয়া:</label>
            <select id="cDelivery">
                <option value="70">ঢাকার ভেতরে (৭০ টাকা)</option>
                <option value="130">ঢাকার বাইরে (১৩০ টাকা)</option>
            </select>
            
            <button class="buy-btn" style="font-size: 16px;" onclick="confirmOrder()">অর্ডার কনফার্ম করুন</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBucf0IGMerMCC6zyxUJzZOauTG-EQLwRU", 
            authDomain: "ar-raiyanmart.firebaseapp.com", 
            projectId: "ar-raiyanmart", 
            databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app", 
            storageBucket: "ar-raiyanmart.firebasestorage.app", 
            messagingSenderId: "336578883565", 
            appId: "1:336578883565:web:54d73b82c96a26f38601e4" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let selectedProduct = null;

        // ডাটাবেজ থেকে পণ্য নিয়ে আসা
        database.ref('live_products').on('value', (snapshot) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            const data = snapshot.val();
            if (!data) { grid.innerHTML = "<p style='grid-column: span 2; text-align: center;'>বর্তমানে কোনো পণ্য নেই।</p>"; return; }

            Object.keys(data).forEach(id => {
                const p = data[id];
                const images = p.imgs ? (Array.isArray(p.imgs) ? p.imgs : [p.img]) : [p.img];

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="img-box" id="slider-${id}">
                        ${images.map((img, i) => `<img src="${img}" class="product-img ${i === 0 ? 'active' : ''}" onclick="openZoom('${img}')">`).join('')}
                        ${images.length > 1 ? `<button class="nav-btn prev-btn" onclick="slide('${id}', -1)">❮</button><button class="nav-btn next-btn" onclick="slide('${id}', 1)">❯</button>` : ''}
                    </div>
                    <h4>${p.name}</h4>
                    <div class="price">৳${p.price}</div>
                    <button class="buy-btn" onclick="openOrder('${p.name}', '${p.price}', '${p.shopName || 'RaiyanMart'}', '${images[0]}', '${p.colors || ''}')">অর্ডার করুন</button>
                `;
                grid.appendChild(card);
            });
        });

        function slide(id, dir) {
            const container = document.getElementById(`slider-${id}`);
            const imgs = container.getElementsByClassName('product-img');
            let currentIdx = Array.from(imgs).findIndex(img => img.classList.contains('active'));
            imgs[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + dir + imgs.length) % imgs.length;
            imgs[currentIdx].classList.add('active');
        }

        function openZoom(url) { document.getElementById('zoomedImg').src = url; document.getElementById('zoomModal').style.display = 'flex'; }

        function openOrder(name, price, shop, img, colorsStr) {
            selectedProduct = { name, price, shop, img };
            document.getElementById('orderProductName').innerText = name;
            const colorSelect = document.getElementById('cColor');
            colorSelect.innerHTML = "";
            const colors = colorsStr ? colorsStr.split(',') : ['Default'];
            colors.forEach(c => { colorSelect.innerHTML += `<option value="${c.trim()}">${c.trim()}</option>`; });
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeOrder() { document.getElementById('orderModal').style.display = 'none'; }

        function confirmOrder() {
            const name = document.getElementById('cName').value;
            const phone = document.getElementById('cPhone').value;
            const address = document.getElementById('cAddress').value;
            const color = document.getElementById('cColor').value;
            const delivery = document.getElementById('cDelivery').value;

            if (!name || !phone || !address) return alert("দয়া করে সব তথ্য পূরণ করুন!");

            const total = parseInt(selectedProduct.price) + parseInt(delivery);

            // হোয়াটসঅ্যাপ মেসেজ ফরম্যাট
            const text = `*নতুন অর্ডার!*\n\n🏪 *Shop:* ${selectedProduct.shop}\n📦 *Product:* ${selectedProduct.name} (${color})\n🖼️ *Image:* ${selectedProduct.img}\n💰 *দাম:* ৳${selectedProduct.price}\n🚚 *ডেলিভারি:* ৳${delivery}\n💵 *মোট:* ৳${total}\n\n👤 *ক্রেতা:* ${name}\n📞 *ফোন:* ${phone}\n📍 *ঠিকানা:* ${address}`;

            const wpUrl = `https://wa.me/8801704100288?text=${encodeURIComponent(text)}`;
            window.open(wpUrl, '_blank');
            closeOrder();
        }
    </script>
</body>
</html>
