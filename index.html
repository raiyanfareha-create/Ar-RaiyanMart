<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart - Premium Marketplace</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap');
        body { background-color: #f8f1f3; font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }
        .gold-text { color: #D4AF37; }
        .gold-bg { background-color: #D4AF37; }

        .product-grid { display: grid; grid-template-columns: repeat(1, 1fr); gap: 20px; padding: 15px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .product-card { background: #fff; border-radius: 15px; overflow: hidden; border: 1px solid #e5e7eb; padding: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .product-img { width: 100%; height: auto; max-height: 450px; object-fit: contain; border-radius: 10px; background: #fafafa; }
        
        .sticky-header { position: sticky; top: 0; z-index: 100; background: white; border-bottom: 1px solid #eee; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; }
        
        .q-bubble { background: #f3f4f6; padding: 10px; border-radius: 10px; margin-bottom: 6px; font-size: 12px; border: 1px solid #e5e7eb; }
        .a-bubble { background: #fff3cd; padding: 10px; border-radius: 10px; margin-bottom: 12px; font-size: 12px; border-left: 4px solid #D4AF37; }
        
        .desc-section { background: #fdfbf7; border-left: 4px solid #D4AF37; padding: 12px; margin: 15px 0; font-size: 14px; line-height: 1.6; color: #333; border-radius: 5px; }
        
        input, select, textarea { border: 1px solid #ddd !important; transition: all 0.3s; }
        input:focus { border-color: #D4AF37 !important; outline: none; box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body>

<header class="sticky-header p-4 flex justify-between items-center shadow-sm">
    <div class="text-2xl font-bold gold-text flex items-center gap-2">
        <i class="fa-solid fa-gem"></i><span>Ar RaiyanMart</span>
    </div>
    <div class="relative cursor-pointer" onclick="toggleCart()">
        <i class="fa-solid fa-bag-shopping text-2xl text-gray-700"></i>
        <span id="cartCount" class="cart-badge">0</span>
    </div>
</header>

<main class="container mx-auto max-w-4xl pb-24">
    <div id="productList" class="product-grid">
        <p class="text-center py-20 text-gray-500 flex flex-col items-center gap-3">
            <i class="fa-solid fa-circle-notch animate-spin text-3xl gold-text"></i>
            পণ্য লোড হচ্ছে, দয়া করে অপেক্ষা করুন...
        </p>
    </div>
</main>

<div id="cartModal" class="fixed inset-0 bg-black/70 hidden z-[5000] flex justify-end">
    <div class="bg-white w-85 h-full p-6 overflow-y-auto relative shadow-2xl">
        <button onclick="toggleCart()" class="absolute top-5 right-5 text-gray-400 text-3xl font-light">&times;</button>
        <h2 class="text-xl font-bold mb-8 border-b pb-3 flex items-center gap-2">
            <i class="fa-solid fa-cart-shopping gold-text"></i> আপনার ব্যাগ
        </h2>
        <div id="cartItems" class="space-y-5"></div>
        <div class="mt-10 border-t pt-5">
            <div class="flex justify-between font-bold text-lg mb-6">
                <span>Subtotal:</span>
                <span class="gold-text">৳ <span id="cartTotal">0</span></span>
            </div>
            <button onclick="openCheckout()" class="w-full gold-bg text-white py-4 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all">
                অর্ডার কনফার্ম করুন
            </button>
        </div>
    </div>
</div>

<div id="orderModal" class="fixed inset-0 bg-black/70 hidden z-[6000] flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-3xl p-7 relative max-h-[92vh] overflow-y-auto">
        <button onclick="document.getElementById('orderModal').classList.add('hidden')" class="absolute top-5 right-6 text-gray-400 text-2xl">&times;</button>
        <h2 class="text-xl font-bold mb-6 border-b pb-3">আপনার ডেলিভারি তথ্য</h2>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-500 ml-1">ক্রেতার নাম</label>
                <input type="text" id="custName" placeholder="আপনার পুরো নাম লিখুন" class="w-full p-3.5 bg-gray-50 rounded-xl text-sm mt-1">
            </div>
            
            <div>
                <label class="text-xs font-bold text-gray-500 ml-1">মোবাইল নম্বর</label>
                <input type="number" id="custPhone" placeholder="১১ ডিজিটের নম্বরটি দিন" class="w-full p-3.5 bg-gray-50 rounded-xl text-sm mt-1">
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs font-bold text-gray-500 ml-1">Division</label>
                    <input type="text" id="custDivision" placeholder="e.g. Dhaka" class="w-full p-3.5 bg-gray-50 rounded-xl text-sm mt-1">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 ml-1">District</label>
                    <input type="text" id="custDistrict" placeholder="e.g. Gazipur" class="w-full p-3.5 bg-gray-50 rounded-xl text-sm mt-1">
                </div>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500 ml-1">ডেলিভারি এরিয়া</label>
                <select id="deliverySelect" onchange="updateFinalTotal()" class="w-full p-3.5 bg-gray-50 rounded-xl text-sm mt-1 cursor-pointer">
                    <option value="80">ঢাকার ভেতরে (Inside Dhaka) - ৮০ TK</option>
                    <option value="140">ঢাকার বাইরে (Outside Dhaka) - ১৪০ TK</option>
                </select>
            </div>

            <div>
                <label class="text-xs font-bold text-gray-500 ml-1">বিস্তারিত ঠিকানা</label>
                <textarea id="custAddr" placeholder="গ্রাম/রাস্তা, থানা এবং জেলা লিখুন" class="w-full p-3.5 bg-gray-50 rounded-xl h-24 text-sm mt-1 resize-none"></textarea>
            </div>
            
            <div class="bg-yellow-50 p-4 rounded-2xl border border-dashed border-yellow-200">
                <div class="flex justify-between text-xs text-gray-600 mb-1"><span>পণ্যের দাম:</span> <span>৳ <span id="modalSubtotal">0</span></span></div>
                <div class="flex justify-between text-xs text-gray-600"><span>ডেলিভারি চার্জ:</span> <span>৳ <span id="modalDelivery">80</span></span></div>
                <div class="flex justify-between font-bold text-lg mt-3 pt-2 border-t border-yellow-200 gold-text">
                    <span>সর্বমোট:</span> <span>৳ <span id="modalFinalTotal">0</span></span>
                </div>
            </div>

            <button onclick="submitOrder()" class="w-full bg-black text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="fa-brands fa-whatsapp text-xl"></i> হোয়াটসঅ্যাপে অর্ডার দিন
            </button>
        </div>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBucDFG8NHW86xyxUJz2OutG-EQLYRU",
        authDomain: "ar-raiyanmart.firebaseapp.com",
        databaseURL: "https://ar-raiyanmart-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ar-raiyanmart",
        storageBucket: "ar-raiyanmart.firebasestorage.app",
        messagingSenderId: "336578883565",
        appId: "1:336578883565:web:54d73b52c96a26f38601ef"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let allProducts = [], cart = [];

    // Real-time Product Loading
    db.ref('live_products').on('value', (snapshot) => {
        const data = snapshot.val();
        allProducts = [];
        for(let key in data) { allProducts.push({ id: key, ...data[key] }); }
        renderAll();
    });

    function renderAll() {
        const list = document.getElementById('productList');
        list.innerHTML = "";
        
        if(allProducts.length === 0) {
            list.innerHTML = '<p class="text-center py-20 text-gray-400">কোনো পণ্য পাওয়া যায়নি।</p>';
            return;
        }

        allProducts.forEach(p => {
            let img = p.img || p.image || 'https://via.placeholder.com/300';
            let description = p.description || "এই পণ্যটির কোনো বিস্তারিত বিবরণ এখনো যুক্ত করা হয়নি।";
            
            list.innerHTML += `
                <div class="product-card shadow-sm border">
                    <img src="${img}" class="product-img mb-4" onerror="this.src='https://via.placeholder.com/300'">
                    
                    <h3 class="font-bold text-xl text-gray-800 leading-snug">${p.name}</h3>
                    <p class="gold-text font-bold text-2xl mt-2 mb-4">৳ ${p.price}</p>
                    
                    <div class="desc-section">
                        <p class="font-bold text-black border-b border-yellow-200 inline-block mb-2">পণ্যের বিবরণ (Description):</p>
                        <p class="text-gray-700">${description}</p>
                    </div>

                    <button onclick="addToCart('${p.id}')" class="w-full gold-bg text-white py-3.5 rounded-xl font-bold text-lg mb-8 shadow-md active:scale-95 transition-all">
                        <i class="fa-solid fa-cart-plus mr-2"></i> ADD TO CART
                    </button>
                    
                    <div class="border-t pt-6 mt-2">
                        <p class="text-xs font-bold text-gray-400 mb-4 uppercase flex items-center gap-2">
                            <i class="fa-regular fa-comments text-lg gold-text"></i> কাস্টমার প্রশ্ন ও উত্তর (Q&A)
                        </p>
                        
                        <div id="qa-${p.id}" class="max-h-52 overflow-y-auto mb-5 px-1 custom-scrollbar"></div>
                        
                        <div class="bg-gray-50 p-3 rounded-xl border space-y-3">
                            <input type="number" id="phone-${p.id}" placeholder="আপনার মোবাইল নম্বর" class="w-full p-2.5 bg-white border rounded-lg text-xs outline-none">
                            <div class="flex gap-2">
                                <input type="text" id="text-${p.id}" placeholder="আপনার প্রশ্নটি এখানে লিখুন..." class="flex-1 p-2.5 bg-white border rounded-lg text-xs outline-none">
                                <button onclick="saveQuestion('${p.id}')" class="gold-bg text-white px-5 rounded-lg active:scale-90 transition-all">
                                    <i class="fa-solid fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
            loadQuestions(p.id);
        });
    }

    // Question & Answer Logic
    function loadQuestions(pid) {
        db.ref('product_questions').orderByChild('productId').equalTo(pid).on('value', (snapshot) => {
            const data = snapshot.val();
            const qaBox = document.getElementById(`qa-${pid}`);
            if(!qaBox) return;

            if(!data) {
                qaBox.innerHTML = '<p class="text-[11px] text-gray-400 italic py-2">এখনো কোনো প্রশ্ন নেই। প্রথম প্রশ্নটি আপনিই করুন!</p>';
                return;
            }

            qaBox.innerHTML = "";
            for(let key in data) {
                const q = data[key];
                let qHtml = `<div class="q-bubble"><b>👤 প্রশ্ন:</b> ${q.question}</div>`;
                if(q.answer) {
                    qHtml += `<div class="a-bubble"><b>✅ উত্তর:</b> ${q.answer}</div>`;
                }
                qaBox.innerHTML += qHtml;
            }
            qaBox.scrollTop = qaBox.scrollHeight;
        });
    }

    function saveQuestion(pid) {
        const ph = document.getElementById(`phone-${pid}`).value;
        const txt = document.getElementById(`text-${pid}`).value;

        if(!ph || ph.length < 11) {
            alert("সঠিক মোবাইল নম্বর দিন!");
            return;
        }
        if(!txt || txt.length < 3) {
            alert("আপনার প্রশ্নটি সঠিকভাবে লিখুন!");
            return;
        }

        db.ref('product_questions').push({
            productId: pid,
            customerPhone: ph,
            question: txt,
            answer: "",
            timestamp: Date.now()
        }).then(() => {
            document.getElementById(`text-${pid}`).value = "";
            alert("আপনার প্রশ্নটি সফলভাবে জমা হয়েছে। শীঘ্রই উত্তর দেওয়া হবে।");
        });
    }

    // Shopping Cart Logic
    function addToCart(id) {
        const p = allProducts.find(x => x.id === id);
        const item = cart.find(x => x.id === id);
        
        if(item) {
            item.qty++;
        } else {
            cart.push({...p, qty: 1});
        }
        
        updateCartUI();
        if(cart.length === 1) toggleCart();
    }

    function updateCartUI() {
        const count = cart.reduce((total, item) => total + item.qty, 0);
        const total = cart.reduce((total, item) => total + (item.price * item.qty), 0);
        
        document.getElementById('cartCount').innerText = count;
        document.getElementById('cartTotal').innerText = total;
        
        const list = document.getElementById('cartItems');
        list.innerHTML = cart.length === 0 ? '<p class="text-center py-10 text-gray-400">আপনার ব্যাগ খালি।</p>' : "";
        
        cart.forEach((item, index) => {
            list.innerHTML += `
                <div class="flex items-center justify-between border-b pb-3 border-gray-100">
                    <div class="flex-1">
                        <p class="text-sm font-bold text-gray-800 line-clamp-1">${item.name}</p>
                        <p class="text-xs text-gray-500">৳${item.price} × ${item.qty}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="changeQty(${index}, -1)" class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center text-gray-600">-</button>
                        <span class="text-sm font-bold">${item.qty}</span>
                        <button onclick="changeQty(${index}, 1)" class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center text-gray-600">+</button>
                    </div>
                </div>`;
        });
    }

    function changeQty(index, delta) {
        cart[index].qty += delta;
        if(cart[index].qty <= 0) cart.splice(index, 1);
        updateCartUI();
    }

    function toggleCart() {
        document.getElementById('cartModal').classList.toggle('hidden');
    }
    
    function openCheckout() {
        if(cart.length === 0) return alert("অর্ডার করার জন্য পণ্য ব্যাগে যোগ করুন!");
        const subtotal = cart.reduce((total, item) => total + (item.price * item.qty), 0);
        document.getElementById('modalSubtotal').innerText = subtotal;
        updateFinalTotal();
        document.getElementById('orderModal').classList.remove('hidden');
    }

    function updateFinalTotal() {
        const subtotal = parseInt(document.getElementById('modalSubtotal').innerText);
        const deliveryCharge = parseInt(document.getElementById('deliverySelect').value);
        document.getElementById('modalDelivery').innerText = deliveryCharge;
        document.getElementById('modalFinalTotal').innerText = subtotal + deliveryCharge;
    }

    // WhatsApp Order Submission
    function submitOrder() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        const division = document.getElementById('custDivision').value.trim();
        const district = document.getElementById('custDistrict').value.trim();
        const address = document.getElementById('custAddr').value.trim();
        const delivery = document.getElementById('deliverySelect').value;
        const total = document.getElementById('modalFinalTotal').innerText;

        if(!name || !phone || !address || !division || !district) {
            alert("অনুগ্রহ করে সব তথ্য সঠিকভাবে প্রদান করুন!");
            return;
        }

        const baseUrl = window.location.origin + window.location.pathname;
        
        // Item Details Formatting
        let itemDetails = cart.map(i => {
            return `📦 *Product:* ${i.name} (${i.qty} Pcs)\n🔗 *Link:* ${baseUrl}?id=${i.id}\n💰 *দাম:* ${i.price} TK`;
        }).join('\n\n');

        // Professional WhatsApp Message Format
        const finalMsg = `🔔 *নতুন অর্ডার!*\n\n` +
                         `🏪 *Shop name:* Ar RaiyanMart\n\n` +
                         `${itemDetails}\n\n` +
                         `🚚 *ডেলিভারি:* ${delivery} TK\n` +
                         `💵 *মোট:* ${total} TK\n\n` +
                         `👤 *ক্রেতা:* ${name}\n` +
                         `📞 *ফোন:* ${phone}\n` +
                         `📍 *Division:* ${division}\n` +
                         `📍 *District:* ${district}\n` +
                         `📍 *ঠিকানা:* ${address}`;

        const encodedMsg = encodeURIComponent(finalMsg);
        window.open(`https://wa.me/8801704100288?text=${encodedMsg}`, '_blank');
    }
</script>
</body>
</html>
