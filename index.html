<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ar RaiyanMart | Premium Luxury Shop</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           1. CSS VARIABLES (Brand Setup)
           ========================================= */
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8860B;
            --white: #ffffff;
            --bg-color: #FAF9F6;
            --text-main: #222;
            --text-light: #555;
            --success: #25D366;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* =========================================
           2. GLOBAL STYLES
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
        }

        /* =========================================
           3. HEADER & NAVIGATION
           ========================================= */
        header {
            background: var(--white);
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 4px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .brand-name {
            font-size: 26px;
            font-weight: 700;
            color: var(--gold);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lang-select {
            padding: 5px 12px;
            border: 1.5px solid var(--gold);
            border-radius: 8px;
            color: var(--gold);
            font-weight: 600;
            font-size: 14px;
        }

        /* =========================================
           4. HERO BANNER (Recovery Focus)
           ========================================= */
        .hero-section {
            width: 92%;
            max-width: 1200px;
            margin: 35px auto;
            height: 320px;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            border: 3px solid var(--gold);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            background: #000;
        }

        /* GitHub-er hero-banner.jpg ekhane set kora holo */
        .hero-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: transform 6s ease;
        }

        .hero-section:hover img {
            transform: scale(1.1);
        }

        .hero-content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            width: 90%;
        }

        .hero-content h1 {
            font-size: clamp(24px, 5vw, 40px);
            color: var(--gold);
            margin-bottom: 15px;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.6);
        }

        /* =========================================
           5. PRODUCT GRID
           ========================================= */
        .container {
            padding: 30px 8% 100px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--white);
            border-radius: 25px;
            padding: 35px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            position: relative;
        }

        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.12);
        }

        .image-wrapper {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            background: #fdfdfd;
            border: 1px solid #f0f0f0;
        }

        /* Product image 1000000587.jpg ekhane set kora holo */
        .image-wrapper img {
            width: 100%;
            display: block;
            cursor: pointer;
            transition: 0.6s;
        }

        .card-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .card-price {
            color: var(--gold);
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 25px;
        }

        .desc-box {
            background: #fffdf5;
            padding: 22px;
            border-radius: 18px;
            border-left: 6px solid var(--gold);
            margin-bottom: 35px;
        }

        .desc-box h4 {
            color: var(--gold);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Order Button */
        .cta-button {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: white;
            border: none;
            width: 100%;
            padding: 22px;
            border-radius: 18px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
            transition: 0.3s;
        }

        /* =========================================
           6. CHECKOUT MODAL
           ========================================= */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            border-radius: 35px;
            position: relative;
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 25px;
            font-size: 40px;
            color: #ccc;
            cursor: pointer;
        }

        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-light); }
        .input-box input, .input-box select, .input-box textarea {
            width: 100%; padding: 16px; border: 2px solid #eee; border-radius: 14px; font-size: 16px;
        }

        .wa-btn {
            background: var(--success);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
        }

        /* =========================================
           7. RESPONSIVE
           ========================================= */
        @media (max-width: 768px) {
            header { padding: 0 5%; }
            .hero-section { height: 240px; }
            .container { grid-template-columns: 1fr; padding: 15px 5% 80px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="brand-name">
            <i class="fas fa-gem"></i> Ar RaiyanMart
        </a>
        <div class="lang-badge">বাংলা</div>
    </header>

    <div class="hero-section">
        <img src="hero-banner.jpg" alt="Banner" onerror="this.src='https://via.placeholder.com/1200x400?text=Banner+Not+Found'">
        <div class="hero-content">
            <h1>আর রাইয়ানমার্ট প্রিমিয়াম কালেকশন</h1>
            <p>সেরা পণ্যের আস্থার প্রতীক ও আভিজাত্যের নিশ্চয়তা</p>
        </div>
    </div>

    <main class="container">
        
        <div class="card">
            <div class="image-wrapper">
                <img src="1000000587.jpg" alt="Smart Watch" onclick="window.open(this.src)" onerror="this.src='https://via.placeholder.com/600x450?text=Image+Not+Found'">
            </div>
            
            <h2 class="card-title">প্রিমিয়াম হোয়াইট স্মার্ট ওয়াচ</h2>
            <p class="card-price">৳ ৩,৫০০</p>

            <div class="desc-box">
                <h4><i class="fas fa-check-circle"></i> Best Choice</h4>
                <p>Amader ei smart watch-ti premium build quality somponno. Heart rate monitor, sleep tracking ebong 5-7 diner battery backup thakbe.</p>
            </div>

            <button class="cta-button" onclick="openOrder('প্রিমিয়াম হোয়াইট স্মার্ট ওয়াচ', 3500)">
                <i class="fas fa-cart-plus"></i> Order Now
            </button>
        </div>

    </main>

    <div id="checkoutModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeOrder()">&times;</span>
            <h3 id="pName" style="color: var(--gold); text-align: center; margin-bottom: 25px;"></h3>
            
            <div class="input-box">
                <label>Apnar Nam</label>
                <input type="text" id="custName" placeholder="Abdullah">
            </div>

            <div class="input-box">
                <label>Mobile Number</label>
                <input type="tel" id="custPhone" placeholder="017XXXXXXXX">
            </div>

            <div class="input-box">
                <label>Delivery Area</label>
                <select id="custDelivery">
                    <option value="70">Dhakar Bhitore (70 TK)</option>
                    <option value="130">Dhakar Bahire (130 TK)</option>
                </select>
            </div>

            <div class="input-box">
                <label>Full Thikana</label>
                <textarea id="custAddress" rows="3" placeholder="Road, Thana, District"></textarea>
            </div>

            <button class="wa-btn" onclick="sendOrder()">
                <i class="fab fa-whatsapp"></i> Confirm Order
            </button>
        </div>
    </div>

    <script>
        let selectedItem = { title: "", price: 0 };

        function openOrder(name, price) {
            selectedItem = { title: name, price: price };
            document.getElementById('pName').innerText = name;
            document.getElementById('checkoutModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeOrder() {
            document.getElementById('checkoutModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function sendOrder() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;
            const delivery = parseInt(document.getElementById('custDelivery').value);
            const total = selectedItem.price + delivery;

            if(!name || !phone || !address) {
                alert("Sob tothyo puron korun!");
                return;
            }

            const msg = `🔔 *New Order!*\n\n` +
                      `📦 *Product:* ${selectedItem.title}\n` +
                      `💰 *Price:* ${selectedItem.price} TK\n` +
                      `🚚 *Delivery:* ${delivery} TK\n` +
                      `💵 *Total:* ${total} TK\n\n` +
                      `👤 *Name:* ${name}\n` +
                      `📞 *Phone:* ${phone}\n` +
                      `📍 *Address:* ${address}`;

            window.open(`https://wa.me/8801704100288?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
